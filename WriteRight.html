<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Write. Right? Draw it! 🎨</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fef6e4;
      --paper: #fffef9;
      --dark: #1a1a2e;
      --noun-c: #16a34a;
      --verb-c: #ea580c;
      --prep-c: #2563eb;
      --wild-c: #9333ea;
      --noun-bg: #dcfce7;
      --verb-bg: #ffedd5;
      --prep-bg: #dbeafe;
      --wild-bg: #f3e8ff;
      --accent: #e11d48;
      --shadow: 4px 4px 0 #1a1a2e;
      --shadow-sm: 2px 2px 0 #1a1a2e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-y: auto; }
    body {
      font-family: 'Press Start 2P', monospace;
      background: var(--bg);
      background-image: radial-gradient(#d4c5a9 1px, transparent 1px);
      background-size: 24px 24px;
      min-height: 100vh;
      overflow-x: hidden;
    }
    h1,h2,h3 { font-family: 'Press Start 2P', monospace; letter-spacing: 2px; }
    #app { max-width: 960px; margin: 0 auto; padding: 16px; padding-top: 60px; }

    /* HEADER */
    .header { text-align: center; padding: 12px 0 6px; }
    .header h1 { font-size: 3rem; color: var(--dark); text-shadow: 3px 3px 0 var(--accent); line-height: 1; }
    .header p  { font-size: .95rem; color: #555; margin-top: 4px; }

    /* BUTTONS */
    .btn {
      display: inline-block; padding: 10px 22px; border: 3px solid var(--dark);
      border-radius: 8px; background: #fff; font-family: 'Press Start 2P', monospace;
      font-size: 1.2rem; letter-spacing: 1px; cursor: pointer; box-shadow: var(--shadow);
      transition: transform .1s, box-shadow .1s;
    }
    .btn:hover  { transform: translate(-1px,-1px); box-shadow: 5px 5px 0 var(--dark); }
    .btn:active { transform: translate(2px,2px);   box-shadow: 2px 2px 0 var(--dark); }
    .btn-accent { background: var(--accent);  color: #fff; }
    .btn-green  { background: var(--noun-c);  color: #fff; }
    .btn-noun   { background: var(--noun-bg); color: var(--noun-c); border-color: var(--noun-c); }
    .btn-verb   { background: var(--verb-bg); color: var(--verb-c); border-color: var(--verb-c); }
    .btn-prep   { background: var(--prep-bg); color: var(--prep-c); border-color: var(--prep-c); }
    .btn-wild   { background: var(--wild-bg); color: var(--wild-c); border-color: var(--wild-c); }
    .w-btn.wd   { background: var(--verb-bg); color: var(--verb-c); border-color: var(--verb-c); }
    .btn-sm  { padding: 6px 14px;   font-size: 1rem; }
    .btn-lg  { padding: 14px 32px;  font-size: 1.5rem; }
    .btn-sel { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--dark); background: var(--dark); color: #fff; }

    /* SETUP */
    .setup-box {
      background: var(--paper); border: 3px solid var(--dark); border-radius: 16px;
      padding: 28px; box-shadow: var(--shadow); max-width: 600px; margin: 24px auto;
    }
    .setup-box h2 { font-size: 1.8rem; margin-bottom: 16px; }
    .pc-btns { display: flex; gap: 10px; margin-bottom: 24px; }
    .pc-btns .btn { flex: 1; text-align: center; }
    .pi-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .p-badge {
      font-family: 'Press Start 2P', monospace; font-size: 1.1rem; width: 36px; height: 36px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--dark); flex-shrink: 0;
    }
    input[type=text] {
      flex:1; padding:8px 12px; border:2px solid var(--dark); border-radius:8px;
      font-family:'Press Start 2P', monospace; font-size:1rem; background:#fff; min-width:120px;
    }
    input[type=text]:focus { outline:none; box-shadow:0 0 0 3px rgba(26,26,46,.15); }
    .hint {
      background:#fff3cd; border:2px solid #e6a817; border-radius:8px;
      padding:10px 14px; font-size:.9rem; margin-top:16px;
    }

    /* SCOREBOARD */
    .scoreboard { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:14px; }
    .chip {
      padding:6px 14px; border:2px solid var(--dark); border-radius:999px;
      font-size:.95rem; background:#fff; box-shadow:var(--shadow-sm);
      display:flex; align-items:center; gap:6px;
    }
    .chip.active { background:var(--dark); color:#fff; }
    .chip .pts { font-family:'Press Start 2P', monospace; font-size:1.1rem; }
    .turn-banner {
      text-align:center; border-radius:10px; padding:10px 16px; margin-bottom:14px;
      font-family:'Press Start 2P', monospace; font-size:1.4rem; letter-spacing:1px; color:#fff;
    }
    .deck-row { display:flex; gap:14px; align-items:center; font-size:.9rem; color:#666; margin-bottom:12px; }
    .deck-row b { font-family:'Press Start 2P', monospace; font-size:1.1rem; color:var(--dark); }
    .notice { border-radius:8px; padding:8px 14px; margin-bottom:10px; font-size:.9rem; }
    .n-info { background:#eff6ff; border:2px solid #3b82f6; color:#1e40af; }

    /* SLOTS */
    .slots-section { margin-bottom:18px; }
    .slots-section h3 { font-size:1.1rem; margin-bottom:8px; color:#555; }
    .slot-card {
      background:var(--paper); border:3px solid var(--dark); border-radius:12px;
      padding:12px 16px; margin-bottom:10px; box-shadow:var(--shadow-sm);
      transition:border-color .15s, box-shadow .15s, transform .1s;
    }
    .slot-card.playable {
      border-color:var(--accent); box-shadow:4px 4px 0 var(--accent); cursor:pointer;
    }
    .slot-card.playable:hover { transform:translateY(-2px); }
    .slot-lbl { font-family:'Press Start 2P', monospace; font-size:.78rem; letter-spacing:1px; color:#999; margin-bottom:8px; }
    .slot-row { display:flex; gap:4px; align-items:center; }
    .slot-pos {
      border:2px dashed #bbb; border-radius:8px; padding:5px 6px;
      flex:1; min-width:0; text-align:center; font-size:.78rem; color:#bbb;
    }
    .slot-pos.fn  { background:var(--noun-bg); border:2px solid var(--noun-c); color:var(--noun-c); }
    .slot-pos.fv  { background:var(--verb-bg); border:2px solid var(--verb-c); color:var(--verb-c); }
    .slot-pos.fp  { background:var(--prep-bg); border:2px solid var(--prep-c); color:var(--prep-c); }
    .slot-pos.fw  { background:var(--wild-bg); border:2px solid var(--wild-c); color:var(--wild-c); }
    .slot-pos.tgt { border:2px solid var(--accent); color:var(--accent); animation:pulse 1.4s infinite; }
    .slot-pos .pl { font-size:.66rem; opacity:.7; display:block; }
    .slot-pos .pw { font-weight:bold; font-size:.88rem; }
    .conn { color:#bbb; font-size:.9rem; }
    .slot-sent { font-size:.95rem; margin-top:8px; font-style:italic; color:#444; }

    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

    /* HAND */
    .hand-area {
      background:var(--paper); border:3px solid var(--dark); border-radius:14px;
      padding:16px; box-shadow:var(--shadow);
    }
    .hand-area h3 { font-size:1.05rem; margin-bottom:10px; color:#444; }
    .hand-cards { display:flex; gap:12px; flex-wrap:wrap; }

    /* CARDS */
    .card {
      width:134px; min-height:152px; border:3px solid var(--dark); border-radius:12px;
      padding:10px; cursor:pointer; box-shadow:var(--shadow);
      transition:transform .15s, box-shadow .15s; display:flex; flex-direction:column;
      user-select:none;
    }
    .card:hover   { transform:translateY(-6px) rotate(-1deg); box-shadow:6px 10px 0 var(--dark); }
    .card.sel     { transform:translateY(-10px); box-shadow:6px 12px 0 var(--dark); outline:3px solid var(--accent); }
    .card.noun-c  { background:var(--noun-bg); }
    .card.verb-c  { background:var(--verb-bg); }
    .card.prep-c  { background:var(--prep-bg); }
    .card.wild-c  { background:var(--wild-bg); }
    .card.off     { opacity:.4; cursor:not-allowed; }
    .card.off:hover { transform:none; box-shadow:var(--shadow); }
    .c-badge {
      font-family:'Press Start 2P', monospace; font-size:.7rem; letter-spacing:1px;
      padding:2px 7px; border-radius:999px; border:2px solid currentColor;
      display:inline-block; margin-bottom:6px; align-self:flex-start;
    }
    .noun-c .c-badge { color:var(--noun-c); }
    .verb-c .c-badge { color:var(--verb-c); }
    .prep-c .c-badge { color:var(--prep-c); }
    .wild-c .c-badge { color:var(--wild-c); }
    .c-lbl  { font-size:.76rem; font-weight:bold; margin-bottom:8px; color:var(--dark); line-height:1.2; }
    .c-opts { display:flex; flex-direction:column; gap:5px; flex:1; }
    .c-word {
      background:rgba(255,255,255,.7); border:1.5px solid var(--dark); border-radius:6px;
      padding:4px 7px; font-size:.86rem; font-weight:bold; text-align:center;
    }
    .c-or  { text-align:center; font-size:.7rem; color:#999; }
    .c-pts { font-family:'Press Start 2P', monospace; font-size:.95rem; text-align:right; margin-top:6px; }

    /* MODALS */
    .modal-bg {
      position:fixed; inset:0; background:rgba(0,0,0,.55);
      display:flex; align-items:center; justify-content:center; z-index:100; padding:16px;
    }
    .modal {
      background:var(--paper); border:4px solid var(--dark); border-radius:18px;
      padding:24px 28px; box-shadow:8px 8px 0 var(--dark); max-width:440px; width:100%; text-align:center;
    }
    .modal h2 { font-size:1.7rem; margin-bottom:6px; }
    .modal p  { color:#555; font-size:.95rem; margin-bottom:12px; }
    .w-choices { display:flex; flex-direction:column; gap:10px; }
    .w-btn {
      padding:14px; border:3px solid var(--dark); border-radius:10px;
      font-family:'Press Start 2P', monospace; font-size:1.15rem; font-weight:bold;
      cursor:pointer; box-shadow:var(--shadow-sm); transition:transform .1s; background:#fff;
    }
    .w-btn:hover { transform:translateY(-2px); }
    .w-btn.wn { background:var(--noun-bg); color:var(--noun-c); border-color:var(--noun-c); }
    .w-btn.wv { background:var(--verb-bg); color:var(--verb-c); border-color:var(--verb-c); }
    .w-btn.wp { background:var(--prep-bg); color:var(--prep-c); border-color:var(--prep-c); }
    .pos-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px; }
    .wild-row { display:flex; gap:8px; margin-top:10px; }
    .wild-row input { flex:1; }

    /* DRAWING OVERLAY */
    .draw-ov {
      position:fixed; inset:0; top:44px; background:#1a1a2e; z-index:200;
      display:flex; flex-direction:column; overflow:hidden;
    }
    .draw-top {
      background:#0f0f1e; color:#fff; padding:10px 14px;
      display:flex; align-items:center; gap:12px; flex-shrink:0;
      border-bottom:2px solid rgba(255,255,255,.1);
    }
    .draw-sent {
      flex:1; font-family:'Press Start 2P', monospace; font-size:1.2rem;
      letter-spacing:1px; line-height:1.2; min-width:0;
    }
    .draw-timer { display:flex; align-items:center; gap:6px; flex-shrink:0; }
    .draw-timer-n {
      font-family:'Press Start 2P', monospace; font-size:2rem; color:#fff; min-width:2.2ch; text-align:center;
    }
    .draw-timer-n.urg { color:#fca5a5; }
    .draw-canvas-wrap { flex:1; position:relative; background:#fff; overflow:hidden; }
    #draw-canvas { position:absolute; inset:0; width:100%!important; height:100%!important; touch-action:none; cursor:crosshair; }
    .draw-bar {
      background:#0f0f1e; padding:9px 14px; display:flex; align-items:center;
      gap:8px; flex-wrap:wrap; flex-shrink:0; border-top:2px solid rgba(255,255,255,.1);
    }
    .swatches { display:flex; gap:5px; align-items:center; flex-wrap:wrap; }
    .sw {
      width:26px; height:26px; border-radius:50%; cursor:pointer; flex-shrink:0;
      border:3px solid transparent; transition:transform .1s;
    }
    .sw:hover  { transform:scale(1.15); }
    .sw.act    { border-color:#fff; transform:scale(1.2); }
    .bar-div   { width:1px; height:24px; background:rgba(255,255,255,.25); flex-shrink:0; }
    .sz-btns   { display:flex; gap:6px; align-items:center; }
    .sz-dot {
      border-radius:50%; background:#fff; cursor:pointer; flex-shrink:0;
      border:2px solid transparent; transition:transform .1s;
    }
    .sz-dot.act { border-color:#f97316; transform:scale(1.2); }
    .db {
      padding:5px 11px; border:2px solid rgba(255,255,255,.4); border-radius:6px;
      background:rgba(255,255,255,.08); color:#fff; font-family:'Press Start 2P', monospace;
      font-size:.88rem; cursor:pointer; transition:background .1s; white-space:nowrap;
    }
    .db:hover  { background:rgba(255,255,255,.2); }
    .db.act    { background:rgba(255,255,255,.3); border-color:#fff; }
    .db-ml     { margin-left:auto; }
    .draw-done-btn {
      padding:8px 18px; background:var(--accent); color:#fff; border:2px solid rgba(255,255,255,.6);
      border-radius:8px; font-family:'Press Start 2P', monospace; font-size:1.1rem; letter-spacing:1px;
      cursor:pointer; transition:background .1s; white-space:nowrap;
    }
    .draw-done-btn:hover { background:#be123c; }
    .draw-done-btn.tu { animation:flash 1s infinite; }
    @keyframes flash { 0%,100%{opacity:1}50%{opacity:.55} }

    /* SCORE REVEAL */
    .score-rv { text-align:center; max-width:500px; margin:0 auto; }
    .pts-big {
      font-family:'Press Start 2P', monospace; font-size:4rem;
      color:var(--accent); text-shadow:3px 3px 0 var(--dark); margin:16px 0;
    }
    .cards-sc { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; margin:12px 0; }
    .sc-chip  { padding:5px 12px; border:2px solid var(--dark); border-radius:999px; font-size:.86rem; }

    /* END */
    .end-sc { text-align:center; max-width:560px; margin:0 auto; }
    .end-sc h2 { font-size:2.6rem; margin-bottom:6px; }
    .final-tbl {
      background:var(--paper); border:3px solid var(--dark); border-radius:14px;
      padding:20px; margin:20px 0; box-shadow:var(--shadow);
    }
    .f-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px dashed #ccc; }
    .f-row:last-child { border:none; }
    .f-row .rk { font-family:'Press Start 2P', monospace; font-size:1.8rem; margin-right:12px; color:#bbb; }
    .f-row.w .rk { color:#e6a817; }
    .f-row .pn { flex:1; font-size:1.1rem; text-align:left; }
    .f-row .fp { font-family:'Press Start 2P', monospace; font-size:1.8rem; color:var(--accent); }
    .win-banner {
      background:var(--dark); color:#fff; border-radius:10px; padding:14px 20px;
      margin-bottom:14px; font-family:'Press Start 2P', monospace; font-size:1.5rem;
    }

    @media(max-width:480px){
      #app{padding-top:52px}
      .header{padding:6px 0 2px}
      .header h1{font-size:1.8rem}
      .header p{font-size:.8rem;margin-top:2px}
      .setup-box{padding:14px;margin:10px auto}
      .setup-box h2{font-size:1.4rem;margin-bottom:10px}
      .pc-btns{gap:6px;margin-bottom:16px}
      .pc-btns .btn{padding:7px 10px;font-size:1rem}
      .pi-row{margin-bottom:9px;gap:8px}
      .p-badge{width:30px;height:30px;font-size:.95rem}
      .hint{font-size:.8rem;padding:8px 10px;margin-top:10px}
      .card{width:112px}
      .draw-sent{font-size:1rem}
      .swatches{gap:4px}
      .sw{width:22px;height:22px}
      .slot-pos .pw{font-size:.78rem}
      .conn{font-size:.75rem}
    }

    /* ════════════════════ PIXEL-GAME THEME ════════════════════
       Layered on top of the original rules. Keeps the exact layout but:
       - hard, square (8-bit) corners everywhere
       - Press Start 2P type scaled down so it still fits the same boxes
       - crisp pixel edges on shadows/borders (already hard-edged)
       The freehand drawing canvas is intentionally left smooth.        */

    /* Square every corner — pixel art has no anti-aliased curves. */
    * { border-radius: 0 !important; }

    /* Press Start 2P is ~2× wider/taller than the old fonts, so scale the
       type down to preserve the layout. Floor ~7px keeps tiny labels legible. */
    body { -webkit-font-smoothing: none; font-smooth: never; line-height: 1.5; }
    h1, h2, h3 { letter-spacing: 0 !important; line-height: 1.4 !important; }

    .header h1 { font-size: 1.5rem; line-height: 1.5; }
    .header p  { font-size: .55rem; line-height: 1.6; }

    .btn      { font-size: .7rem; letter-spacing: 0; line-height: 1.4; }
    .btn-sm   { font-size: .55rem; }
    .btn-lg   { font-size: .9rem; }

    .setup-box h2 { font-size: .95rem; }
    .p-badge      { font-size: .6rem; }
    input[type=text] { font-size: .6rem; }
    .hint     { font-size: .55rem; line-height: 1.7; }

    .chip          { font-size: .55rem; }
    .chip .pts     { font-size: .6rem; }
    .turn-banner   { font-size: .8rem; letter-spacing: 0; line-height: 1.4; }
    .deck-row      { font-size: .55rem; }
    .deck-row b    { font-size: .6rem; }
    .notice        { font-size: .55rem; line-height: 1.7; }

    .slots-section h3 { font-size: .65rem; }
    .slot-lbl     { font-size: .5rem; letter-spacing: 0; }
    .slot-pos     { font-size: .5rem; }
    .slot-pos .pl { font-size: .45rem; line-height: 1.4; }
    .slot-pos .pw { font-size: .55rem; }
    .conn         { font-size: .6rem; }
    .slot-sent    { font-size: .55rem; line-height: 1.6; }

    .hand-area h3 { font-size: .62rem; }

    .c-badge { font-size: .45rem; letter-spacing: 0; display: inline-flex; align-items: center; gap: 3px; }
    /* Suit glyphs come from a fallback font (Press Start 2P has none), so they
       look tiny next to the pixel text — bump their size and center them. */
    .c-badge .suit { font-size: 1.6em; line-height: 1; }
    .c-lbl   { font-size: .5rem; line-height: 1.5; }
    .c-word  { font-size: .5rem; line-height: 1.4; }
    .c-or    { font-size: .45rem; }
    .c-pts   { font-size: .6rem; }

    .modal h2 { font-size: .9rem; }
    .modal p  { font-size: .55rem; line-height: 1.7; }
    .w-btn    { font-size: .6rem; line-height: 1.4; }

    .draw-sent     { font-size: .7rem; letter-spacing: 0; line-height: 1.5; }
    .draw-timer-n  { font-size: 1.1rem; }
    .db            { font-size: .52rem; }
    .draw-done-btn { font-size: .6rem; letter-spacing: 0; }

    .pts-big  { font-size: 2rem; line-height: 1.2; }
    .sc-chip  { font-size: .5rem; }

    .end-sc h2  { font-size: 1.3rem; }
    .f-row .rk  { font-size: .9rem; }
    .f-row .pn  { font-size: .6rem; line-height: 1.4; }
    .f-row .fp  { font-size: .9rem; }
    .win-banner { font-size: .85rem; line-height: 1.4; }

    /* Pixel-art inline icons (ic()) — render crisp, sit centered with text. */
    .px { display: inline-block; vertical-align: middle; image-rendering: pixelated; -ms-interpolation-mode: nearest-neighbor; }
    .card { position: relative; }
    .c-icon { position: absolute; top: 8px; right: 8px; line-height: 0; }
    .f-row .rk .px { vertical-align: middle; }

    /* Keep the drawing surface smooth, not pixelated. */
    #draw-canvas { image-rendering: auto; }

    /* Mobile: re-apply the responsive shrink on top of the pixel scale. */
    @media(max-width:480px){
      .header h1   { font-size: 1rem !important; }
      .header p    { font-size: .5rem !important; }
      .setup-box h2{ font-size: .8rem !important; }
      .pc-btns .btn{ font-size: .55rem !important; }
      .p-badge     { font-size: .55rem !important; }
      .hint        { font-size: .5rem !important; }
      .draw-sent   { font-size: .6rem !important; }
      .slot-pos .pw{ font-size: .5rem !important; }
      .conn        { font-size: .5rem !important; }
      .pts-big     { font-size: 1.5rem !important; }
      .end-sc h2   { font-size: 1rem !important; }
    }
  </style>
</head>
<body>
<script src="./nav.js"></script>
<div id="app"></div>
<script>
// ══════════════════════ PIXEL-ART ICONS ══════════════════════
// Tiny self-contained pixel-art engine. Each icon is a grid of single-char
// pixels + a palette. ic(name,size) renders it as crisp inline SVG. All art is
// hand-made here (CC0) — to swap any icon for a real asset later, replace the
// grid below or drop an <img> in its place. 'currentColor' pixels inherit the
// surrounding text color so monochrome icons read on light or dark buttons.
const MEDAL_G = [
  "R.....R.",
  "R.....R.",
  ".R...R..",
  ".DDDDD..",
  "DDDDDDD.",
  "DDnnnDD.",
  "DDDDDDD.",
  ".DDDDD..",
];
const PX = {
  // ── Card category icons ──

function ic(name, size) {
  const d = PX[name];
  if (!d) return '';
  const g = d.g, p = d.p, h = g.length;
  let w = 0; for (const r of g) if (r.length > w) w = r.length;
  let rects = '';
  for (let y = 0; y < h; y++) {
    const row = g[y];
    for (let xx = 0; xx < row.length; xx++) {
      const ch = row[xx];
      if (ch === '.' || ch === ' ') continue;
      const col = p[ch]; if (!col) continue;
      rects += `<rect x="${xx}" y="${y}" width="1" height="1" fill="${col}"/>`;
    }
  }
  size = size || 16;
  const hpx = Math.round(size * h / w);
  return `<svg class="px" width="${size}" height="${hpx}" viewBox="0 0 ${w} ${h}" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">${rects}</svg>`;
}

// Suit symbols per type (nouns get alternating ♠/♣)
const SUIT_SYM = {noun:['♠','♣'], verb:['♦'], prep:['♥']};

function buildDeck() {
  const deck = []; let id = 0;
  const rnd  = a => a[Math.floor(Math.random()*a.length)];
  function rndTwo(a) {
    const i=Math.floor(Math.random()*a.length);
    let j=Math.floor(Math.random()*(a.length-1));
    if(j>=i) j++;
    return [a[i], a[j]];
  }
  CARD_DEFS.forEach(d => {
    const copies = d.copies || 2;
    const suits  = SUIT_SYM[d.type];
    for (let i=0; i<copies; i++) {
      let oA, oB;
      if      (d.fxA)  { oA=d.fxA; oB=d.fxB; }
      else if (d.cat)  { [oA,oB]=rndTwo(WORDS[d.cat]); }
      else             { oA=rnd(WORDS[d.catA]); oB=rnd(WORDS[d.catB]); }
      deck.push({id:id++, type:d.type, label:d.label, oA, oB, pts:d.pts,
                 suit:suits[i%suits.length]});
    }
  });
  return shuffle(deck);
}

function shuffle(a) {
  a = [...a];
  for (let i=a.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

let G = null;

function newGame(names) {
  const deck = buildDeck();
  const players = names.map((name,i) => ({
    id:i, name, hand:[], score:0,
    color:['#ef4444','#3b82f6','#22c55e','#f97316'][i]
  }));
  players.forEach(p => { for(let j=0;j<3;j++) if(deck.length) p.hand.push(deck.pop()); });
  G = {
    phase:'game', players,
    ci:0,   // currentPlayerIndex
    deck, disc:[],
    slots: players.map((_,i) => mkSlot(i+1)),   // ★ one slot per player
    sc: players.length,                           // slot counter
    selId:null, pendSlot:null, pendPos:null,
    wildPos:null, wildWord:'', wordInput:'',
    doneSlot:null, lastCards:[], ptsEarned:0,
    log:'', timerInt:null, timerSecs:60,
  };
}

function mkSlot(id) {
  return {id, pos:{n1:null,v:null,p:null,n2:null}, played:[], done:false};
}

// ★ Free play: card can go in any open matching position
function canPlay(card, slot) {
  if (slot.done) return false;
  if (card.type==='wild') return Object.values(slot.pos).some(x=>!x);
  const map = {noun:['n1','n2'], verb:['v'], prep:['p']};
  return (map[card.type]||[]).some(k => !slot.pos[k]);
}

// For non-wild: first available matching position
function targetPos(card, slot) {
  if (card.type==='verb') return 'v';
  if (card.type==='prep') return 'p';
  if (card.type==='noun') return !slot.pos.n1 ? 'n1' : 'n2';
  return null;
}

const posLabel = {n1:'NOUN 1', v:'VERB', p:'PREP', n2:'NOUN 2'};
const posLong  = {n1:'noun', v:'verb', p:'preposition', n2:'noun'};

function cp() { return G.players[G.ci]; }

function buildSent(slot) {
  const {n1,v,p,n2} = slot.pos;
  const a1 = /^[aeiou]/i.test(n1||'') ? 'An':'A';
  const a2 = /^[aeiou]/i.test(n2||'') ? 'an':'a';
  return [(n1?`${a1} ${n1}`:'___'), (v||'___'), (p||'___'), (n2?`${a2} ${n2}`:'___')].join(' ');
}

// ══════════════════════ ACTIONS ══════════════════════
function selectCard(cid) {
  if (G.phase!=='game') return;
  const card = cp().hand.find(c=>c.id===cid);
  if (!card) return;
  const valid = G.slots.filter(s=>canPlay(card,s));
  if (!valid.length) { SFX.cancel(); G.log="That card has no valid position right now!"; render(); return; }
  SFX.cardPick();
  G.selId = cid; G.log='';
  if (valid.length===1) playTo(cid, valid[0].id);
  else { G.log='Click a sentence to play this card there.'; render(); }
}

function selectSlot(sid) {
  if (G.phase!=='game'||G.selId===null) return;
  const card = cp().hand.find(c=>c.id===G.selId);
  const slot = G.slots.find(s=>s.id===sid);
  if (!card||!slot||!canPlay(card,slot)) { G.log="Can't play there!"; render(); return; }
  playTo(G.selId, sid);
}

function playTo(cid, sid) {
  G.pendSlot = sid;
  const card = cp().hand.find(c=>c.id===cid);
  const slot = G.slots.find(s=>s.id===sid);
  if (card.type==='wild') {
    SFX.wildCard();
    const empties = ['n1','v','p','n2'].filter(k=>!slot.pos[k]);
    G.wildPos  = empties.length===1 ? empties[0] : null;
    G.wildWord = '';
    G.phase = 'wild-choice';
    render(); return;
  }
  G.pendPos = targetPos(card, slot);
  G.phase = 'word-choice';
  render();
}

function chooseWord(word) { commit(word); }
function commitWord() {
  const w = G.wordInput.trim(); if (!w) return;
  commit(w);
}

function setWildPos(pos) { G.wildPos = pos; render(); }

function commitWild() {
  if (!G.wildPos) return;
  const w = G.wildWord.trim(); if (!w) return;
  G.pendPos = G.wildPos;
  commit(w);
}

/* Fly a clone of the just-played hand card from where it sat to the sentence
   slot it landed in — an arc with a little scale-down/pop. DOM analog of the
   canvas card-move animation in the exquisite-corpse game. Easy to disable:
   honour prefers-reduced-motion, and any missing element just no-ops. */
const PREFERS_REDUCED = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);
function flyCardToSlot(node, srcRect, destEl){
  if(!node || !srcRect || !destEl || typeof node.animate!=='function') return;
  const d=destEl.getBoundingClientRect();
  node.classList.remove('sel','off');
  node.onclick=null;
  node.style.cssText += ';position:fixed;box-sizing:border-box;left:'+srcRect.left+'px;top:'+srcRect.top+'px;width:'+srcRect.width+'px;height:'+srcRect.height+'px;margin:0;z-index:9999;pointer-events:none;transition:none;transform-origin:center center;';
  document.body.appendChild(node);
  const dx=(d.left+d.width/2)-(srcRect.left+srcRect.width/2);
  const dy=(d.top +d.height/2)-(srcRect.top +srcRect.height/2);
  const endScale=Math.max(0.25, d.height/srcRect.height);
  const arc=Math.min(90, Math.abs(dx)*0.25+44);
  destEl.style.visibility='hidden';
  const anim=node.animate([
    { transform:'translate(0,0) scale(1)', offset:0 },
    { transform:'translate('+(dx*0.5)+'px,'+(dy*0.5-arc)+'px) scale('+((1+endScale)/2*1.06)+')', offset:0.55 },
    { transform:'translate('+dx+'px,'+dy+'px) scale('+endScale+')', offset:1 }
  ], { duration:430, easing:'cubic-bezier(.34,1.25,.5,1)', fill:'forwards' });
  const done=()=>{ node.remove(); if(destEl) destEl.style.visibility=''; };
  anim.onfinish=done; anim.oncancel=done;
}

function commit(word) {
  const player = cp();
  // snapshot the played card's on-screen spot before the DOM is rebuilt
  let flySrc=null, flySlot=G.pendSlot, flyPos=G.pendPos;
  if(!PREFERS_REDUCED){
    const el=document.querySelector('.card[data-c="'+G.selId+'"]');
    if(el) flySrc={rect:el.getBoundingClientRect(), node:el.cloneNode(true)};
  }
  const card = player.hand.find(c=>c.id===G.selId);
  const slot  = G.slots.find(s=>s.id===G.pendSlot);

  slot.pos[G.pendPos] = word;
  slot.played.push({cid:card.id, pts:card.pts, word, by:player.id});
  player.hand = player.hand.filter(c=>c.id!==G.selId);
  G.disc.push(card);

  // Refill hand
  if (G.deck.length) {
    player.hand.push(G.deck.pop());
  } else if (G.disc.length) {
    G.deck = shuffle(G.disc); G.disc = [];
    if (G.deck.length) player.hand.push(G.deck.pop());
  }

  G.selId=null; G.pendSlot=null; G.pendPos=null; G.wildPos=null; G.wildWord=''; G.wordInput='';

  SFX.cardPlay();
  const full = ['n1','v','p','n2'].every(k=>slot.pos[k]);
  if (full) {
    SFX.sentenceComplete();
    slot.done = true;
    G.doneSlot = slot;
    G.ptsEarned = slot.played.reduce((s,c)=>s+c.pts,0);
    DS = {drawing:false,lx:0,ly:0,color:'#1a1a2e',size:5,tool:'pen',hist:[],hasDrawn:false};
    G.timerSecs = 60;
    clearInterval(G.timerInt);
    G.phase = 'drawing';
    G.timerInt = setInterval(()=>{
      G.timerSecs--;
      if (G.timerSecs<=0) clearInterval(G.timerInt);
      else if (G.timerSecs<=5) SFX.timerUrgent();
      else if (G.timerSecs<=10) SFX.timerTick();
      tickTimer();
    },1000);
  } else {
    G.phase='game'; advTurn();
  }
  render();
  // after the rebuild, fly the played card into its sentence slot (skip if the
  // sentence completed → the drawing overlay takes over instead)
  if(flySrc && G.phase==='game'){
    const destEl=document.querySelector('.slot-pos[data-slot="'+flySlot+'"][data-pos="'+flyPos+'"]');
    if(destEl) flyCardToSlot(flySrc.node, flySrc.rect, destEl);
  }
}

function tickTimer() {
  const n = document.getElementById('tn');
  const a = document.getElementById('ta');
  if (!n) return;
  n.textContent = G.timerSecs;
  n.className   = 'draw-timer-n' + (G.timerSecs<=10?' urg':'');
  if (a) {
    const r=16,c=2*Math.PI*r;
    a.setAttribute('stroke-dasharray',`${(G.timerSecs/60)*c} ${c}`);
    a.setAttribute('stroke',G.timerSecs>10?'#4ade80':'#fca5a5');
  }
  const btn = document.getElementById('dd-btn');
  if (btn && G.timerSecs<=0) {
    btn.textContent="⏰ Time's Up! Score Points";
    btn.className='draw-done-btn tu';
  }
}

function endDrawing() {
  clearInterval(G.timerInt);
  document.querySelectorAll('.draw-ov').forEach(e=>e.remove());
  G.drawerDrew = DS.hasDrawn;
  G.drawerId   = G.ci;
  if (DS.hasDrawn) {
    SFX.scorePoints();
    cp().score += G.ptsEarned;
  } else {
    SFX.noDrawPenalty();
    // Drawer didn't draw — split points evenly among everyone else
    const others = G.players.filter(p => p.id !== cp().id);
    const share = Math.floor(G.ptsEarned / others.length);
    others.forEach(p => p.score += share);
  }
  G.lastCards = G.doneSlot ? [...G.doneSlot.played] : [];
  G.sc++;
  G.slots = G.slots.map(s => s.id===G.doneSlot.id ? mkSlot(G.sc) : s);
  G.doneSlot = null;
  G.phase = 'score-reveal';
  render();
}

function ackScore() {
  G.phase='game'; advTurn();
  if (G.phase!=='end') {
    const any = G.players.some(p=>p.hand.length>0)||G.deck.length>0;
    if (!any) G.phase='end';
  }
  render();
}

function advTurn() {
  G.ci = (G.ci+1) % G.players.length;
  G.log = '';
  const any = G.players.some(p=>p.hand.length>0)||G.deck.length>0;
  if (!any) G.phase='end';
}

function skipTurn() { G.selId=null; G.log=''; advTurn(); if(G.phase!=='end')G.phase='game'; render(); }

function cancelPlay() {
  SFX.cancel();
  G.selId=null; G.pendSlot=null; G.pendPos=null;
  G.wildPos=null; G.wildWord=''; G.wordInput=''; G.phase='game'; G.log='';
  render();
}

// ══════════════════════ SOUNDS ══════════════════════
let _AC = null;
function getAC() {
  if (!_AC) _AC = new (window.AudioContext || window.webkitAudioContext)();
  if (_AC.state === 'suspended') _AC.resume();
  return _AC;
}
function _tone(ac, t, freq, type, dur, vol, endFreq) {
  const osc = ac.createOscillator(), g = ac.createGain();
  osc.connect(g); g.connect(ac.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, t + dur * 0.75);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  osc.start(t); osc.stop(t + dur + 0.01);
}
const SFX = {
  cardPick() {
    const ac = getAC(), t = ac.currentTime;
    _tone(ac, t, 660, 'sine', 0.08, 0.18, 900);
  },
  cardPlay() {
    const ac = getAC(), t = ac.currentTime;
    _tone(ac, t, 480, 'triangle', 0.14, 0.22, 260);
  },
  wildCard() {
    const ac = getAC(), t = ac.currentTime;
    [523,659,784,1047,1319].forEach((f,i) => _tone(ac, t+i*0.055, f, 'sine', 0.13, 0.2));
  },
  sentenceComplete() {
    const ac = getAC(), t = ac.currentTime;
    [[523,0],[659,0.1],[784,0.2],[1047,0.32]].forEach(([f,dt]) => _tone(ac, t+dt, f, 'sine', 0.22, 0.28));
  },
  drawStart() {
    const ac = getAC(), t = ac.currentTime;
    const buf = ac.createBuffer(1, ac.sampleRate*0.18, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*(1-i/d.length);
    const src = ac.createBufferSource(), g = ac.createGain();
    const flt = ac.createBiquadFilter(); flt.type='bandpass'; flt.frequency.value=1800;
    src.buffer=buf; src.connect(flt); flt.connect(g); g.connect(ac.destination);
    g.gain.setValueAtTime(0.18, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.18);
    src.start(t);
  },
  timerTick() {
    const ac = getAC(), t = ac.currentTime;
    _tone(ac, t, 880, 'square', 0.04, 0.06);
  },
  timerUrgent() {
    const ac = getAC(), t = ac.currentTime;
    _tone(ac, t, 1100, 'square', 0.06, 0.1);
  },
  scorePoints() {
    const ac = getAC(), t = ac.currentTime;
    _tone(ac, t,      880,  'sine', 0.1,  0.22);
    _tone(ac, t+0.1,  1100, 'sine', 0.12, 0.22);
    _tone(ac, t+0.22, 1320, 'sine', 0.18, 0.25);
  },
  noDrawPenalty() {
    const ac = getAC(), t = ac.currentTime;
    [[380,0],[300,0.18],[240,0.36],[190,0.54]].forEach(([f,dt]) => _tone(ac, t+dt, f, 'sawtooth', 0.2, 0.14));
  },
  gameOver() {
    const ac = getAC(), t = ac.currentTime;
    [[392,0],[392,0.12],[392,0.24],[311,0.18],[349,0.36],[392,0.54],[523,0.7]].forEach(
      ([f,dt]) => _tone(ac, t+dt, f, 'square', 0.28, 0.16));
  },
  cancel() {
    const ac = getAC(), t = ac.currentTime;
    _tone(ac, t, 440, 'sine', 0.1, 0.12, 280);
  },
};

// ══════════════════════ CANVAS ══════════════════════
function initCanvas() {
  const cv = document.getElementById('draw-canvas');
  if (!cv) return;
  const wrap = cv.parentElement;
  cv.width  = wrap.offsetWidth  || 800;
  cv.height = wrap.offsetHeight || 500;
  const ctx = cv.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,cv.width,cv.height);
  wireCanvas(cv);
}

function wireCanvas(cv) {
  const ctx = cv.getContext('2d');
  function pos(e) {
    const r=cv.getBoundingClientRect();
    const sx=cv.width/r.width, sy=cv.height/r.height;
    const s=e.touches?e.touches[0]:e;
    return {x:(s.clientX-r.left)*sx, y:(s.clientY-r.top)*sy};
  }
  function dn(e) {
    e.preventDefault(); DS.drawing=true; DS.hasDrawn=true;
    const p=pos(e); DS.lx=p.x; DS.ly=p.y;
    DS.hist.push(ctx.getImageData(0,0,cv.width,cv.height));
    if(DS.hist.length>20) DS.hist.shift();
  }
  function mv(e) {
    e.preventDefault(); if(!DS.drawing) return;
    const p=pos(e);
    ctx.beginPath(); ctx.moveTo(DS.lx,DS.ly); ctx.lineTo(p.x,p.y);
    ctx.strokeStyle = DS.tool==='eraser' ? '#fff' : DS.color;
    ctx.lineWidth   = DS.tool==='eraser' ? DS.size*4 : DS.size;
    ctx.lineCap='round'; ctx.lineJoin='round'; ctx.stroke();
    DS.lx=p.x; DS.ly=p.y;
  }
  function up(e) { e.preventDefault(); DS.drawing=false; }
  cv.addEventListener('pointerdown',dn);
  cv.addEventListener('pointermove',mv);
  cv.addEventListener('pointerup',up);
  cv.addEventListener('pointerleave',up);
  cv.addEventListener('touchstart',dn,{passive:false});
  cv.addEventListener('touchmove',mv,{passive:false});
  cv.addEventListener('touchend',up,{passive:false});
}

function setColor(c) {
  DS.color=c; DS.tool='pen';
  document.querySelectorAll('.sw').forEach(e=>e.classList.toggle('act',e.dataset.c===c));
  document.querySelectorAll('[data-tool]').forEach(e=>e.classList.toggle('act',e.dataset.tool==='pen'));
}
function setSize(s) {
  DS.size=s;
  document.querySelectorAll('.sz-dot').forEach(e=>e.classList.toggle('act',+e.dataset.s===s));
}
function setTool(t) {
  DS.tool=t;
  document.querySelectorAll('[data-tool]').forEach(e=>e.classList.toggle('act',e.dataset.tool===t));
}
function clearCV() {
  const cv=document.getElementById('draw-canvas');
  if(!cv) return;
  const ctx=cv.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,cv.width,cv.height);
}
function undoCV() {
  if(!DS.hist.length) return;
  const cv=document.getElementById('draw-canvas');
  if(!cv) return;
  cv.getContext('2d').putImageData(DS.hist.pop(),0,0);
}

// ══════════════════════ RENDER ══════════════════════
function render() {
  const app=document.getElementById('app');
  app.innerHTML='';
  app.innerHTML=`<div class="header"><h1>WRITE. RIGHT? DRAW IT!</h1><p>${ic('pencil',16)} The wild sentence drawing game</p></div>`;
  if (!G) { rSetup(app); return; }
  switch(G.phase) {
    case 'game':        rGame(app);    break;
    case 'word-choice': rWord(app);    break;
    case 'wild-choice': rWild(app);    break;
    case 'drawing':     rDraw(app);    break;
    case 'score-reveal':rScore(app);   break;
    case 'end':         rEnd(app);     break;
  }
}

// ── Setup ──

// ── Game ──
function rGame(app) {
  const player = cp();

  // Scores
  const sb=mk('div','scoreboard');
  sb.innerHTML=G.players.map(p=>`
    <div class="chip${p.id===G.ci?' active':''}">
      <span style="color:${p.id===G.ci?'#fff':p.color}">${p.id===G.ci?'▶ ':''}${x(p.name)}</span>
      <span class="pts">${p.score}pt${p.score!==1?'s':''}</span>
    </div>`).join('');
  app.appendChild(sb);

  const tb=mk('div','turn-banner');
  tb.style.background=player.color;
  tb.textContent=`${player.name}'s Turn`;
  app.appendChild(tb);

  if (G.log) {
    const n=mk('div','notice n-info'); n.textContent=G.log; app.appendChild(n);
  }

  const dr=mk('div','deck-row');
  app.appendChild(dr);

  // Slots
  const selCard = G.selId!==null ? player.hand.find(c=>c.id===G.selId) : null;
  const ss=mk('div','slots-section');
  ss.innerHTML='<h3>'+ic('note',16)+' Active Sentences</h3>';

  G.slots.forEach(slot=>{
    const playable = selCard && canPlay(selCard, slot);
    const sd=mk('div',`slot-card${playable?' playable':''}`);
    if (playable) sd.onclick=()=>selectSlot(slot.id);

    // Build position boxes
    const rowParts = ['n1','v','p','n2'].map(k=>{
      const val=slot.pos[k];
      const lbl=posLabel[k];
      if (val) {
        const cls = k==='v'?'fv':k==='p'?'fp':'fn';
        return `<div class="slot-pos ${cls}" data-slot="${slot.id}" data-pos="${k}"><span class="pl">${lbl}</span><span class="pw">${x(val)}</span></div>`;
      }
      const isTgt = selCard && playable && (
        selCard.type==='wild' ||
        (selCard.type==='noun'&&(k==='n1'||k==='n2')) ||
        (selCard.type==='verb'&&k==='v') ||
        (selCard.type==='prep'&&k==='p')
      );
      return `<div class="slot-pos${isTgt?' tgt':''}"><span class="pl">${lbl}</span><span class="pw">?</span></div>`;
    });

    const filled=Object.values(slot.pos).filter(Boolean).length;
    sd.innerHTML=`
      <div class="slot-lbl">SENTENCE ${slot.id}${playable?' — click to play here':''}</div>
      <div class="slot-row">${rowParts.join('<span class="conn">+</span>')}</div>
      ${filled>0?`<div class="slot-sent">"${x(buildSent(slot))}"</div>`:''}`;
    ss.appendChild(sd);
  });
  app.appendChild(ss);

  // Hand
  const ha=mk('div','hand-area');
  ha.innerHTML=`<h3>${ic('cards',16)} ${x(player.name)}'s Hand</h3>`;
  const hc=mk('div','hand-cards');
  player.hand.forEach(card=>{
    const isSel=card.id===G.selId;
    const playable=G.slots.some(s=>canPlay(card,s));
    const ce=mk('div',`card ${card.type}-c${isSel?' sel':''}${!playable?' off':''}`);
    ce.dataset.c=card.id;
    if(playable) ce.onclick=()=>selectCard(card.id);
    ce.innerHTML=`
      <div class="c-badge"><span class="suit">${card.suit}</span> ${card.type.toUpperCase()}</div>
      ${CARD_ICON[card.label]?`<div class="c-icon">${ic(CARD_ICON[card.label],26)}</div>`:''}
      <div class="c-lbl">${x(card.label)}</div>
      <div class="c-opts">
        <div class="c-word">${x(card.oA)}</div>
        ${card.oB?`<div class="c-or">or</div><div class="c-word">${x(card.oB)}</div>`:''}
      </div>
      <div class="c-pts">${card.pts}pt${card.pts!==1?'s':''}</div>`;
    hc.appendChild(ce);
  });
  ha.appendChild(hc);
  const sr=mk('div',''); sr.style.cssText='text-align:right;margin-top:12px';
  sr.innerHTML=`<button class="btn btn-sm" onclick="skipTurn()">⏭ Skip Turn</button>`;
  ha.appendChild(sr);
  app.appendChild(ha);
}

// ── Word choice ──
function rWord(app) {
  const card=cp().hand.find(c=>c.id===G.selId);
  if(!card){G.phase='game';render();return;}
  const pl=posLabel[G.pendPos]||'';
  const typ=posLong[G.pendPos]||'word';

  const ov=mk('div','modal-bg');
  ov.innerHTML=`
    <div class="modal">
      <h2>${ic('cards',20)} Play a Word</h2>

        <input type=text id=wi placeholder="Enter a ${typ}…" maxlength=30

// ── Wild choice ──
function rWild(app) {
  const slot=G.slots.find(s=>s.id===G.pendSlot);
  const emp=['n1','v','p','n2'].filter(k=>!slot.pos[k]);
  const pClass={n1:'btn-noun',v:'btn-verb',p:'btn-prep',n2:'btn-noun'};
  const ov=mk('div','modal-bg');
  let body='';
  if(emp.length>1 && !G.wildPos) {
    body=`<p>Which position to fill?</p>
      <div class="pos-grid">${emp.map(k=>`<button class="btn ${pClass[k]}" onclick="setWildPos('${k}')">${posLabel[k]}</button>`).join('')}</div>`;
  } else {
    const pos=G.wildPos||emp[0];
    const typ=posLong[pos];
    body=`
      <p>Filling: <strong>${posLabel[pos]}</strong> — type any ${typ}:</p>
      <div class="wild-row">
        <input type=text id=wi placeholder="Enter a ${typ}…" maxlength=30

      </div>

  ov.innerHTML=`
    <div class="modal">
      <h2>${ic('star',18)} Wild Card!</h2>${body}
      <div style="margin-top:14px"><button class="btn btn-sm" onclick="cancelPlay()">${ic('undo',12)} Cancel</button></div>
    </div>`;
  app.appendChild(ov);
  if(G.wildPos||emp.length===1) setTimeout(()=>document.getElementById('wi')?.focus(),40);

}

// ── Drawing screen ──

  const timesUp=G.timerSecs<=0;

  const COLORS=['#1a1a2e','#ef4444','#3b82f6','#16a34a','#f97316','#9333ea','#eab308','#ec4899','#ffffff'];

  const ov=document.createElement('div');

  ov.innerHTML=`
    <div class="draw-top">

      <div class="draw-timer">
        <svg width=40 height=40 viewBox="0 0 40 40" style="transform:rotate(-90deg)">
          <circle cx=20 cy=20 r="${r}" fill=none stroke="rgba(255,255,255,.15)" stroke-width=4/>
          <circle id=ta cx=20 cy=20 r="${r}" fill=none stroke="${arcCol}" stroke-width=4
            stroke-dasharray="${arc} ${c2pi}" stroke-linecap=round/>

      </div>
    </div>

    <div class="draw-canvas-wrap">
      <canvas id="draw-canvas"></canvas>
    </div>

    <div class="draw-bar">
      <div class="swatches">
        ${COLORS.map(c=>`
          <div class="sw${DS.color===c?' act':''}"
            style="background:${c};${c==='#ffffff'?'border-color:#888;':''}"
            data-c="${c}" onclick="setColor('${c}')"></div>`).join('')}
      </div>
      <div class="bar-div"></div>
      <div class="sz-btns">
        ${SIZES.map(s=>`
          <div class="sz-dot${DS.size===s?' act':''}" data-s="${s}"
            style="width:${Math.max(8,s*1.4)}px;height:${Math.max(8,s*1.4)}px"

      </div>

      <button class="db${DS.tool==='eraser'?' act':''}" data-tool="eraser" onclick="setTool('eraser')">${ic('eraser',14)} Eraser</button>

      <button class="db" onclick="clearCV()">${ic('trash',14)} Clear</button>
      <button id=dd-btn class="draw-done-btn${timesUp?' tu':''} db-ml" onclick="endDrawing()">

      </button>
    </div>`;

  document.body.appendChild(ov);
  SFX.drawStart();
  requestAnimationFrame(()=>{ requestAnimationFrame(initCanvas); });
}

// ── Score reveal ──
function rScore(app) {
  const drawer = G.players[G.drawerId];
  const sc = G.lastCards || [];
  const s = mk('div','score-rv');
  let headline, ptLine;
  if (G.drawerDrew) {
    headline = `<p style="margin-top:6px"><strong style="color:${drawer.color}">${x(drawer.name)}</strong> drew it — all points go to the drawer!</p>`;
    ptLine   = `<p style="color:#555;margin-top:12px">${x(drawer.name)}'s total: <strong style="font-family:'Press Start 2P';font-size:.85rem">${drawer.score}pts</strong></p>`;
  } else {
    const others = G.players.filter(p => p.id !== drawer.id);
    const share  = Math.floor(G.ptsEarned / others.length);
    headline = `<p style="margin-top:6px"><strong style="color:${drawer.color}">${x(drawer.name)}</strong> didn't draw — everyone else gets ${share} pts each!</p>`;
    ptLine   = others.map(p=>`<p style="color:#555;margin-top:4px">${x(p.name)}: <strong style="font-family:'Press Start 2P';font-size:.75rem">${p.score}pts</strong></p>`).join('');
  }
  s.innerHTML=`
    <h2>${ic('trophy',20)} Points Scored!</h2>
    ${headline}
    <div class="pts-big">+${G.ptsEarned} pts</div>
    <p style="color:#555;margin-bottom:8px">Cards in that sentence:</p>
    <div class="cards-sc">
      ${sc.map(c=>`<span class="sc-chip" style="background:#fff;border-color:${G.players[c.by]?.color||'#333'}">
        "${x(c.word)}" +${c.pts}pt — ${x(G.players[c.by]?.name||'?')}
      </span>`).join('')}
    </div>
    ${ptLine}
    <div style="margin-top:20px">
      <button class="btn btn-green btn-lg" onclick="ackScore()">▶ Next Player's Turn</button>
    </div>`;
  app.appendChild(s);
}

    <div class="win-banner">${ic('trophy',18)} ${x(sorted[0].name)} wins with ${sorted[0].score} points!</div>
    <div class="final-tbl">
      ${sorted.map((p,i)=>`
        <div class="f-row${i===0?' w':''}">
          <span class="rk">${[ic('medalGold',20),ic('medalSilver',20),ic('medalBronze',20),'4'][i]||(i+1)}</span>
          <span class="pn" style="color:${p.color}">${x(p.name)}</span>
          <span class="fp">${p.score}pts</span>
        </div>`).join('')}
    </div>
    <button class="btn btn-accent btn-lg" onclick="resetGame()">${ic('reload',16)} Play Again</button>`;
  app.appendChild(s);
}

function resetGame() {
  if(G?.timerInt) clearInterval(G.timerInt);
  document.querySelectorAll('.draw-ov').forEach(e=>e.remove());
  G=null; render();
}

// ── Utils ──
function mk(tag,cls) { const e=document.createElement(tag); if(cls)e.className=cls; return e; }
function x(s) {
  if(!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

render();
</script>
</body>
</html>
