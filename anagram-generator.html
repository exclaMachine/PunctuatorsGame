<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentence Anagram Generator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #f7f6f2;
      color: #1a1a18;
      min-height: 100vh;
      padding: 2.5rem 1rem;
    }

    .container {
      max-width: 740px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 2rem;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.4px;
      color: #1a1a18;
    }

    .subtitle {
      font-size: 13px;
      color: #6b6b65;
      margin-top: 5px;
    }

    .section {
      margin-bottom: 1.25rem;
    }

    .label {
      font-size: 11px;
      color: #6b6b65;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 7px;
    }

    .wordlist-status {
      font-size: 13px;
      color: #6b6b65;
      padding: 6px 0;
    }

    .wordlist-status.ready { color: #2a7a4b; font-weight: 600; }
    .wordlist-status.error { color: #b83232; }

    textarea {
      width: 100%;
      resize: vertical;
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #c4c3bc;
      background: #ffffff;
      color: #1a1a18;
      line-height: 1.5;
      transition: border-color 0.15s;
    }

    textarea:focus {
      outline: none;
      border-color: #888882;
    }

    .letter-preview {
      font-size: 12px;
      color: #888882;
      padding: 5px 0 0;
      letter-spacing: 0.06em;
      min-height: 20px;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      font-family: 'Courier New', Courier, monospace;
      cursor: pointer;
      border-radius: 7px;
      font-size: 14px;
      padding: 8px 18px;
      transition: background 0.12s, opacity 0.12s;
    }

    .btn-primary {
      border: 1px solid #c4c3bc;
      background: #ffffff;
      color: #1a1a18;
    }

    .btn-primary:hover:not(:disabled) {
      background: #eeeee8;
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: default;
    }

    .btn-danger {
      border: 1px solid #e2a0a0;
      background: transparent;
      color: #b83232;
      display: none;
    }

    .btn-danger:hover {
      background: #fdf0f0;
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .filter-label {
      font-size: 12px;
      color: #6b6b65;
    }

    select {
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      padding: 6px 10px;
      border-radius: 7px;
      border: 1px solid #c4c3bc;
      background: #ffffff;
      color: #1a1a18;
    }

    .status-bar {
      font-size: 13px;
      color: #6b6b65;
      padding: 8px 0;
      min-height: 30px;
    }

    .status-count {
      color: #1a1a18;
      font-weight: 700;
    }

    .results-tree {
      max-height: 500px;
      overflow-y: auto;
      border: 1px solid #c4c3bc;
      border-radius: 8px;
      padding: 8px;
      background: #eeeee8;
    }

    .tree-group {
      background: #fff;
      border: 1px solid #ddddd6;
      border-radius: 6px;
      margin-bottom: 5px;
    }

    .tree-group:last-child { margin-bottom: 0; }

    .tree-header {
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      color: #1a1a18;
      padding: 8px 10px;
      cursor: pointer;
      user-select: none;
    }

    .tree-header:hover { background: #f5f5f0; border-radius: 6px; }
    .tree-header.open  { background: #eeeee8; border-radius: 6px 6px 0 0; }

    .tree-header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tree-meta {
      font-size: 11px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tree-children {
      display: none;
      border-top: 1px solid #eee;
      background: #fafaf8;
      border-radius: 0 0 6px 6px;
      padding: 4px 6px;
    }

    .tree-children.open { display: block; }

    .tree-child {
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px;
      color: #2a2a28;
      padding: 5px 8px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tree-child:hover { background: #eeeee8; }

    .tree-badge { font-size: 11px; color: #aaa; }

    #resultsContainer {
      display: none;
    }

    .search-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .search-row input {
      flex: 1;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      padding: 7px 10px;
      border-radius: 7px;
      border: 1px solid #c4c3bc;
      background: #fff;
      color: #1a1a18;
    }

    .search-row input:focus {
      outline: none;
      border-color: #888882;
    }

    .label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
    }

    .label-row .label { margin-bottom: 0; }

    .btn-subtle {
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      color: #6b6b65;
      background: none;
      border: 1px solid #c4c3bc;
      border-radius: 5px;
      padding: 3px 8px;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }

    .btn-subtle:hover:not(:disabled) { background: #eeeee8; color: #1a1a18; }
    .btn-subtle:disabled { opacity: 0.5; cursor: default; }

    .idiom-status {
      font-size: 11px;
      color: #888882;
      font-style: italic;
      padding: 4px 0 0;
      min-height: 16px;
    }

    .search-count {
      font-size: 12px;
      color: #888882;
      white-space: nowrap;
      min-width: 80px;
      text-align: right;
    }

    .spinner {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 1.5px solid #ccc;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 6px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">Sentence Anagram Generator</div>
      <div class="subtitle">Uses every letter — finds all valid word combinations</div>
    </div>

    <div class="section">
      <div class="label">Word list</div>
      <div id="wordlistStatus" class="wordlist-status">Loading enable1.txt…</div>
    </div>

    <div class="section">
      <div class="label-row">
        <div class="label">Phrase or sentence</div>
        <button class="btn-subtle" id="idiomBtn">Today's idiom</button>
      </div>
      <textarea id="phraseInput" rows="3" placeholder="e.g. listen"></textarea>
      <div id="idiomStatus" class="idiom-status"></div>
      <div id="letterPreview" class="letter-preview"></div>
    </div>

    <div class="controls">
      <button class="btn-primary" id="generateBtn" disabled>Generate anagrams</button>
      <button class="btn-danger" id="cancelBtn">Stop</button>
      <div class="filter-row">
        <span class="filter-label">min word length</span>
        <select id="minLen">
          <option value="2">2</option>
          <option value="3" selected>3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
      </div>
    </div>

    <div id="statusBar" class="status-bar"></div>

    <div id="resultsContainer">
      <div class="search-row">
        <input type="text" id="searchInput" placeholder="Filter results…" autocomplete="off" />
        <span id="searchCount" class="search-count"></span>
      </div>
      <div class="results-tree" id="resultsGrid"></div>
    </div>
  </div>

  <script>
    (function () {
      const wordlistStatus = document.getElementById('wordlistStatus');
      const phraseInput   = document.getElementById('phraseInput');
      const letterPreview = document.getElementById('letterPreview');
      const generateBtn   = document.getElementById('generateBtn');
      const cancelBtn     = document.getElementById('cancelBtn');
      const statusBar     = document.getElementById('statusBar');
      const resultsContainer = document.getElementById('resultsContainer');
      const resultsGrid   = document.getElementById('resultsGrid');
      const minLenSel     = document.getElementById('minLen');
      const searchInput   = document.getElementById('searchInput');
      const searchCount   = document.getElementById('searchCount');
      const idiomBtn      = document.getElementById('idiomBtn');
      const idiomStatus   = document.getElementById('idiomStatus');

      const CHUNK = 80;

      let wordList   = null;
      let cancelFlag = false;
      let openGroups = new Set();

      /* ---------- search filter ---------- */

      function applySearch() {
        const q = searchInput.value.trim().toLowerCase();
        const groups = resultsGrid.querySelectorAll('.tree-group');
        let visibleCombos = 0;

        groups.forEach(groupDiv => {
          const header   = groupDiv.querySelector('.tree-header');
          const children = groupDiv.querySelector('.tree-children');
          const key      = groupDiv.dataset.key;
          const childDivs = children.querySelectorAll('.tree-child');

          if (!q) {
            groupDiv.style.display = '';
            childDivs.forEach(c => c.style.display = '');
            const isOpen = openGroups.has(key);
            children.classList.toggle('open', isOpen);
            header.classList.toggle('open', isOpen);
            visibleCombos += childDivs.length;
            return;
          }

          let matchCount = 0;
          if (key.includes(q)) {
            childDivs.forEach(c => c.style.display = '');
            matchCount = childDivs.length;
          } else {
            childDivs.forEach(child => {
              const matches = child.dataset.combo.includes(q);
              child.style.display = matches ? '' : 'none';
              if (matches) matchCount++;
            });
          }

          if (matchCount > 0) {
            groupDiv.style.display = '';
            children.classList.add('open');
            header.classList.add('open');
            visibleCombos += matchCount;
          } else {
            groupDiv.style.display = 'none';
          }
        });

        searchCount.textContent = q
          ? visibleCombos.toLocaleString() + ' match' + (visibleCombos !== 1 ? 'es' : '')
          : '';
      }

      searchInput.addEventListener('input', applySearch);

      /* ---------- helpers ---------- */

      function letterFreq(str) {
        const f = {};
        for (const c of str) {
          if (c >= 'a' && c <= 'z') f[c] = (f[c] || 0) + 1;
        }
        return f;
      }

      function canForm(wordFreq, avail) {
        for (const c in wordFreq) {
          if ((avail[c] || 0) < wordFreq[c]) return false;
        }
        return true;
      }

      function subtract(avail, wordFreq) {
        const r = Object.assign({}, avail);
        for (const c in wordFreq) {
          r[c] -= wordFreq[c];
          if (r[c] === 0) delete r[c];
        }
        return r;
      }

      /* ---------- recursive generator ---------- */

      function* searchGen(avail, cands, cur) {
        if (Object.keys(avail).length === 0) {
          yield cur.slice();
          return;
        }
        for (let i = 0; i < cands.length; i++) {
          const { word, freq } = cands[i];
          if (canForm(freq, avail)) {
            cur.push(word);
            yield* searchGen(subtract(avail, freq), cands.slice(i), cur);
            cur.pop();
          }
        }
      }

      /* ---------- load word list from project ---------- */
      //possible anagram idioms -> put a sock in it -> pick at it on us
      //chew the fat -> hew the fact
      //its all greek to me -> tiresome talk gel
      //build on sand -> island bound
      //beat a dead horse
      //fetch('./enable1.txt')
      fetch('./2of12.txt')
        .then(r => {
          if (!r.ok) throw new Error(r.statusText);
          return r.text();
        })
        .then(text => {
          wordList = text
            .split(/\r?\n/)
            .map(w => w.trim().toLowerCase())
            .filter(w => /^[a-z]+$/.test(w));
          wordlistStatus.textContent = wordList.length.toLocaleString() + ' words loaded ✓';
          wordlistStatus.className = 'wordlist-status ready';
          if (phraseInput.value.trim()) generateBtn.disabled = false;
        })
        .catch(err => {
          wordlistStatus.textContent = 'Failed to load enable1.txt: ' + err.message;
          wordlistStatus.className = 'wordlist-status error';
        });

      /* ---------- daily idiom ---------- */

      async function fetchIdiomList() {
        const CACHE_KEY = 'wkt_3word_idioms_v1';
        const CACHE_TTL = 7 * 24 * 60 * 60 * 1000; // 7 days

        try {
          const raw = localStorage.getItem(CACHE_KEY);
          if (raw) {
            const { ts, idioms } = JSON.parse(raw);
            if (Date.now() - ts < CACHE_TTL && idioms.length > 0) return idioms;
          }
        } catch (_) {}

        const idioms = [];
        let cont = '';

        for (let page = 0; page < 3; page++) {
          let url = 'https://en.wiktionary.org/w/api.php?action=query&list=categorymembers' +
                    '&cmtitle=Category:English_idioms&cmlimit=500&format=json&origin=*';
          if (cont) url += '&cmcontinue=' + encodeURIComponent(cont);

          const r = await fetch(url);
          if (!r.ok) break;
          const data = await r.json();

          for (const { title } of (data?.query?.categorymembers ?? [])) {
            const t = title.trim();
            // exactly 3 words, no slashes, parens, or digits
            if (t.split(/\s+/).length === 3 && !/[\/\(\)\d]/.test(t)) {
              idioms.push(t);
            }
          }

          cont = data?.continue?.cmcontinue ?? '';
          if (!cont) break;
        }

        if (idioms.length > 0) {
          try { localStorage.setItem(CACHE_KEY, JSON.stringify({ ts: Date.now(), idioms })); } catch (_) {}
        }

        return idioms;
      }

      async function loadDailyIdiom() {
        idiomBtn.disabled = true;
        idiomBtn.textContent = 'loading…';
        try {
          const idioms = await fetchIdiomList();
          if (!idioms.length) throw new Error('empty');
          const day   = Math.floor(Date.now() / 86400000);
          const idiom = idioms[day % idioms.length];
          phraseInput.value = idiom;
          phraseInput.dispatchEvent(new Event('input'));
          idiomStatus.textContent = 'Suggested by Wiktionary · edit freely';
        } catch (_) {
          idiomStatus.textContent = '';
        } finally {
          idiomBtn.disabled = false;
          idiomBtn.textContent = "Today's idiom";
        }
      }

      idiomBtn.addEventListener('click', loadDailyIdiom);

      // Auto-fill on load — fails silently if offline or API unavailable
      loadDailyIdiom();

      /* ---------- phrase input ---------- */

      phraseInput.addEventListener('input', () => {
        const clean = phraseInput.value.toLowerCase().replace(/[^a-z]/g, '');
        if (clean.length > 0) {
          const sorted = clean.split('').sort().join(' ');
          letterPreview.textContent = clean.length + ' letters: ' + sorted;
        } else {
          letterPreview.textContent = '';
        }
        generateBtn.disabled = !(wordList && clean.length > 0);
      });

      /* ---------- generate ---------- */

      generateBtn.addEventListener('click', () => {
        cancelFlag = true;           // stop any in-progress run
        setTimeout(() => {
          cancelFlag = false;
          runSearch();
        }, 20);
      });

      cancelBtn.addEventListener('click', () => {
        cancelFlag = true;
      });

      function runSearch() {
        const phrase = phraseInput.value.toLowerCase().replace(/[^a-z]/g, '');
        if (!phrase || !wordList) return;

        const minLen = parseInt(minLenSel.value, 10);
        const avail  = letterFreq(phrase);

        openGroups.clear();
        searchInput.value = '';
        searchCount.textContent = '';
        resultsContainer.style.display = 'none';
        resultsGrid.innerHTML = '';
        statusBar.innerHTML = '<span class="spinner"></span> Filtering dictionary...';
        generateBtn.disabled = true;
        cancelBtn.style.display = 'inline-block';

        setTimeout(() => {
          // Pre-filter to words formable from the available letters
          const cands = wordList
            .filter(w => w.length >= minLen)
            .map(w => ({ word: w, freq: letterFreq(w) }))
            .filter(({ freq }) => canForm(freq, avail));

          // Longest words first — better pruning
          cands.sort((a, b) => b.word.length - a.word.length);

          if (cands.length === 0) {
            statusBar.textContent = 'No candidate words found for these letters.';
            generateBtn.disabled = false;
            cancelBtn.style.display = 'none';
            return;
          }

          statusBar.innerHTML =
            '<span class="spinner"></span> Searching (' +
            cands.length.toLocaleString() + ' candidate words)...';

          const gen = searchGen(avail, cands, []);
          const accumulated = [];

          function renderResults() {
            resultsGrid.innerHTML = '';

            // Group results by first word
            const groups = new Map();
            for (const r of accumulated) {
              const first = r.split(' ')[0];
              if (!groups.has(first)) groups.set(first, []);
              groups.get(first).push(r);
            }

            const frag = document.createDocumentFragment();

            for (const [key, combos] of groups) {
              const groupDiv = document.createElement('div');
              groupDiv.className = 'tree-group';
              groupDiv.dataset.key = key;

              // Header row
              const header = document.createElement('div');
              const isOpen = openGroups.has(key);
              header.className = 'tree-header' + (isOpen ? ' open' : '');

              const inner = document.createElement('div');
              inner.className = 'tree-header-inner';

              const label = document.createElement('span');
              label.textContent = key;

              const meta = document.createElement('span');
              meta.className = 'tree-meta';
              meta.textContent = combos.length === 1
                ? '1 combo  ▶'
                : combos.length + ' combos  ▶';

              inner.appendChild(label);
              inner.appendChild(meta);
              header.appendChild(inner);

              // Children list
              const children = document.createElement('div');
              children.className = 'tree-children' + (isOpen ? ' open' : '');

              for (const combo of combos) {
                const child = document.createElement('div');
                child.className = 'tree-child';
                child.dataset.combo = combo;
                const c1 = document.createElement('span');
                c1.textContent = combo;
                const c2 = document.createElement('span');
                c2.className = 'tree-badge';
                c2.textContent = combo.split(' ').length + 'w';
                child.appendChild(c1);
                child.appendChild(c2);
                children.appendChild(child);
              }

              header.addEventListener('click', () => {
                const nowOpen = children.classList.toggle('open');
                header.classList.toggle('open', nowOpen);
                nowOpen ? openGroups.add(key) : openGroups.delete(key);
              });

              groupDiv.appendChild(header);
              groupDiv.appendChild(children);
              frag.appendChild(groupDiv);
            }

            resultsGrid.appendChild(frag);
            resultsContainer.style.display = 'block';
            if (searchInput.value.trim()) applySearch();
          }

          function finish(msg) {
            statusBar.innerHTML = msg;
            renderResults();
            generateBtn.disabled = false;
            cancelBtn.style.display = 'none';
          }

          function tick() {
            if (cancelFlag) {
              finish('<span class="status-count">' + accumulated.length.toLocaleString() + '</span> results (stopped)');
              return;
            }

            let count = 0;
            let done = false;

            while (count < CHUNK) {
              const next = gen.next();
              if (next.done) { done = true; break; }
              accumulated.push(next.value.join(' '));
              count++;
            }

            if (done) {
              finish(
                '<span class="status-count">' + accumulated.length.toLocaleString() + '</span> anagram' +
                (accumulated.length !== 1 ? 's' : '') + ' found'
              );
            } else {
              // Partial render every 200 results so the user sees progress
              if (accumulated.length > 0 && accumulated.length % 200 === 0) renderResults();
              statusBar.innerHTML =
                '<span class="spinner"></span> Found <span class="status-count">' +
                accumulated.length.toLocaleString() + '</span> so far...';
              setTimeout(tick, 0);
            }
          }

          setTimeout(tick, 0);
        }, 30);
      }
    })();
  </script>
</body>
</html>
