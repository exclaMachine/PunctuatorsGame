<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPIN NIdS</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4ef;
    --bg2: #eceae2;
    --bg3: #ffffff;
    --text: #2c2c2a;
    --text2: #5f5e5a;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --accent: #534ab7;
    --accent-bg: #eeedfe;
    --green: #0f6e56;
    --green-bg: rgba(15,110,86,0.12);
    --red: #a32d2d;
    --red-bg: rgba(163,45,45,0.1);
    --amber: #854f0b;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg2: #2c2c2a;
      --bg3: #242422;
      --text: #d3d1c7;
      --text2: #888780;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.2);
      --accent: #afa9ec;
      --accent-bg: #26215c;
      --green: #5dcaa5;
      --green-bg: rgba(93,202,165,0.15);
      --red: #f09595;
      --red-bg: rgba(240,149,149,0.12);
      --amber: #ef9f27;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 12px;
  }

  h1 {
    font-size: clamp(28px, 8vw, 42px);
    font-weight: 700;
    margin-bottom: 2px;
    letter-spacing: 1px;
    line-height: 1.1;
  }
  h1 .si { font-family: Georgia, 'Times New Roman', serif; }

  @keyframes title-spin {
    0%   { transform: rotateZ(0deg); }
    100% { transform: rotateZ(180deg); }
  }
  h1 { animation: title-spin 0.7s cubic-bezier(0.4, 0, 0.2, 1) 0.3s 1 both; }

  h2 {
    font-size: clamp(12px, 3.5vw, 16px);
    font-weight: 400;
    color: var(--text2);
    margin-bottom: 6px;
    letter-spacing: 0.2px;
  }

  .subtitle {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 18px;
  }

  .game-wrap {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 860px;
  }

  .left { flex: 0 0 auto; }
  .right {
    flex: 1;
    min-width: 200px;
    max-width: 280px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  canvas { display: block; border-radius: 10px; border: 0.5px solid var(--border); cursor: pointer; }

  /* --- Hand tiles --- */
  .hand-label { font-size: 11px; color: var(--text2); margin: 10px 0 5px; }
  .hand-row { display: flex; flex-wrap: wrap; gap: 7px; }

  /* --- Controls --- */
  .ctrls { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .mode-row { display: flex; gap: 6px; margin-top: 6px; }

  button {
    font-size: 12px;
    padding: 6px 11px;
    border: 0.5px solid var(--border2);
    border-radius: 7px;
    background: var(--bg3);
    color: var(--text);
    cursor: pointer;
    user-select: none;
    transition: background 0.1s;
  }
  button:hover { background: var(--bg2); }
  button.on {
    background: var(--accent-bg);
    color: var(--accent);
    border-color: var(--accent);
  }

  /* --- Word bar --- */
  .word-bar {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 9px;
    padding: 9px 14px;
    min-height: 50px;
    font-family: 'Courier New', monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 5px;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 2px;
  }
  .word-bar .placeholder { font-size: 13px; font-weight: 400; color: var(--text2); letter-spacing: 0; font-family: inherit; }
  .wl { display: inline-block; padding: 0 1px; border-radius: 3px; }
  .wl.ok { color: var(--green); background: var(--green-bg); }
  .wl.no { color: var(--red); background: var(--red-bg); }

  .status { font-size: 12px; color: var(--text2); min-height: 18px; margin-top: 2px; }
  .status.ok { color: var(--green); }
  .status.err { color: var(--red); }
  .status.warn { color: var(--amber); }

  /* --- Score / timer / tier --- */
  .score-bar { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .score { font-size: 13px; font-weight: 600; color: var(--text); }
  .timer { font-size: 13px; font-weight: 500; color: var(--text2); font-variant-numeric: tabular-nums; }
  .tier {
    font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 8px;
    background: var(--accent-bg); color: var(--accent); letter-spacing: 0.3px;
  }
  .tier.new-tier { animation: tier-pop 0.5s ease-out; }
  @keyframes tier-pop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.25); }
    100% { transform: scale(1); }
  }
  .chips { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
  .chip {
    font-size: 12px; padding: 2px 9px; border-radius: 10px;
    background: var(--accent-bg); color: var(--accent);
    font-family: monospace; font-weight: 500;
    display: inline-block;
  }

  /* Ambigram chip variants */
  .chip-rot  { background: #fdf3dc; color: #8a5f00; }
  .chip-mirh { background: #f0eaff; color: #6230c2; }
  .chip-mirv { background: #ddf6f0; color: #0a6648; }
  @media (prefers-color-scheme: dark) {
    .chip-rot  { background: #3a2e0a; color: #f0c040; }
    .chip-mirh { background: #251950; color: #c4aeff; }
    .chip-mirv { background: #0b2e25; color: #5dcaa5; }
  }

  /* Two-face chip: cback is counter-rotated so it reads correctly when parent is at 180° */
  .chip .cback {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    border-radius: inherit; background: inherit; color: inherit;
    opacity: 0;
  }
  /* Shared text crossfade — timed to swap when container is edge-on */
  @keyframes cf-front { 0%,38%{opacity:1} 48%,88%{opacity:0} 98%,100%{opacity:1} }
  @keyframes cf-back  { 0%,38%{opacity:0} 48%,88%{opacity:1} 98%,100%{opacity:0} }

  /* Rotational: two consecutive 180° CW spins with a longer pause in between */
  .chip-rot .cback { transform: rotateZ(180deg); }
  @keyframes rot-wrap {
    0%, 18%  { transform: rotateZ(0deg); }
    33%      { transform: rotateZ(180deg); }
    58%      { transform: rotateZ(180deg); }
    73%, 100%{ transform: rotateZ(360deg); }
  }
  @keyframes cf-rot-front { 0%,21%{opacity:1} 30%,61%{opacity:0} 70%,100%{opacity:1} }
  @keyframes cf-rot-back  { 0%,21%{opacity:0} 30%,61%{opacity:1} 70%,100%{opacity:0} }
  .chip-rot         { animation: rot-wrap      4s ease-in-out infinite; }
  .chip-rot .cfront { animation: cf-rot-front  4s ease-in-out infinite; }
  .chip-rot .cback  { animation: cf-rot-back   4s ease-in-out infinite; }

  /* Mirror H: flip around Y-axis */
  .chip-mirh .cback { transform: perspective(200px) rotateY(180deg); }
  @keyframes mirh-wrap { 0%,25%{transform:perspective(200px) rotateY(0deg)} 45%,55%{transform:perspective(200px) rotateY(180deg)} 75%,100%{transform:perspective(200px) rotateY(0deg)} }
  .chip-mirh         { animation: mirh-wrap 3.5s ease-in-out infinite; }
  .chip-mirh .cfront { animation: cf-front  3.5s ease-in-out infinite; }
  .chip-mirh .cback  { animation: cf-back   3.5s ease-in-out infinite; }

  /* Mirror V: flip around X-axis */
  .chip-mirv .cback { transform: perspective(200px) rotateX(180deg); }
  @keyframes mirv-wrap { 0%,25%{transform:perspective(200px) rotateX(0deg)} 45%,55%{transform:perspective(200px) rotateX(180deg)} 75%,100%{transform:perspective(200px) rotateX(0deg)} }
  .chip-mirv         { animation: mirv-wrap 3.5s ease-in-out infinite; }
  .chip-mirv .cfront { animation: cf-front  3.5s ease-in-out infinite; }
  .chip-mirv .cback  { animation: cf-back   3.5s ease-in-out infinite; }

  /* --- Mode selector --- */
  .mode-section { border: 0.5px solid var(--border); border-radius: 9px; padding: 10px 12px; background: var(--bg3); }
  .mode-section h3 { font-size: 12px; font-weight: 500; margin-bottom: 8px; color: var(--text2); }
  .mode-option { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 7px; cursor: pointer; }
  .mode-option:last-child { margin-bottom: 0; }
  .mode-option input[type=radio] { margin-top: 2px; accent-color: var(--accent); }
  .mode-option .label { font-size: 12px; font-weight: 500; }
  .mode-option .desc { font-size: 11px; color: var(--text2); }

  /* --- Reference --- */
  .ref {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: 9px;
    padding: 9px 12px;
    font-size: 11px;
    color: var(--text2);
    line-height: 1.85;
    font-family: monospace;
  }
  .ref b { font-family: -apple-system, sans-serif; font-size: 11px; font-weight: 500; color: var(--text); display: block; margin-bottom: 1px; }
  .ref b:not(:first-child) { margin-top: 6px; }
  kbd {
    display: inline-block; padding: 1px 5px; border: 0.5px solid var(--border2);
    border-radius: 4px; font-family: monospace; font-size: 10px; background: var(--bg3);
  }

  /* Loading overlay */
  #loading {
    position: fixed; inset: 0; background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; z-index: 100;
    font-size: 14px; color: var(--text2);
  }

  /* Win overlay */
  #win-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
  }
  #win-overlay.visible { opacity: 1; pointer-events: auto; }
  #win-box {
    background: var(--bg3); border-radius: 18px; padding: 36px 40px;
    text-align: center; max-width: 340px; width: 90%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.35);
    transform: scale(0.85); transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  #win-overlay.visible #win-box { transform: scale(1); }
  #win-trophy { font-size: 56px; margin-bottom: 10px; }
  #win-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; color: var(--accent); }
  #win-stats { font-size: 14px; color: var(--text2); margin-bottom: 22px; line-height: 1.7; }
  #win-again {
    background: var(--accent); color: #fff; border: none; border-radius: 10px;
    padding: 12px 28px; font-size: 16px; font-weight: 600; cursor: pointer;
    transition: opacity 0.15s;
  }
  #win-again:hover { opacity: 0.85; }
  .spinner {
    width: 28px; height: 28px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span>Loading word list…</span>
</div>

<div id="win-overlay">
  <div id="win-box">
    <div id="win-trophy">🏆</div>
    <div id="win-title">Ambigram Ace!</div>
    <div id="win-stats"></div>
    <button id="win-again">Play Again</button>
  </div>
</div>

<h1>SP<span class="si">I</span>N N<span class="si">I</span>dS</h1>
<h2>An Ambigram Word Game</h2>
<p class="subtitle">Spin tiles to transform letters & make words from the grid!</p>

<div class="game-wrap">
  <div class="left">
    <canvas id="gc"></canvas>
    <div class="ctrls">
      <button id="bsub">Enter ✓</button>
      <button id="bclr">⌫ Clear</button>
      <button id="bflip">⟷ Flip</button>
      <button id="bflipv">↕ Flip</button>
    </div>
    <div class="status" id="st"></div>
  </div>

  <div class="right">
    <div class="score-bar">
      <div class="score" id="score">Score: 0</div>
      <div class="timer" id="timer">0:00</div>
      <div class="tier" id="tier" style="display:none"></div>
    </div>
    <div class="word-bar" id="wb"><span class="placeholder">start selecting letters…</span></div>
    <div class="chips" id="chips"></div>

    <div class="mode-section">
      <h3>Difficulty mode</h3>
      <label class="mode-option">
        <input type="radio" name="mode" value="free" checked>
        <div><div class="label">Any letter (beginner)</div><div class="desc">Any letter from anywhere on the board</div></div>
      </label>
      <label class="mode-option">
        <input type="radio" name="mode" value="one-per-tile">
        <div><div class="label">One per tile</div><div class="desc">Max one letter used from each tile</div></div>
      </label>
      <label class="mode-option">
        <input type="radio" name="mode" value="adjacent">
        <div><div class="label">Adjacent</div><div class="desc">Each letter must touch the previous one</div></div>
      </label>
      <label class="mode-option">
        <input type="radio" name="mode" value="destroy">
        <div><div class="label">Destroy</div><div class="desc">Used letters are destroyed — clear a tile to spawn a new one</div></div>
      </label>
    </div>

    <div class="ref" id="ref">
      <b>Controls</b>
      <span id="ref-input"></span>
      Tap center <kbd>↻</kbd> to rotate clockwise<br>
      <b>Letter colours</b>
      <span style="color:var(--green)">green</span> = found in grid ·
      <span style="color:var(--red)">red</span> = not on board<br>
    </div>
  </div>
</div>

<script>
// ─── Word list ───────────────────────────────────────────────────────────────
let WORDS = new Set();

async function loadWords() {
  try {
    const res = await fetch('./2of12.txt');
    const text = await res.text();
    text.split(/\r?\n/).forEach(w => { const t = w.trim().toLowerCase(); if (t) WORDS.add(t); });
  } catch (e) {
    console.error('Could not load words.txt:', e);
  }
  document.getElementById('loading').style.display = 'none';
}

function isValidWord(word) {
  return WORDS.has(word.toLowerCase());
}

// ─── Canvas setup ────────────────────────────────────────────────────────────
const CELL = 130, GR = 3;
const dpr = Math.min(window.devicePixelRatio || 1, 2);
const SZ = GR * CELL;
const gc = document.getElementById('gc');
gc.width = SZ * dpr; gc.height = SZ * dpr;
gc.style.width = SZ + 'px'; gc.style.height = SZ + 'px';
const C = gc.getContext('2d');
C.scale(dpr, dpr);

// ─── Ambigram map ────────────────────────────────────────────────────────────
// letter -> [at 0°, at 90°CW, at 180°, at 270°CW]  null = invalid
const AM = {
  'a': ['a', null, 'e', null],  'e': ['e', null, 'a', null],
  'b': ['b', null, 'q', null],  'q': ['q', null, 'b', null],
  'c': ['c', 'n',  null, 'u'],  'u': ['u', 'c',  'n', 'D'],
  'd': ['d', null, 'p', null],  'p': ['p', null, 'd', null],
  'g': ['g', null, 'g', null],
  'h': ['h', null, 'y', null],  'y': ['y', null, 'R', null],
  'i': ['i', null, 'i', null],
  'j': ['j', 'L',  'r', null],  'r': ['r', null, 'j', 'L'],
  'l': ['l', null, 'l', null],
  'm': ['m', null, 'w', 'E'],   'w': ['w', 'E',  'm', 'B'],
  'n': ['n', 's',  'u', 's'],   's': ['s', 'n', 's', 'n'],
  'o': ['o', 'o',  'o', 'o'],
  't': ['t', 't',  't', 't'],   'x': ['x', 'x',  'x', 'x'],
  'z': ['z', null, 'z', null],
  'A': ['A', null, 'V', null],  'V': ['V', null, 'A', null],
  'B': ['B', 'w',  null, null],
  'C': ['C', null, 'D', null],  'D': ['D', null, 'C', null],
  'E': ['E', 'm',  null, 'w'],
  'H': ['H', 'I',  'H',  'I'],  'I': ['I', 'H', 'I', 'H'],
  'L': ['L', 'r',  'T', null],  'T': ['T', null, 'L', null],
  'M': ['M', null, 'W', null],  'W': ['W', null, 'M', null],
  'N': ['N', 'Z',  'N', 'Z'],   'Z': ['Z', 'N',  'Z',  'N'],
  'O': ['O', 'O', 'O', 'O'],
  'R': ['R', null, 'y', null],
  'Y': ['Y', 'Y',  'Y', 'Y'],
};

// Quad slot remapping after N CW 90° steps
// RS[n][q] = which base slot now occupies visual position q
const RS = [
  [0, 1, 2, 3],
  [2, 0, 3, 1],
  [3, 2, 1, 0],
  [1, 3, 0, 2],
];

const TILE_COLORS = ['#B5D4F4','#C0DD97','#F5C4B3','#CECBF6','#9FE1CB','#FAC775','#F4C0D1','#D4EAB5','#F7E4B5'];
const AM_KEYS = Object.keys(AM);
const VOWELS = ['a', 'e', 'i', 'o', 'u'];

function makeTileDefs(count) {
  const defs = [];
  // Shuffle vowels so each is assigned to a random tile slot
  const vowelPool = [...VOWELS].sort(() => Math.random() - 0.5);
  for (let i = 0; i < count; i++) {
    const l = [];
    if (i < vowelPool.length) l.push(vowelPool[i]);
    while (l.length < 4) {
      const pick = AM_KEYS[Math.floor(Math.random() * AM_KEYS.length)];
      if (!l.includes(pick)) l.push(pick);
    }
    // Shuffle so the vowel isn't always in position 0
    l.sort(() => Math.random() - 0.5);
    defs.push({ l, c: TILE_COLORS[i % TILE_COLORS.length] });
  }
  return defs;
}

function makeSingleTileDef() {
  const l = [];
  while (l.length < 4) {
    const pick = AM_KEYS[Math.floor(Math.random() * AM_KEYS.length)];
    if (!l.includes(pick)) l.push(pick);
  }
  return { l, c: TILE_COLORS[Math.floor(Math.random() * TILE_COLORS.length)] };
}

const TILE_DEFS = makeTileDefs(9);

// ─── Helpers ─────────────────────────────────────────────────────────────────
const dk = () => matchMedia('(prefers-color-scheme:dark)').matches;
const cssVar = name => getComputedStyle(document.documentElement).getPropertyValue(name).trim();

function gv(base, rot) {
  const m = AM[base];
  if (!m) return null;
  return m[((rot % 4) + 4) % 4];
}
function grs(t) { return (((Math.round(t.ta / (Math.PI / 2))) % 4) + 4) % 4; }

// Maps visual quad position q → original base slot in d.l, accounting for rotation + mirrors
const MIRROR_SLOT   = [1, 0, 3, 2]; // H: TL↔TR, BL↔BR
const MIRROR_SLOT_V = [2, 3, 0, 1]; // V: TL↔BL, TR↔BR
function baseSlot(t, q) {
  let s = RS[grs(t)][q];
  if (t.mirrored)  s = MIRROR_SLOT[s];
  if (t.mirroredV) s = MIRROR_SLOT_V[s];
  return s;
}

// Algebraically correct letter reading for any combination of rotation + mirrors.
// Key identity: MV * R(180°) = MH, MH * R(180°) = MV, MH * MV = R(180°)
// For r=1,3: flip negates rotation direction, so (4-r)%4 recovers the original reading.
function effectiveLetter(base, r, mirroredH, mirroredV) {
  if (!mirroredH && !mirroredV) return gv(base, r);
  if (mirroredH && mirroredV) return gv(base, (r + 2) % 4); // H+V = 180° rotation
  if (mirroredV) {
    if (r === 0) return MV.hasOwnProperty(base) ? MV[base] : null;
    if (r === 2) return MH.hasOwnProperty(base) ? MH[base] : null; // MV*R(180°) = MH
    // r=1,3: try both equivalent D4 representations (MV∘R(4-r) and MH∘R(r))
    const rd1 = gv(base, (4 - r) % 4);
    if (rd1 !== null) return MV.hasOwnProperty(rd1) ? MV[rd1] : null;
    const rd2 = gv(base, r);
    if (!rd2) return null;
    return MH.hasOwnProperty(rd2) ? MH[rd2] : null;
  }
  // mirroredH only
  if (r === 0) return MH.hasOwnProperty(base) ? MH[base] : null;
  if (r === 2) return MV.hasOwnProperty(base) ? MV[base] : null; // MH*R(180°) = MV
  // r=1,3: try both equivalent D4 representations (MH∘R(4-r) and MV∘R(r))
  const rd1 = gv(base, (4 - r) % 4);
  if (rd1 !== null) return MH.hasOwnProperty(rd1) ? MH[rd1] : null;
  const rd2 = gv(base, r);
  if (!rd2) return null;
  return MV.hasOwnProperty(rd2) ? MV[rd2] : null;
}

function geff(ci, q) {
  const t = G[ci]; if (!t) return null;
  const s = baseSlot(t, q);
  if (t.destroyed && t.destroyed.has(s)) return null;
  return effectiveLetter(t.d.l[s], grs(t), t.mirrored, t.mirroredV);
}
function txy(i) { return { x: (i % GR) * CELL, y: Math.floor(i / GR) * CELL }; }

function rrC(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
function rr(x, y, w, h, r) { rrC(C, x, y, w, h, r); }

// ─── Audio ────────────────────────────────────────────────────────────────────
let _AC = null;
function ac() {
  if (!_AC) _AC = new (window.AudioContext || window.webkitAudioContext)();
  if (_AC.state === 'suspended') _AC.resume();
  return _AC;
}

function tone(freq, dur, type = 'sine', vol = 0.28, t0 = 0) {
  const ctx = ac(), o = ctx.createOscillator(), g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = type;
  o.frequency.setValueAtTime(freq, ctx.currentTime + t0);
  g.gain.setValueAtTime(0, ctx.currentTime + t0);
  g.gain.linearRampToValueAtTime(vol, ctx.currentTime + t0 + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t0 + dur);
  o.start(ctx.currentTime + t0);
  o.stop(ctx.currentTime + t0 + dur + 0.01);
}

function sweep(f0, f1, dur, type = 'sine', vol = 0.22, t0 = 0) {
  const ctx = ac(), o = ctx.createOscillator(), g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = type;
  o.frequency.setValueAtTime(f0, ctx.currentTime + t0);
  o.frequency.exponentialRampToValueAtTime(f1, ctx.currentTime + t0 + dur);
  g.gain.setValueAtTime(vol, ctx.currentTime + t0);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t0 + dur);
  o.start(ctx.currentTime + t0);
  o.stop(ctx.currentTime + t0 + dur + 0.01);
}

function sndWord() {
  // Bright ascending chime: C5 E5 G5
  [[523, 0], [659, 0.09], [784, 0.18]].forEach(([f, t]) => tone(f, 0.35, 'sine', 0.26, t));
}
function sndAmbigram() {
  // Sparkly arpeggio + high shimmer
  [[523, 0], [659, 0.07], [784, 0.14], [1047, 0.21]].forEach(([f, t]) => tone(f, 0.4, 'sine', 0.24, t));
  [[1319, 0.32], [1047, 0.42], [1319, 0.52]].forEach(([f, t]) => tone(f, 0.18, 'triangle', 0.14, t));
}
function sndRotate() {
  // Quick descending tick — mechanical feel
  sweep(520, 260, 0.12, 'sine', 0.18);
  tone(260, 0.08, 'square', 0.06, 0.04);
}
function sndFlip() {
  // Swoosh up then down
  sweep(220, 880, 0.12, 'sine', 0.20);
  sweep(880, 180, 0.22, 'sine', 0.18, 0.10);
}

// ─── Game state ───────────────────────────────────────────────────────────────
let G = new Array(GR * GR).fill(null);
let animReq = null;
let flipAnim = -1,  flipApplied  = false;
let boardFlippedH = false, boardFlippedV = false;
let flipVAnim = -1, flipVApplied = false;
let FW = [], score = 0;

// ─── Timer / tier state ────────────────────────────────────────────────────────
let timerStart = null, timerInterval = null, timerSecs = 0;
const TIERS = [
  { pts: 0,    name: 'Scribbler'   },
  { pts: 10,   name: 'Dabbler'     },
  { pts: 25,   name: 'Wordsmith'   },
  { pts: 50,   name: 'Penslinger'  },
  { pts: 100,  name: 'Typographer' },
  { pts: 200,  name: 'Grammarian'  },
  { pts: 350,  name: 'Lexicographer'},
  { pts: 500,  name: 'Ambigram Ace'},
];
function getTier(pts) {
  let t = TIERS[0];
  for (const tier of TIERS) { if (pts >= tier.pts) t = tier; else break; }
  return t;
}
function formatTime(s) {
  const m = Math.floor(s / 60);
  const ss = String(s % 60).padStart(2, '0');
  return m + ':' + ss;
}
function startTimer() {
  if (timerStart !== null) return; // already running
  timerStart = Date.now();
  timerSecs = 0;
  timerInterval = setInterval(() => {
    timerSecs = Math.floor((Date.now() - timerStart) / 1000);
    document.getElementById('timer').textContent = formatTime(timerSecs);
  }, 500);
}
function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}
let wordSeq = []; // [{letter, ci, q}]
let pulses = {};  // "ci_q" -> 0..1
let particles = []; // explosion particles for destroy mode

// Difficulty mode
let diffMode = 'free'; // 'free' | 'one-per-tile' | 'adjacent'
document.querySelectorAll('input[name=mode]').forEach(r => {
  r.addEventListener('change', () => { diffMode = r.value; resolveWord(); draw(); });
});

// ─── Matching logic ───────────────────────────────────────────────────────────
function usedKeys() {
  const s = new Set();
  wordSeq.forEach(w => { if (w.ci !== null) s.add(w.ci + '_' + w.q); });
  return s;
}
function usedTiles() {
  const s = new Set();
  wordSeq.forEach(w => { if (w.ci !== null) s.add(w.ci); });
  return s;
}

function apPos(ci, q) {
  return { row: Math.floor(ci / GR) * 2 + Math.floor(q / 2), col: (ci % GR) * 2 + (q % 2) };
}
function adjQuads(a, b) {
  if (a.ci === b.ci && a.q === b.q) return false;
  const A = apPos(a.ci, a.q), B = apPos(b.ci, b.q);
  return Math.abs(A.row - B.row) <= 1 && Math.abs(A.col - B.col) <= 1;
}

function findQuad(letter, usedQ, usedT, prevItem) {
  for (let ci = 0; ci < GR * GR; ci++) {
    if (!G[ci]) continue;
    if (Math.abs(G[ci].ca - G[ci].ta) > 0.05) continue;
    if (diffMode === 'one-per-tile' && usedT.has(ci)) continue;
    for (let q = 0; q < 4; q++) {
      if (usedQ.has(ci + '_' + q)) continue;
      if (G[ci].destroyed && G[ci].destroyed.has(baseSlot(G[ci], q))) continue;
      if (geff(ci, q) !== letter) continue;
      if (diffMode === 'adjacent' && prevItem && !adjQuads(prevItem, { ci, q })) continue;
      return { ci, q };
    }
  }
  return null;
}

function resolveWord() {
  const newSeq = [];
  const usedQ = new Set(), usedT = new Set();
  wordSeq.forEach(w => {
    const prev = newSeq.length ? newSeq[newSeq.length - 1] : null;
    const prevItem = prev && prev.ci !== null ? { ci: prev.ci, q: prev.q } : null;
    // Prefer to keep the original (ci, q) if it's still valid
    let match = null;
    if (w.ci !== null && G[w.ci] && !usedQ.has(w.ci + '_' + w.q) &&
        !(diffMode === 'one-per-tile' && usedT.has(w.ci)) &&
        geff(w.ci, w.q) === w.letter &&
        (diffMode !== 'adjacent' || !prevItem || adjQuads(prevItem, { ci: w.ci, q: w.q }))) {
      match = { ci: w.ci, q: w.q };
    } else {
      match = findQuad(w.letter, usedQ, usedT, prevItem);
    }
    newSeq.push({ letter: w.letter, ci: match ? match.ci : null, q: match ? match.q : null });
    if (match) { usedQ.add(match.ci + '_' + match.q); usedT.add(match.ci); }
  });
  wordSeq = newSeq;
  updateWordDisplay();
}

function addQuad(ci, q) {
  const t = G[ci];
  if (!t || Math.abs(t.ca - t.ta) > 0.05) return; // still spinning
  if (t.destroyed && t.destroyed.has(baseSlot(t, q))) return;
  const letter = geff(ci, q);
  if (!letter) return; // invalid rotation
  const usedQ = usedKeys();
  if (usedQ.has(ci + '_' + q)) {
    // Deselect: remove this quad's entry from the word sequence then re-resolve
    wordSeq = wordSeq.filter(w => !(w.ci === ci && w.q === q));
    resolveWord();
    updateWordDisplay();
    draw();
    return;
  }
  if (diffMode === 'one-per-tile' && usedTiles().has(ci)) return;
  if (diffMode === 'adjacent' && wordSeq.length > 0) {
    const prev = wordSeq[wordSeq.length - 1];
    if (prev.ci !== null && !adjQuads(prev, { ci, q })) return;
  }
  wordSeq.push({ letter, ci, q });
  triggerPulse(ci, q);
  updateWordDisplay();
  draw();
}

function addLetter(letter) {
  if (!AM[letter] && !AM[letter.toLowerCase()] && !AM[letter.toUpperCase()]) return;
  const usedQ = usedKeys(), usedT = usedTiles();
  const prev = wordSeq.length ? wordSeq[wordSeq.length - 1] : null;
  const prevItem = prev && prev.ci !== null ? { ci: prev.ci, q: prev.q } : null;
  const match = findQuad(letter, usedQ, usedT, prevItem);
  wordSeq.push({ letter, ci: match ? match.ci : null, q: match ? match.q : null });
  if (match) triggerPulse(match.ci, match.q);
  updateWordDisplay();
  draw();
}

function removeLetter() {
  if (!wordSeq.length) return;
  wordSeq.pop();
  resolveWord();
  draw();
}

function clearWord() {
  wordSeq = [];
  updateWordDisplay();
  draw();
}

function updateWordDisplay() {
  const wb = document.getElementById('wb');
  if (!wordSeq.length) {
    wb.innerHTML = '<span class="placeholder">start selecting letters…</span>';
    return;
  }
  wb.innerHTML = wordSeq.map(w =>
    `<span class="wl ${w.ci !== null ? 'ok' : 'no'}">${w.letter}</span>`
  ).join('');
}

// ─── Ambigram detection ───────────────────────────────────────────────────────
// Returns {type, match} or null
function ambigramType(word) {
  const letters = word.split('');
  // Rotational 180°: reverse + AM[l][2] each letter → valid word
  const rotLetters = letters.slice().reverse().map(l => { const m = AM[l]; return m ? m[2] : null; });
  if (rotLetters.every(l => l) && isValidWord(rotLetters.join(''))) return { type: 'rot',  match: rotLetters.join('') };
  // Mirror H (left-right): reverse + MH each letter → valid word
  const mhLetters = letters.slice().reverse().map(l => MH[l] || null);
  if (mhLetters.every(l => l) && isValidWord(mhLetters.join(''))) return { type: 'mirh', match: mhLetters.join('') };
  // Mirror V (top-bottom): same order + MV each letter → valid word
  const mvLetters = letters.map(l => MV[l] || null);
  if (mvLetters.every(l => l) && isValidWord(mvLetters.join(''))) return { type: 'mirv', match: mvLetters.join('') };
  return null;
}

// ─── Submit ───────────────────────────────────────────────────────────────────
function submit() {
  if (wordSeq.length < 2) { setSt('Need at least 2 letters', 'err'); return; }
  const unmatched = wordSeq.filter(w => w.ci === null);
  if (unmatched.length) {
    setSt(`Letters not on board: ${unmatched.map(w => w.letter).join(', ')}`, 'err'); return;
  }
  const word = wordSeq.map(w => w.letter).join('');
  if (FW.includes(word)) { setSt('Already found: ' + word, 'warn'); return; }
  if (!isValidWord(word)) { setSt(`"${word}" is not in the word list`, 'err'); return; }
  // Valid!
  FW.push(word);
  const base = word.length * word.length;
  const ambiInfo = ambigramType(word);
  const ambi = ambiInfo ? ambiInfo.type : null;
  const ambiBonus = ambi === 'rot' ? base : ambi ? Math.ceil(base * 0.5) : 0;
  const flipCount = (boardFlippedH ? 1 : 0) + (boardFlippedV ? 1 : 0);
  const flipBonus = flipCount === 2 ? base : flipCount === 1 ? Math.ceil(base * 0.5) : 0;
  const bonus = ambiBonus + flipBonus;
  startTimer();
  const prevTier = getTier(score);
  score += base + bonus;
  document.getElementById('score').textContent = 'Score: ' + score;
  // Update tier badge
  const newTier = getTier(score);
  const tierEl = document.getElementById('tier');
  tierEl.style.display = '';
  if (newTier.name !== tierEl.dataset.tier) {
    tierEl.textContent = newTier.name;
    tierEl.dataset.tier = newTier.name;
    tierEl.classList.remove('new-tier');
    void tierEl.offsetWidth; // reflow to restart animation
    tierEl.classList.add('new-tier');
    setTimeout(() => tierEl.classList.remove('new-tier'), 600);
    if (newTier.name === 'Ambigram Ace') {
      setTimeout(showWin, 800); // brief pause so the chip lands first
    }
  }
  const chip = document.createElement('div');
  chip.className = 'chip' + (ambi ? ' chip-' + ambi : '');
  if (ambi && ambiInfo.match) {
    const icon = ambi === 'rot' ? '↻' : ambi === 'mirh' ? '↔' : '↕';
    const front = document.createElement('span');
    front.className = 'cfront'; front.textContent = word + ' ' + icon;
    const back = document.createElement('span');
    // mirv flips top↔bottom (X-axis), so left/right is unchanged — keep icon on right
    // rot and mirh flip or spin such that the icon naturally leads the back word
    back.className = 'cback';
    back.textContent = ambi === 'mirv' ? ambiInfo.match + ' ' + icon : icon + ' ' + ambiInfo.match;
    chip.append(front, back);
  } else {
    chip.textContent = word;
  }
  document.getElementById('chips').appendChild(chip);
  if (diffMode === 'destroy') {
    wordSeq.forEach(w => {
      if (w.ci === null || !G[w.ci]) return;
      explodeQuad(w.ci, w.q, w.letter);
      G[w.ci].destroyed.add(baseSlot(G[w.ci], w.q));
      if (G[w.ci].destroyed.size === 4) {
        G[w.ci] = { d: makeSingleTileDef(), ca: 0, ta: 0, destroyed: new Set(), mirrored: false, mirroredV: false };
      }
    });
  }
  ambi ? sndAmbigram() : sndWord();
  clearWord();
  const ambiMsg = ambi === 'rot' ? ' ↻ 2×' : ambi === 'mirh' ? ' ↔ 1.5×' : ambi === 'mirv' ? ' ↕ 1.5×' : '';
  const flipMsg = flipCount === 2 ? ' ⟲⟲ flipped 2×!' : flipCount === 1 ? ' ⟲ flipped 1.5×!' : '';
  const tierMsg = newTier.name !== prevTier.name ? ` → ${newTier.name}!` : '';
  setSt(`✓ "${word}" +${base + bonus} pts${ambiMsg}${flipMsg}${tierMsg}`, 'ok');
}

function showWin() {
  stopTimer();
  const mins = Math.floor(timerSecs / 60);
  const secs = timerSecs % 60;
  const timeStr = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
  document.getElementById('win-stats').innerHTML =
    `You reached <strong>Ambigram Ace</strong> with <strong>${score} points</strong><br>in <strong>${timeStr}</strong> — you're a word wizard!`;
  document.getElementById('win-overlay').classList.add('visible');
}

document.getElementById('win-again').addEventListener('click', () => {
  document.getElementById('win-overlay').classList.remove('visible');
  initBoard();
  draw();
});

function setSt(msg, type) {
  const el = document.getElementById('st');
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
}

// ─── Pulse animation ──────────────────────────────────────────────────────────
function triggerPulse(ci, q) { pulses[ci + '_' + q] = 1.0; startAnim(); }

function explodeQuad(ci, q, letter) {
  const { x: gx, y: gy } = txy(ci);
  const cx = gx + (q % 2) * CELL / 2 + CELL / 4;
  const cy = gy + Math.floor(q / 2) * CELL / 2 + CELL / 4;
  const colors = ['#534ab7','#f76c6c','#f7c26c','#6cf79e','#6cb8f7','#f76cc8'];
  // Letter shards — a few copies of the letter flying outward
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI * 2 * i / 6) + (Math.random() - 0.5) * 0.5;
    const speed = 1.8 + Math.random() * 2.2;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      decay: 0.032 + Math.random() * 0.018,
      letter: letter || '×',
      size: 10 + Math.random() * 6,
      color: colors[i % colors.length],
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.25,
    });
  }
  // Tiny spark dots
  for (let i = 0; i < 10; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.0 + Math.random() * 3.5;
    particles.push({
      x: cx + (Math.random() - 0.5) * 10,
      y: cy + (Math.random() - 0.5) * 10,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      decay: 0.045 + Math.random() * 0.03,
      letter: null,
      size: 2 + Math.random() * 3,
      color: colors[Math.floor(Math.random() * colors.length)],
    });
  }
  startAnim();
}

// ─── Drawing ──────────────────────────────────────────────────────────────────
function drawTile(t, ci) {
  const { x: gx, y: gy } = txy(ci);
  const ccx = gx + CELL / 2, ccy = gy + CELL / 2;
  const a = t.ca, r = grs(t);
  const snapped = Math.abs(a - t.ta) < 0.009;
  const d = dk();

  C.save(); C.translate(ccx, ccy); C.rotate(a);
  if (t.mirrored)  C.scale(-1,  1);
  if (t.mirroredV) C.scale( 1, -1);

  C.fillStyle = t.d.c + (d ? '44' : '99');
  rr(-CELL / 2 + 3, -CELL / 2 + 3, CELL - 6, CELL - 6, 9); C.fill();
  C.strokeStyle = t.d.c; C.lineWidth = 2.5;
  rr(-CELL / 2 + 3, -CELL / 2 + 3, CELL - 6, CELL - 6, 9); C.stroke();

  C.strokeStyle = d ? 'rgba(255,255,255,0.18)' : 'rgba(0,0,0,0.13)';
  C.lineWidth = 1; C.beginPath();
  C.moveTo(0, -CELL / 2 + 9); C.lineTo(0, CELL / 2 - 9);
  C.moveTo(-CELL / 2 + 9, 0); C.lineTo(CELL / 2 - 9, 0); C.stroke();


  // Spinning: show letters in their flipped positions
  if (!snapped) {
    const LP = [[-CELL / 4, -CELL / 4], [CELL / 4, -CELL / 4], [-CELL / 4, CELL / 4], [CELL / 4, CELL / 4]];
    C.font = `700 ${Math.round(CELL * 0.22)}px 'Courier New', monospace`;
    C.textAlign = 'center'; C.textBaseline = 'middle';
    t.d.l.forEach((l, q) => {
      C.fillStyle = d ? 'rgba(200,200,200,0.42)' : 'rgba(40,40,40,0.32)';
      C.fillText(l, LP[q][0], LP[q][1]);
    });
  }
  C.restore();

  // Snapped: letters upright with effective readings
  if (snapped) {
    const matchedQuads = new Set();
    wordSeq.forEach(w => { if (w.ci === ci && w.q !== null) matchedQuads.add(w.q); });

    for (let q = 0; q < 4; q++) {
      const lx = gx + (q % 2) * CELL / 2 + CELL / 4;
      const ly = gy + Math.floor(q / 2) * CELL / 2 + CELL / 4;
      const s = baseSlot(t, q);
      if (t.destroyed && t.destroyed.has(s)) {
        // Destroyed quad — draw a burned-out blank
        C.fillStyle = d ? 'rgba(0,0,0,0.35)' : 'rgba(0,0,0,0.08)';
        rrC(C, gx + (q % 2) * CELL / 2 + 5, gy + Math.floor(q / 2) * CELL / 2 + 5, CELL / 2 - 10, CELL / 2 - 10, 5);
        C.fill();
        continue;
      }
      const base = t.d.l[s];
      const eff = effectiveLetter(base, r, t.mirrored, t.mirroredV);
      const inWord = matchedQuads.has(q);
      const pk = ci + '_' + q;
      const pulse = pulses[pk] || 0;

      if (inWord || pulse > 0) {
        const alpha = inWord ? 0.3 : pulse * 0.3;
        C.fillStyle = d ? `rgba(93,202,165,${alpha})` : `rgba(15,110,86,${alpha})`;
        rrC(C, gx + (q % 2) * CELL / 2 + 5, gy + Math.floor(q / 2) * CELL / 2 + 5, CELL / 2 - 10, CELL / 2 - 10, 5);
        C.fill();
        if (pulse > 0.05) {
          C.strokeStyle = d ? `rgba(93,202,165,${pulse * 0.7})` : `rgba(15,110,86,${pulse * 0.7})`;
          C.lineWidth = 2 * pulse;
          rrC(C, gx + (q % 2) * CELL / 2 + 4, gy + Math.floor(q / 2) * CELL / 2 + 4, CELL / 2 - 8, CELL / 2 - 8, 6);
          C.stroke();
        }
      }

      if (eff) {
        C.fillStyle = inWord ? (d ? '#5dcaa5' : '#0f6e56') : (d ? '#d3d1c7' : '#2c2c2a');
        C.font = `700 ${Math.round(CELL * 0.28)}px 'Courier New', monospace`;
        C.textAlign = 'center'; C.textBaseline = 'middle';
        C.fillText(eff, lx, ly);
      } else if (base) {
        // Invalid — draw base letter at its actual rotated orientation so user sees why
        C.save();
        C.translate(lx, ly);
        C.rotate(r * Math.PI / 2);
        if (t.mirrored)  C.scale(-1,  1);
        if (t.mirroredV) C.scale( 1, -1);
        C.fillStyle = d ? 'rgba(211,209,199,0.55)' : 'rgba(44,44,42,0.45)';
        C.font = `700 ${Math.round(CELL * 0.28)}px 'Courier New', monospace`;
        C.textAlign = 'center'; C.textBaseline = 'middle';
        C.fillText(base, 0, 0);
        C.restore();
        C.strokeStyle = d ? 'rgba(240,149,149,0.9)' : 'rgba(163,45,45,0.8)';
        C.lineWidth = 2;
        const s = CELL * 0.09;
        C.beginPath();
        C.moveTo(lx - s, ly - s); C.lineTo(lx + s, ly + s);
        C.moveTo(lx + s, ly - s); C.lineTo(lx - s, ly + s);
        C.stroke();
      }
    }
  }

  // Centre rotate button (always drawn on top, unrotated)
  const btnR = 16;
  C.fillStyle = d ? 'rgba(255,255,255,0.13)' : 'rgba(0,0,0,0.10)';
  C.beginPath(); C.arc(ccx, ccy, btnR, 0, Math.PI * 2); C.fill();
  C.fillStyle = d ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.55)';
  C.font = `${btnR + 2}px sans-serif`;
  C.textAlign = 'center'; C.textBaseline = 'middle';
  C.fillText('↻', ccx, ccy + 1);
}

function draw() {
  const d = dk();
  C.clearRect(0, 0, SZ, SZ);
  C.save();
  if (flipAnim >= 0) {
    const scaleX = Math.abs(Math.cos(flipAnim * Math.PI));
    const scaleY = 1 - 0.07 * Math.sin(flipAnim * Math.PI);
    C.translate(SZ / 2, SZ / 2); C.scale(scaleX, scaleY); C.translate(-SZ / 2, -SZ / 2);
  }
  if (flipVAnim >= 0) {
    const scaleY = Math.abs(Math.cos(flipVAnim * Math.PI));
    const scaleX = 1 - 0.07 * Math.sin(flipVAnim * Math.PI);
    C.translate(SZ / 2, SZ / 2); C.scale(scaleX, scaleY); C.translate(-SZ / 2, -SZ / 2);
  }
  for (let i = 0; i < GR * GR; i++) {
    const { x, y } = txy(i);
    C.fillStyle = d ? '#2c2c2a' : '#f1efe8';
    rr(x + 1, y + 1, CELL - 2, CELL - 2, 11); C.fill();
    C.strokeStyle = d ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.07)';
    C.lineWidth = 0.5; rr(x + 0.5, y + 0.5, CELL - 1, CELL - 1, 11); C.stroke();
    if (!G[i]) {
      C.fillStyle = d ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';
      C.font = '22px sans-serif'; C.textAlign = 'center'; C.textBaseline = 'middle';
      C.fillText('+', x + CELL / 2, y + CELL / 2);
    } else {
      drawTile(G[i], i);
    }
  }
  // Draw explosion particles on top
  if (particles.length) {
    C.save();
    particles.forEach(p => {
      C.globalAlpha = Math.max(0, p.life);
      if (p.letter) {
        // Letter shard
        C.save();
        C.translate(p.x, p.y);
        C.rotate(p.rot || 0);
        C.font = `bold ${p.size}px sans-serif`;
        C.textAlign = 'center';
        C.textBaseline = 'middle';
        C.fillStyle = p.color;
        C.fillText(p.letter, 0, 0);
        C.restore();
      } else {
        // Spark dot
        C.beginPath();
        C.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        C.fillStyle = p.color;
        C.fill();
      }
    });
    C.globalAlpha = 1;
    C.restore();
  }

  C.restore();
}

function startAnim() { if (animReq) return; animReq = requestAnimationFrame(animLoop); }
function animLoop() {
  let going = false;
  for (const k in pulses) { pulses[k] *= 0.80; if (pulses[k] < 0.01) delete pulses[k]; else going = true; }
  if (particles.length) {
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.12; // gravity
      p.life -= p.decay;
      if (p.rot !== undefined) p.rot += p.rotV;
    });
    particles = particles.filter(p => p.life > 0);
    if (particles.length) going = true;
  }
  for (let i = 0; i < GR * GR; i++) {
    const t = G[i]; if (!t) continue;
    const diff = t.ta - t.ca;
    if (Math.abs(diff) > 0.005) { t.ca += diff * 0.13; going = true; }
    else t.ca = t.ta;
  }
  if (flipAnim >= 0) {
    flipAnim = Math.min(flipAnim + 0.045, 1);
    if (flipAnim >= 0.5 && !flipApplied)  { doFlipH(); flipApplied = true; }
    if (flipAnim < 1) going = true; else flipAnim = -1;
  }
  if (flipVAnim >= 0) {
    flipVAnim = Math.min(flipVAnim + 0.045, 1);
    if (flipVAnim >= 0.5 && !flipVApplied) { doFlipV(); flipVApplied = true; }
    if (flipVAnim < 1) going = true; else flipVAnim = -1;
  }
  draw();
  animReq = going ? requestAnimationFrame(animLoop) : null;
}

function rot(ci, dir) {
  if (!G[ci]) return;
  if (wordSeq.some(w => w.ci === ci)) {
    wordSeq = wordSeq.filter(w => w.ci !== ci);
    updateWordDisplay();
  }
  sndRotate();
  G[ci].ta += dir * Math.PI / 2; startAnim();
}

// ─── Mirror maps ──────────────────────────────────────────────────────────────
const MH = { // Horizontal (left-right)
  'A':'A', 'H':'H', 'I':'I', 'M':'M', 'O':'O', 'T':'T', 'U':'U', 'V':'V', 'W':'W', 'X':'X', 'Y':'Y',
  'i':'i', 'l':'l', 'm':'m', 'o':'o', 't':'t', 'u':'u', 'v':'v', 'w':'w', 'x':'x',
  'b':'d', 'd':'b', 'p':'q', 'q':'p',
};
const MV = { // Vertical (top-bottom)
  'c': 'c', 'C':'C', 'D':'D', 'E':'E', 'H':'H', 'I':'I', 'K': 'K', 'O':'O', 'X':'X',
  'l':'l', 'o':'o', 't':'t', 'x':'x',
  'b':'p', 'p':'b', 'd':'q', 'q':'d',
  'n':'u', 'u':'n', 'm':'w', 'w':'m',
  'M':'W', 'W':'M',
};

function doFlipH() {
  const newG = new Array(GR * GR).fill(null);
  for (let row = 0; row < GR; row++) {
    for (let col = 0; col < GR; col++) {
      const t = G[row * GR + col]; if (!t) continue;
      newG[row * GR + (GR - 1 - col)] = { d: t.d, ca: -t.ca, ta: -t.ta, destroyed: t.destroyed, mirrored: !t.mirrored, mirroredV: t.mirroredV };
    }
  }
  boardFlippedH = !boardFlippedH; G = newG; resolveWord();
}

function doFlipV() {
  const newG = new Array(GR * GR).fill(null);
  for (let row = 0; row < GR; row++) {
    for (let col = 0; col < GR; col++) {
      const t = G[row * GR + col]; if (!t) continue;
      newG[(GR - 1 - row) * GR + col] = { d: t.d, ca: -t.ca, ta: -t.ta, destroyed: t.destroyed, mirrored: t.mirrored, mirroredV: !t.mirroredV };
    }
  }
  boardFlippedV = !boardFlippedV; G = newG; resolveWord();
}

function flipH() {
  if (flipAnim >= 0 || flipVAnim >= 0) return;
  sndFlip(); clearWord(); flipAnim = 0; flipApplied = false; startAnim();
}
function flipV() {
  if (flipAnim >= 0 || flipVAnim >= 0) return;
  sndFlip(); clearWord(); flipVAnim = 0; flipVApplied = false; startAnim();
}
document.getElementById('bflip').onclick  = flipH;
document.getElementById('bflipv').onclick = flipV;

// ─── Canvas click ─────────────────────────────────────────────────────────────
gc.addEventListener('click', e => {
  const rc = gc.getBoundingClientRect();
  const px = (e.clientX - rc.left) * (SZ / rc.width);
  const py = (e.clientY - rc.top) * (SZ / rc.height);
  const col = Math.floor(px / CELL), row = Math.floor(py / CELL);
  if (col < 0 || col >= GR || row < 0 || row >= GR) return;
  const ci = row * GR + col;
  if (G[ci]) {
    const { x: tx, y: ty } = txy(ci);
    const cx = tx + CELL / 2, cy = ty + CELL / 2;
    if (Math.hypot(px - cx, py - cy) <= 18) {
      rot(ci, 1);
    } else {
      // Determine which quadrant was tapped
      const qx = px - tx, qy = py - ty;
      const q = (qx >= CELL / 2 ? 1 : 0) + (qy >= CELL / 2 ? 2 : 0);
      addQuad(ci, q);
    }
  }
});

// ─── Keyboard ─────────────────────────────────────────────────────────────────
const isTouch = navigator.maxTouchPoints > 0;

document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Enter') { e.preventDefault(); submit(); return; }
  if (e.key === 'Escape') { clearWord(); setSt('', ''); return; }
  if (e.key === 'Backspace') { e.preventDefault(); removeLetter(); return; }
  if (!isTouch && e.key.length === 1) { e.preventDefault(); addLetter(e.key); }
});

// ─── Buttons ──────────────────────────────────────────────────────────────────
document.getElementById('bsub').onclick = submit;
document.getElementById('bclr').onclick = () => { clearWord(); setSt('', ''); };

// ─── Init ─────────────────────────────────────────────────────────────────────
function initBoard() {
  const positions = [...Array(GR * GR).keys()].sort(() => Math.random() - 0.5);
  TILE_DEFS.forEach((def, i) => {
    G[positions[i]] = { d: def, ca: 0, ta: 0, destroyed: new Set(), mirrored: false, mirroredV: false };
  });
  // Reset timer + tier
  stopTimer();
  timerStart = null; timerSecs = 0;
  document.getElementById('timer').textContent = '0:00';
  const tierEl = document.getElementById('tier');
  tierEl.style.display = 'none'; tierEl.textContent = ''; tierEl.dataset.tier = '';
  score = 0; FW = [];
  document.getElementById('score').textContent = 'Score: 0';
  document.getElementById('chips').innerHTML = '';
}

if (isTouch) {
  document.getElementById('ref-input').innerHTML =
    'Tap a letter to add it to your word.<br>';
  document.querySelector('.word-bar .placeholder') &&
    (document.querySelector('.word-bar .placeholder').textContent = 'tap letters to build a word…');
} else {
  document.getElementById('ref-input').innerHTML =
    '<kbd>Type</kbd> letters to build a word<br>' +
    '<kbd>Backspace</kbd> undo last letter<br>' +
    '<kbd>Enter</kbd> submit · <kbd>Esc</kbd> clear<br>';
}

initBoard();
loadWords().then(() => { draw(); });
</script>
