<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>KAIMOJU カイモジュ</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; }
body {
  background:#000;
  display:flex; align-items:center; justify-content:center;
  min-height:100vh;
  min-height:100dvh;
  overflow:hidden;
  font-family:'Courier New',monospace;
}
canvas {
  display: block;
  width: min(100vw, 920px);
  height: auto;
  max-height: 100dvh;
  aspect-ratio: 920 / 580;
  touch-action: manipulation;
}
/* Hidden text input — invoked on mobile taps so the OS keyboard opens.
   font-size 16px prevents iOS Safari from auto-zooming on focus. */
#ki {
  position: fixed;
  bottom: 0; left: 0;
  width: 1px; height: 1px;
  opacity: 0;
  border: 0;
  padding: 0;
  font-size: 16px;
  background: transparent;
  color: transparent;
  caret-color: transparent;
  outline: none;
}
/* Mobile-only Find button — fixed overlay so it stays reachable above the keyboard.
   Hidden by default; the script unhides it when IS_MOBILE is true. */
#findbtn {
  position: fixed;
  top: env(safe-area-inset-top, 8px);
  right: 8px;
  z-index: 10;
  -webkit-tap-highlight-color: transparent;
  background: #0a1a0a;
  color: #2eff5a;
  border: 1.5px solid #2eff5a;
  font-family: 'Courier New', monospace;
  font-weight: bold;
  font-size: 13px;
  padding: 8px 14px;
  border-radius: 4px;
  cursor: pointer;
  user-select: none;
}
#findbtn[disabled] { opacity: 0.5; border-color: #3a5a3a; color: #7a9a7a; }
#findbtn.active    { background:#3a2400; color:#ffaa00; border-color:#ffaa00; }
</style>
</head>

<canvas id="c"></canvas>
<input id="ki" tabindex="-1" type="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" inputmode="text">

];
const LEVEL_START_SIZE = 6;
function gojuonOrder(mode) {
  return mode === 'hiragana' ? GOJUON_HIRA : GOJUON_KATA;
}
function isProgressionMode(mode) { return mode === 'katakana' || mode === 'hiragana'; }
function poolForLevel(mode, level) {
  const order = gojuonOrder(mode);
  return order.slice(0, Math.min(order.length, LEVEL_START_SIZE + (level - 1)));
}
function newCharForLevel(mode, level) {
  // Level 1: no single "new" char — every cell on level 1 is a tutorial char.
  // Level 2+: the most-recently-added gojuon char.
  if (level < 2) return null;
  const order = gojuonOrder(mode);
  return order[Math.min(order.length - 1, LEVEL_START_SIZE + (level - 1) - 1)];
}

let actx = null;
function audio() {
  if (!actx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) actx = new AC();
  }
  if (actx && actx.state === 'suspended') actx.resume();
  return actx;
}
function tone(freq, dur, type='square', vol=0.12, slideTo=null) {
  if (muted) return;
  const ac = audio(); if (!ac) return;
  const t0 = ac.currentTime;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t0);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo), t0+dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0+0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.connect(g).connect(ac.destination);
  o.start(t0); o.stop(t0+dur+0.02);
}
function noise(dur, vol=0.18, filterFreq=1200, filterQ=1) {
  if (muted) return;
  const ac = audio(); if (!ac) return;
  const t0 = ac.currentTime;
  const len = Math.floor(ac.sampleRate*dur);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i=0; i<len; i++) data[i] = (Math.random()*2-1) * (1 - i/len);
  const src = ac.createBufferSource(); src.buffer = buf;
  const f = ac.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = filterFreq; f.Q.value = filterQ;
  const g = ac.createGain();
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  src.connect(f).connect(g).connect(ac.destination);
  src.start(t0); src.stop(t0+dur+0.02);
}

// ── Title/select intro song ─────────────────────────────────────────
// A short chiptune loop that plays on the menu and difficulty-select
// screens. Web Audio needs a user gesture before any sound, so the
// song actually kicks in on the player's first keypress or tap.
const SONG_STEP_MS = 160;
const SONG_MELODY = [
  // C major arpeggio up
  [523, 1], [659, 1], [784, 1], [1047, 1],
  // descending hook
  [1175, 1], [1047, 1], [988, 1], [784, 1],
  // F variation
  [880, 1], [1047, 1], [880, 1], [698, 1],
  // resolution + breath
  [659, 1], [587, 1], [523, 1], [0, 1],
];
const SONG_BASS = [
  [131, 4], [175, 4], [196, 4], [131, 4],   // I  IV  V  I  in C
];
let songPlaying  = false;
let songFinished = false;   // plays once per page load, never repeats
let _songMelT = null, _songBassT = null;
let _songMelI = 0,    _songBassI = 0;

function _songMelTick() {
  if (!songPlaying) return;
  if (_songMelI >= SONG_MELODY.length) {
    songPlaying = false; songFinished = true; return;
  }
  const [f, n] = SONG_MELODY[_songMelI];
  const ms = n * SONG_STEP_MS;
  if (f > 0) tone(f, (ms - 30) / 1000, 'square', 0.045);
  _songMelI++;
  _songMelT = setTimeout(_songMelTick, ms);
}
function _songBassTick() {
  if (!songPlaying) return;
  if (_songBassI >= SONG_BASS.length) return;
  const [f, n] = SONG_BASS[_songBassI];
  const ms = n * SONG_STEP_MS;
  if (f > 0) tone(f, (ms - 40) / 1000, 'triangle', 0.06);
  _songBassI++;
  _songBassT = setTimeout(_songBassTick, ms);
}
function startSong() {
  if (songPlaying || songFinished) return;
  songPlaying = true;
  _songMelI = 0; _songBassI = 0;
  _songMelTick();
  _songBassTick();
}
function stopSong() {
  songPlaying = false;
  songFinished = true;  // a round started before the song finished — don't replay
  if (_songMelT)  clearTimeout(_songMelT);
  if (_songBassT) clearTimeout(_songBassT);
  _songMelT = null; _songBassT = null;
}
function maybeStartIntroSong() {
  if (songPlaying || songFinished) return;
  if (gState === 'menu' || gState === 'select') { audio(); startSong(); }
}

// Build/regenerate the world. Called both on startGame (level 1) and when
// the player clears all buildings (advance to next level). Score/combo/HP
// persist across levels — only the world is regenerated.
function initGame() {
  inputBuf=''; particles=[]; floats=[]; lasers=[];
  flash={alpha:0, col:P.hit_bd};
  findMode={on:false, char:null, count:0, cooldown:0};
  activeCell = null; activeStartTime = Date.now();
  // Level 1 reset: fresh player + score. Higher levels: preserve carry-over.
  if (currentLevel === 1) {
    score=0; combo=0; maxCombo=0; totalHits=0; totalMisses=0;
    player = makePlayer();
  } else {
    const carriedHp = player.hp || KAIJU_MAX_HP;
    player = makePlayer();
    player.hp = carriedHp;
  }
  if (isProgressionMode(gameMode)) {
    learnedPool       = poolForLevel(gameMode, currentLevel);
    newCharThisLevel  = newCharForLevel(gameMode, currentLevel);
    newCharIntroduced = false;
  } else {
    learnedPool = [];
    newCharThisLevel = null;

  }
  currentBiome = pick(['forest', 'desert', 'park']);
  buildings = makeBuildings();
  mountains = makeMountainRidge();

  trees = makeTrees();

// ── Drifting clouds & ground trees (regenerated per game) ───────────
function makeClouds() {
  const n = 3 + Math.floor(Math.random()*3);  // 3–5 clouds
  return Array.from({length: n}, () => ({
    x: Math.random()*W,
    y: 30 + Math.random()*110,
    vx: 0.05 + Math.random()*0.18,
    shape: pick(CLOUD_SHAPES),
    sz: 11 + Math.floor(Math.random()*3),
  }));
}

function makeTrees() {
  const out = [];
  if (buildings.length === 0) return out;
  const pool = (BIOMES[currentBiome] || BIOMES.forest).trees;
  const cols = (BIOMES[currentBiome] || BIOMES.forest).treeCol;
  // Spans of open ground between buildings (and on the ends)
  const spans = [];
  spans.push([5, buildings[0].x - 4]);
  for (let i=0; i<buildings.length-1; i++) {
    const a = buildings[i].x + buildings[i].width + 4;
    const b = buildings[i+1].x - 4;
    if (b - a > 28) spans.push([a, b]);
  }
  const last = buildings[buildings.length-1];
  spans.push([last.x + last.width + 4, W - 4]);

  spans.forEach(([a, b]) => {
    if (b - a < 38) return;
    const slot = 56;
    const maxN = Math.max(1, Math.floor((b - a) / slot));
    const n = 1 + Math.floor(Math.random() * maxN);
    let cursor = a + 2;
    for (let i=0; i<n; i++) {
      if (cursor >= b - 30) break;
      const shape = pick(pool);
      const tw = (shape[0]||'').length * 7;       // approx pixel width
      const room = Math.max(2, b - cursor - tw - 2);
      const tx = cursor + Math.random() * Math.min(room, slot*0.6);
      out.push({
        x: tx,
        shape,
        c: pick(cols),
        sz: 11 + Math.floor(Math.random()*3),
      });
      cursor = tx + tw + 6;
    }
  });
  return out;
}

// ── Buildings ────────────────────────────────────────────────────────
function makeBuildings() {
  const mode = MODES[gameMode];

  // ── Words mode: each floor is one Japanese word, building width = widest word ──
  if (mode.isWords) return makeWordBuildings(mode.words);

  // ── Progression modes (kata/hira): draw chars only from the learned pool ──
  // and on level 1 prepend a small tutorial building (1×2) that gets the hint reveal.
  const useProgression = isProgressionMode(gameMode);
  const cfgs = makeBuildingConfigs();
  if (useProgression && currentLevel === 1 && cfgs.length > 0) {
    // Tutorial building: 1 col, one floor per starter char so the player meets
    // every char in the level-1 pool at least once with the hint reveal on.
    cfgs[0] = { cols: 1, floors: LEVEL_START_SIZE, tutorial: true };
  }
  // Distribute leftover horizontal space as variable gaps so each level
  // has a different silhouette and leaves room for ASCII trees.
  // Left margin is wider than right so the kaomoji always has clearance to
  // stand to the left of the leftmost cell without covering its character.
  const baseGap     = 14;
  const leftMargin  = 100;
  const rightMargin = 20;
  const totalBW = cfgs.reduce((s, cf) => s + cf.cols*CW, 0);
  const slots   = cfgs.length + 1;  // before-first + between + after-last
  const slack   = Math.max(0, W - totalBW - (slots-1)*baseGap - leftMargin - rightMargin);
  // Random partition of slack across slots
  const cuts = Array.from({length: slots-1}, () => Math.random()).sort();
  const gaps = [];
  let prev = 0;
  for (const c of cuts) { gaps.push((c - prev) * slack); prev = c; }
  gaps.push((1 - prev) * slack);

  const charMap  = mode.chars;
  // In progression modes only sample from learned chars; in kanji mode use full map.
  const charKeys = (useProgression && learnedPool.length > 0)
    ? learnedPool
    : Object.keys(charMap);
  let bx = leftMargin + gaps[0];
  return cfgs.map((cfg, i) => {
    const cells = Array.from({length:cfg.floors}, (_, f) =>
      Array.from({length:cfg.cols}, (_, c) => {
        // Tutorial building: one starter char per floor, bottom→top in gojuon order.
        // Level 2+: pin the newly-introduced char to building 0, floor 0, col 0
        // so the player meets it first (and gets the one-shot hint reveal).
        let k;
        if (cfg.tutorial) {
          k = charKeys[f % charKeys.length];
        } else if (useProgression && currentLevel >= 2 && newCharThisLevel && i === 0 && f === 0 && c === 0) {
          k = newCharThisLevel;
        } else {
          k = pick(charKeys);
        }
        return {
          char: k, romaji: charMap[k],
          destroyed: false, hi: false,
          hitAnim: 0, dieAnim: 0
        };
      })
    );
    const bld = {
      x:bx, width:cfg.cols*CW,
      cellW: CW,
      cols:cfg.cols, floors:cfg.floors,
      cells,
      collapsed:false, shakeX:0,
      roof: pick(ROOFS),
      isTutorial: !!cfg.tutorial,
    };
    bx += bld.width + baseGap + (gaps[i+1] || 0);
    return bld;
  });
}

// ── Word-mode buildings: each floor is one wide cell holding a word ──
function makeWordBuildings(wordPool) {
  const baseGap     = 18;
  const leftMargin  = 100;
  const rightMargin = 20;
  const buildingCount = 2 + Math.floor(Math.random()*2);  // 2–3 towers

  const towers = [];
  let totalW = 0;
  for (let i = 0; i < buildingCount; i++) {
    const floors = 3 + Math.floor(Math.random()*3);  // 3–5 words per tower
    const wordsForFloors = [];
    let maxCellW = 72;
    for (let f = 0; f < floors; f++) {
      const w = pick(wordPool);
      const cw = Math.max(72, w.jp.length * 26 + 18);
      if (cw > maxCellW) maxCellW = cw;
      wordsForFloors.push(w);
    }
    towers.push({ floors, wordsForFloors, width: maxCellW });
    totalW += maxCellW;
  }

  // Distribute slack so towers aren't packed against the edges
  const slots = buildingCount + 1;
  const slack = Math.max(0, W - totalW - (slots-1)*baseGap - leftMargin - rightMargin);
  const cuts  = Array.from({length: slots-1}, () => Math.random()).sort();
  const gaps  = [];
  let prev = 0;
  for (const c of cuts) { gaps.push((c - prev) * slack); prev = c; }
  gaps.push((1 - prev) * slack);

  let bx = leftMargin + gaps[0];
  return towers.map((tw, i) => {
    const cells = tw.wordsForFloors.map(w => [{
      char:    w.jp,
      romaji:  w.romaji,
      en:      w.en,
      destroyed: false, hi: false,
      hitAnim: 0, dieAnim: 0,
    }]);
    const bld = {
      x: bx, width: tw.width,
      cellW: tw.width,                 // each floor is one wide cell
      cols: 1, floors: tw.floors,
      cells,
      collapsed: false, shakeX: 0,
      roof: pick(ROOFS),
      isWords: true,
    };
    bx += bld.width + baseGap + (gaps[i+1] || 0);
    return bld;
  });
}

// First alive cell: bottom floor → top, left col → right
function firstCell(b) {
  for (let f=0; f<b.floors; f++)
    for (let c=0; c<b.cols; c++)
      if (!b.cells[f][c].destroyed) return {f, c, cell:b.cells[f][c]};
  return null;
}

function activeTarget() {
  if (player.tgt<0 || player.tgt>=buildings.length) return null;
  const b = buildings[player.tgt];
  if (!b || b.collapsed) return null;
  return firstCell(b);
}

function nearestBuilding() {
  let best=-1, bestD=1e9;
  buildings.forEach((b,i) => {
    if (b.collapsed) return;
    const d = Math.abs(player.x - (b.x + b.width/2));
    if (d<bestD) { bestD=d; best=i; }
  });
  return best;
}

// ═══════════════════════════════════════════════════════════════════
//  INPUT HANDLING
// ═══════════════════════════════════════════════════════════════════
function handleKey(e) {
  const findMod = IS_MAC ? e.metaKey : e.ctrlKey;

  // Prevent browser shortcuts we're using
  if (findMod && e.key.toLowerCase()==='f') { e.preventDefault(); }
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) {
    e.preventDefault();
  }

  // First gesture on menu/select wakes the AudioContext and starts the song
  maybeStartIntroSong();

  // Mute toggle works in any state (Ctrl+M — plain M is a romaji input letter)
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase()==='m') {
    e.preventDefault();
    muted = !muted;
    if (!muted) { audio(); tone(660, 0.08, 'triangle', 0.10); }
    return;
  }

  // Help toggle (works in any state; '?' is shift+/ on US keyboards)
  if (e.key === '?') {
    e.preventDefault();
    showHelp = !showHelp;
    if (!showHelp) activeStartTime = Date.now();
    return;
  }
  if (e.key === 'Escape') {
    // TraceMode: ESC exits the tracing overlay first
    if (TraceMode.isActive()) { TraceMode.exit(); e.preventDefault(); return; }
    if (showHelp) { showHelp = false; activeStartTime = Date.now(); e.preventDefault(); return; }
    if (gState === 'select') { gState = 'menu'; e.preventDefault(); return; }
    return;
  }
  // TraceMode: while active, swallow all other input (mouse-only mini-game)
  if (TraceMode.isActive()) return;
  // TraceMode: T launches a random glyph from the menu
  if (gState === 'menu' && e.key.toLowerCase() === 't') {
    e.preventDefault();
    audio();
    TraceMode.start(pick(TraceMode.availableChars()));
    return;
  }
  // Swallow all other input while the help overlay is open
  if (showHelp) return;

  // Any key skips the level-start intro
  if (introActive) { introActive = false; return; }

  if (gState==='menu') {
    if (e.key==='Enter') { gState='select'; }
    return;
  }
  if (gState==='select') {
    const idx = parseInt(e.key, 10);
    if (idx >= 1 && idx <= MODE_KEYS.length) { startGame(MODE_KEYS[idx-1]); return; }
    if (e.key==='Enter') { startGame(MODE_KEYS[0]); return; }
    return;
  }
  if (gState==='gameover') {
    if (e.key==='Enter')           { gState='select'; return; }
    if (e.key.toLowerCase()==='r') { startGame(gameMode); return; }
    return;
  }

  // Playing
  if (findMod && e.key.toLowerCase()==='f') { activateFind(); return; }
  if (e.key==='Backspace') { inputBuf = inputBuf.slice(0,-1); return; }

  // Letter input (a-z only, no ctrl/meta/alt combos)
  if (e.key.length===1 && /[a-zA-Z]/.test(e.key) && !e.ctrlKey && !e.metaKey && !e.altKey) {
    typeChar(e.key.toLowerCase());
  }
}

function typeChar(ch) {
  if (introActive) return;
  const act = activeTarget();
  if (!act) return;

  const rom = act.cell.romaji;
  const nb  = inputBuf + ch;

  if (nb === rom) {
    // ✓ Exact match → destroy
    inputBuf = '';
    doHit(player.tgt, act.f, act.c);
  } else if (rom.startsWith(nb)) {
    // Valid prefix → keep buffering
    inputBuf = nb;
    sndType();
  } else {
    // Wrong — check if typed char alone starts the target
    inputBuf = rom.startsWith(ch) ? ch : '';
    doMiss();
  }
}

// ═══════════════════════════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════════════════════════
function doMiss() {
  combo = 0;
  totalMisses++;
  flash.alpha = 0.32;
  flash.col = P.hit_bd;
  const b = buildings[player.tgt];
  if (b) b.shakeX = 5;
  sndMiss();

  // Force-reveal the correct answer everywhere: bottom panel target hint,
  // letter boxes, and a big center banner. Persists for MISS_REVEAL_MS.
  const act = activeTarget();
  if (act) {
    missReveal.until  = Date.now() + MISS_REVEAL_MS;
    missReveal.romaji = act.cell.romaji;
    missReveal.char   = act.cell.char;
  }

  // HP damage — only in progression modes (kata/hira). Other modes keep
  // the old "misses are free" behavior so the game's older flow is unchanged.
  if (isProgressionMode(gameMode)) {
    player.hp = Math.max(0, player.hp - 1);
    player.hurtFlash = 18;
    if (player.hp <= 0) {
      setTimeout(() => endGame(false), 600);
    }
  }
}

function doHit(bIdx, f, c) {
  const b    = buildings[bIdx];
  const cell = b.cells[f][c];

  cell.hitAnim = 10;
  cell.destroyed = true;
  cell.dieAnim   = 20;
  totalHits++;

  // Kaomoji destroy-punch toward the cell it just smashed
  const cellW = b.cellW || CW;
  const cx = b.x + c*cellW + cellW/2;
  const cy = GY - (f+1)*CH + CH/2;
  player.punch    = PUNCH_DUR;
  player.punchDir = cx >= player.x ? 1 : -1;
  player.facing   = player.punchDir;

  spawnParticles(cx, cy);
  sndHit();

  // Pop the English translation away from the score float — diagonal drift
  // off to the right so the two don't overlap as they rise.
  if (cell.en) addFloat(cell.en, cx + 6, cy - 4, '#9adfff', 16, 2.0, -0.6);

  // Find mode: if this char matches, burst ALL highlighted instances
  if (findMode.on && cell.char === findMode.char) {
    doFindBurst(bIdx);
  }

  // Scoring
  const mult = Math.max(1, Math.floor(combo/3) + 1);
  const pts  = 10 * mult;
  score += pts;
  combo++;
  if (combo > maxCombo) maxCombo = combo;
  addFloat('+' + pts, cx, cy);
  if (combo > 0 && combo % 5 === 0) sndCombo(combo);

  // First successful destroy of the level's new char — retire its hint.
  if (newCharThisLevel && !newCharIntroduced && cell.char === newCharThisLevel) {
    newCharIntroduced = true;
  }

  collapseDestroyedFloors(b);
  checkCollapsed(bIdx);
}

function doFindBurst(triggerBIdx) {
  // Collect targets (don't destroy yet — lasers handle the kill on impact)
  const targets = [];
  buildings.forEach((b, bi) => {
    if (b.collapsed) return;
    b.cells.forEach((row, f) => {
      row.forEach((cell, c) => {
        if (!cell.destroyed && cell.hi && cell.char === findMode.char) {
          targets.push({ bIdx: bi, f, c });
        }
      });
    });
  });

  const n = targets.length;
  if (n > 0) {
    // Spawn a laser per target from the kaomoji's "eyes"
    const px = player.x;
    const py = GY - 30;
    const beams = targets.map(t => {
      const b = buildings[t.bIdx];
      const bcw = b.cellW || CW;
      const tx = b.x + t.c*bcw + bcw/2;
      const ty = GY - (t.f+1)*CH + CH/2;
      const dist = Math.hypot(tx - px, ty - py);
      const hitAt = 4 + Math.min(14, Math.floor(dist/40)); // farther = longer flight
      return {
        x1: px, y1: py, x2: tx, y2: ty,
        bIdx: t.bIdx, f: t.f, c: t.c,
        life: 0, hitAt, maxLife: hitAt + 10,
        hit: false, isLast: false,
      };
    });
    // Flag the laser that will impact last so it triggers the floor collapse
    let latest = beams[0];
    beams.forEach(L => { if (L.hitAt > latest.hitAt) latest = L; });
    latest.isLast = true;
    beams.forEach(L => lasers.push(L));

    const bonus = n * 30 * Math.max(1, combo);
    score += bonus;
    combo += n;
    flash.alpha = 0.4; flash.col = P.find_fl;
    addFloat(`FIND ×${n}!  +${bonus}`, W/2, 200, P.find_fl, 22);
    sndFindBurst(n);
  }

  findMode.on = false; findMode.char = null; findMode.count = 0;
  findMode.cooldown = FIND_COOLDOWN_FRAMES;
  clearHighlights();
}

// Step active laser beams: tick life, destroy target cell on impact frame,
// drop expired lasers, and once the last laser lands, collapse all the floors
// whose cells just died.
function updateLasers() {
  if (!lasers.length) return;
  let lastHitThisTick = false;
  for (let i = lasers.length - 1; i >= 0; i--) {
    const L = lasers[i];
    L.life++;
    if (!L.hit && L.life >= L.hitAt) {
      L.hit = true;
      const b = buildings[L.bIdx];
      const cell = b && !b.collapsed && b.cells[L.f] ? b.cells[L.f][L.c] : null;
      if (cell && !cell.destroyed) {
        cell.destroyed = true;
        cell.dieAnim   = 20;
        spawnParticles(L.x2, L.y2);
        totalHits++;
        checkCollapsed(L.bIdx);
      }
      if (L.isLast) lastHitThisTick = true;
    }
    if (L.life >= L.maxLife) lasers.splice(i, 1);
  }
  if (lastHitThisTick) {
    buildings.forEach(b => { if (!b.collapsed) collapseDestroyedFloors(b); });
  }
}

// Splice out any fully-destroyed floors; floors above fall down with gravity.
// Iterates bottom→top, so a stack of dead floors collapses in one pass.
function collapseDestroyedFloors(b) {
  let collapsed = 0;
  for (let f = 0; f < b.cells.length; ) {
    if (b.cells[f].length > 0 && b.cells[f].every(c => c.destroyed)) {
      b.cells.splice(f, 1);
      b.floors--;
      // Cells now at index f and above must fall through CH pixels
      for (let ff = f; ff < b.cells.length; ff++) {
        b.cells[ff].forEach(cell => {
          if (!cell.destroyed) {
            cell.fallY  = (cell.fallY  || 0) + CH;
            cell.fallVy = cell.fallVy || 0;
          }
        });
      }
      collapsed++;
      // Don't increment f — re-check this index for stacked collapses
    } else {
      f++;
    }
  }
  if (collapsed > 0) {
    b.shakeX = Math.max(b.shakeX, 6);
    flash.alpha = Math.max(flash.alpha, 0.15);
    // Skip the "FLOOR!" callout in word mode — every cell is its own floor,
    // so the message just adds float-text clutter on top of the translation.
    if (!b.isWords) {
      addFloat(collapsed > 1 ? `FLOOR x${collapsed}!` : 'FLOOR!',
               b.x + b.width/2, GY - b.floors*CH - 14, '#ff9933', 14);
    }
    sndFloorCollapse();
  }
}

function checkCollapsed(bIdx) {
  const b = buildings[bIdx];
  if (b.cells.every(row => row.every(cell => cell.destroyed))) {
    b.collapsed = true;
    score += 200;
    addFloat('BUILDING DESTROYED! +200', b.x + b.width/2, GY - b.floors*CH/2, '#ff7700', 16);
    sndCollapse();
    player.tgt = nearestBuilding();
    if (buildings.every(b => b.collapsed)) {
      // Progression modes regenerate a fresh level instead of ending the run.
      // Kanji/words keep the original win-state behavior.
      if (isProgressionMode(gameMode)) {
        setTimeout(advanceLevel, 1400);
      } else {
        setTimeout(() => endGame(true), 1400);
      }
    }
  }
}

// Advance to the next gojuon char and regenerate the world. Score, combo, and
// HP carry across — the level number is the only thing that matters for the run.
function advanceLevel() {
  if (gState !== 'playing') return;
  currentLevel++;
  maxLevelReached = Math.max(maxLevelReached, currentLevel);
  const order = gojuonOrder(gameMode);
  const cap = order.length;
  // Once we've taught every char, just keep regenerating with the full pool —
  // no new char is introduced, so newCharThisLevel becomes null.
  if (LEVEL_START_SIZE + (currentLevel - 1) > cap) {
    newCharThisLevel = null;
    learnedPool = order.slice();
  } else {
    learnedPool      = poolForLevel(gameMode, currentLevel);
    newCharThisLevel = newCharForLevel(gameMode, currentLevel);
  }
  // Float a "LEVEL N" callout so the player feels the progression beat.
  addFloat(`LEVEL ${currentLevel}`, W/2, 200, '#ffdd44', 28);
  if (newCharThisLevel) {
    const mode = MODES[gameMode];
    const rom  = mode.chars[newCharThisLevel] || '';
    addFloat(`new: ${newCharThisLevel}  ${rom}`, W/2, 232, '#ffff88', 16);
  }
  // Rebuild world (preserves player.hp via the level>1 branch of initGame).
  initGame();
  // Brief intro fanfare without holding the kaomoji off-screen — skip introActive
  // since the kaomoji is already positioned on the map.
  sndStart();
}

// ── Find Mode (Cmd/Ctrl+F or tap the button) ────────────────────────
// Highlights every alive instance of the character the player is CURRENTLY targeting.
// Typing that romaji once detonates them all.
// True while the current target is the un-introduced new-char on level 2+.
// Used to lock out Find Mode so the player can't bypass learning the new
// char by detonating every instance in one shot.
function findLockedOnNewChar() {
  if (!isProgressionMode(gameMode)) return false;
  if (currentLevel < 2 || !newCharThisLevel || newCharIntroduced) return false;
  const act = activeTarget();
  return !!(act && act.cell.char === newCharThisLevel);
}

function activateFind() {
  if (introActive) return;
  if (findMode.on || findMode.cooldown > 0) return;
  if (findLockedOnNewChar()) {
    // Soft-deny — show a tiny float so the player knows why.
    addFloat('LEARN IT FIRST', W/2, 180, '#ff8899', 14);
    return;
  }

  const act = activeTarget();
  if (!act) return;
  const target = act.cell.char;

  // Count all alive instances of the current target char
  let count = 0;
  buildings.forEach(b => {
    if (b.collapsed) return;
    b.cells.forEach(row => row.forEach(cell => {
      if (!cell.destroyed && cell.char === target) count++;
    }));
  });

  if (count < 2) return;  // current cell is the only one — pointless

  findMode.on = true; findMode.char = target; findMode.count = count;

  buildings.forEach(b => b.cells.forEach(row => row.forEach(cell => {
    cell.hi = (!cell.destroyed && cell.char === target);
  })));

  flash.alpha = 0.22; flash.col = P.find_fl;
  addFloat(`◆ FIND: ${target} (${KR[target]})  ×${count} ◆`, W/2, 160, P.find_fl, 17);
  sndFindOn();
}

function clearHighlights() {
  buildings.forEach(b => b.cells.forEach(row => row.forEach(cell => cell.hi = false)));
}

// ── End Game ──────────────────────────────────────────────────────────
function endGame(win=false) {
  if (gState === 'gameover') return;
  hiScore = Math.max(hiScore, score);
  gState = 'gameover';
  sndGameOver(win);
}

// ═══════════════════════════════════════════════════════════════════
//  PARTICLES & FLOATING TEXT
// ═══════════════════════════════════════════════════════════════════
function spawnParticles(x, y) {
  const col = '#44ff66';
  for (let i=0; i<12; i++) {
    const a = Math.PI*2*(i/12) + rnd(-0.3,0.3);
    const spd = rnd(1.5,4.5);
    particles.push({
      x, y,
      vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - 1.8,
      life: rnd(22,50), maxLife:50,
      ch: pick(PCHARS), col
    });
  }
}

function addFloat(txt, x, y, col=P.score_fl, sz=15, vx=0, vy=-1.5) {
  floats.push({ txt, x, y, vx, vy, life:75, maxLife:75, col, sz });
}

// ═══════════════════════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════════════════════
function update() {
  if (gState !== 'playing') return;
  if (showHelp) return;  // freeze gameplay while the help overlay is open
  frame++;

  // Hold the kaomoji off-screen while the intro plays
  if (introActive) {
    if (Date.now() - introStart > INTRO_DUR) introActive = false;
    else { player.vx = 0; return; }
  }

  // Flash decay
  if (flash.alpha > 0) flash.alpha = Math.max(0, flash.alpha - 0.022);

  // Find mode cooldown
  if (findMode.cooldown > 0) findMode.cooldown--;
  if (!findMode.on) clearHighlights();

  // Auto-target nearest alive building
  player.tgt = nearestBuilding();

  // Auto-walk to a spot just LEFT of the active cell (so the kaomoji doesn't
  // block the letter it's about to smash). Updates to the next cell after a destroy.
  const tgtB = (player.tgt>=0 && player.tgt<buildings.length) ? buildings[player.tgt] : null;
  const act  = tgtB ? firstCell(tgtB) : null;

  // Reset hint timer whenever the active target cell changes (by object
  // identity — word-mode floor splices leave the new word at the same f:c
  // index, which a string key would treat as unchanged).
  if (act) {
    if (act.cell !== activeCell) { activeCell = act.cell; activeStartTime = Date.now(); }
  } else {
    activeCell = null;
  }
  let standX = null;
  if (tgtB && !tgtB.collapsed) {
    const tCellW = tgtB.cellW || CW;
    if (act) standX = tgtB.x + act.c*tCellW - 60; // 60px left of cell's left edge so the kaomoji body never covers the glyph
    else     standX = tgtB.x + tgtB.width/2;      // fallback
  }
  if (standX !== null) {
    const dx   = standX - player.x;
    const dist = Math.abs(dx);
    if (dist > 3) player.vx = Math.sign(dx) * Math.min(2.8, dist*0.18);
    else          player.vx *= 0.5;
  } else {
    player.vx *= 0.72;
  }

  // Freeze movement during the destroy-punch so the lunge reads cleanly
  if (player.punch > 0) { player.vx = 0; player.punch--; }

  // Lower clamp is below 0 so the kaomoji can walk in from off-screen on round start
  player.x = Math.max(-120, Math.min(W-20, player.x + player.vx));
  if (player.vx >  0.25) player.facing =  1;
  if (player.vx < -0.25) player.facing = -1;
  // When settled, face the cell we're attacking (always to the right of player)
  if (act && Math.abs(player.vx) < 0.25) {
    const _cw = tgtB.cellW || CW;
    const cellCenterX = tgtB.x + act.c*_cw + _cw/2;
    player.facing = cellCenterX >= player.x ? 1 : -1;
  }

  // Walk animation
  player.wTimer++;
  if (player.wTimer > 7) {
    player.wFrame = (player.wFrame+1)%4;
    player.wTimer = 0;
    // Heavy thud on the two foot-down frames (0 and 2) while actually moving
    if ((player.wFrame === 0 || player.wFrame === 2) && Math.abs(player.vx) > 0.25) {
      sndFootstep();
    }
  }

  // Building shake decay
  buildings.forEach(b => { if (b.shakeX>0) b.shakeX = Math.max(0, b.shakeX-0.38); });

  // Falling cells (gravity for collapsed floors)
  buildings.forEach(b => {
    b.cells.forEach(row => row.forEach(cell => {
      if (cell.fallY && cell.fallY > 0) {
        cell.fallVy = (cell.fallVy || 0) + 1.6;   // gravity
        cell.fallY -= cell.fallVy;
        if (cell.fallY <= 0) {
          cell.fallY = 0;
          cell.fallVy = 0;
        }
      }
    }));
  });

  // Particles
  particles = particles.filter(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.14; p.life--;
    return p.life > 0;
  });

  // Laser beams (find-mode burst)
  updateLasers();

  // Float texts
  floats = floats.filter(ft => { ft.y+=ft.vy; ft.x += (ft.vx||0); ft.life--; return ft.life>0; });
}

// Cloud drift runs every frame (menu, gameover, playing) so the sky always moves.
function updateAmbient() {
  clouds.forEach(cl => {
    cl.x += cl.vx;
    const cw = ((cl.shape[0] || '').length) * (cl.sz * 0.6);
    if (cl.x > W + 20) cl.x = -cw - 30 - Math.random()*60;
  });
  maybeSpawnVehicle();
  updateVehicles();
}

// ── Background vehicles ──────────────────────────────────────────────
function spawnVehicle() {
  const type = pick(VEHICLE_TYPES);
  const def  = VEHICLE_DEFS[type];
  const goRight = Math.random() < 0.5;
  const frames  = goRight ? def.frames : (def.framesLeft || def.frames);
  const w  = (frames[0][0] || '').length * def.fontSize * 0.62;
  const y  = def.yMin + Math.random() * (def.yMax - def.yMin);
  const speed = def.vxMin + Math.random() * (def.vxMax - def.vxMin);
  vehicles.push({
    type, frames, color: def.color, fontSize: def.fontSize,
    animDur: def.animDur || 0,
    x: goRight ? -w - 20 : W + 20,
    y, vx: goRight ? speed : -speed, width: w,
    frameIdx: 0, frameT: 0,
  });
}

function maybeSpawnVehicle() {
  if (--vehicleSpawnTimer > 0) return;
  if (vehicles.length < 4) spawnVehicle();
  vehicleSpawnTimer = 180 + Math.floor(Math.random() * 360);  // 3–9s @ 60fps
}

function updateVehicles() {
  for (let i = vehicles.length - 1; i >= 0; i--) {
    const v = vehicles[i];
    v.x += v.vx;
    if (v.animDur > 0) {
      v.frameT++;
      if (v.frameT >= v.animDur) {
        v.frameT = 0;
        v.frameIdx = (v.frameIdx + 1) % v.frames.length;
      }
    }
    if (v.x > W + 30 || v.x < -v.width - 30) vehicles.splice(i, 1);
  }
}

function drawVehicles() {
  if (!vehicles.length) return;
  ctx.textAlign = 'left';
  vehicles.forEach(v => {
    ctx.font      = `${v.fontSize}px "Courier New"`;
    ctx.fillStyle = v.color;
    const frame = v.frames[v.frameIdx];
    const lh    = v.fontSize - 1;
    for (let i = 0; i < frame.length; i++) {
      ctx.fillText(frame[i], v.x, v.y + i * lh);
    }
  });
}

// ═══════════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════════
function render() {
  ctx.clearRect(0,0,W,H);

  if (gState==='menu')     { renderMenu();     if (showHelp) drawHelpOverlay(); TraceMode.render(); return; }
  if (gState==='select')   { renderSelect();   if (showHelp) drawHelpOverlay(); TraceMode.render(); return; }
  if (gState==='gameover') { renderGameOver(); if (showHelp) drawHelpOverlay(); TraceMode.render(); return; }

  drawBG();
  drawBuildings();
  drawGround();
  drawTrees();
  drawVehicles();
  drawParticles();
  drawLasers();
  drawFloats();
  drawPlayer();
  drawInputPanel();
  drawHUD();

  if (introActive) drawIntroOverlay();

  // Screen flash overlay
  if (flash.alpha > 0) {
    ctx.globalAlpha = flash.alpha;
    ctx.fillStyle   = flash.col;
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = 1;
  }

  drawScanlines();
  drawMissReveal();
  if (showHelp) drawHelpOverlay();
  TraceMode.render();   // TraceMode: overlay on top of everything when active
}

// Big center banner showing the romaji the player should have typed.
// Fades in fast, holds, then fades out. Active for MISS_REVEAL_MS.
function drawMissReveal() {
  if (!missRevealActive()) return;
  const remaining = missReveal.until - Date.now();
  const t = remaining / MISS_REVEAL_MS;        // 1 → 0 over the window
  // Pop instantly, hold most of the window, fade out in the last 25%.
  const alpha = t < 0.25 ? Math.max(0, t / 0.25) : 1;
  const cx = W / 2, cy = H / 2 - 20;

  // Dim backdrop so the banner pops against busy ASCII
  ctx.globalAlpha = alpha * 0.45;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, cy - 80, W, 180);

  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center';

  // Small label
  ctx.font = 'bold 16px "Courier New"';
  ctx.fillStyle = '#ff8899';
  ctx.fillText('WRONG — type this:', cx, cy - 48);

  // Glyph
  ctx.font = 'bold 64px "Courier New"';
  ctx.shadowBlur = 22; ctx.shadowColor = '#ff5566';
  ctx.fillStyle = '#ffe0e0';
  ctx.fillText(missReveal.char, cx, cy + 8);
  ctx.shadowBlur = 0;

  // Romaji
  ctx.font = 'bold 56px "Courier New"';
  ctx.shadowBlur = 22; ctx.shadowColor = '#ff5566';
  ctx.fillStyle = '#ff6677';
  ctx.fillText(missReveal.romaji.toUpperCase(), cx, cy + 72);
  ctx.shadowBlur = 0;

  ctx.globalAlpha = 1;
  ctx.textAlign = 'left';
}

// ── Background (ASCII stars, mountains, drifting clouds) ────────────
function drawBG() {
  const g = ctx.createLinearGradient(0,0,0,GY);
  g.addColorStop(0, P.sky0);
  g.addColorStop(1, P.sky1);
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,GY);

  drawStars();
  drawMountains();
  drawClouds();
}

function drawStars() {
  const t = Date.now()/1000;
  ctx.textAlign = 'left';
  STARS.forEach(s => {
    const a = 0.35 + 0.4*Math.sin(t*0.9 + s.tw);
    ctx.globalAlpha = Math.max(0.1, a);
    ctx.font = `${s.sz}px "Courier New"`;
    ctx.fillStyle = '#a8b8e8';
    ctx.fillText(s.ch, s.x, s.y);
  });
  ctx.globalAlpha = 1;
}

function drawMountains() {
  if (!mountains.length) return;
  ctx.textAlign = 'left';
  const lh = 10;
  mountains.forEach(p => {
    const rows = Math.max(2, Math.floor(p.h / lh));
    const halfW = p.w / 2;
    const cx = p.x + halfW;
    for (let r=0; r<rows; r++) {
      const y = GY - 2 - r*lh;
      const slope = (rows - r) * (halfW / rows);
      const isTop = r >= rows - 2;
      ctx.font = `${lh+1}px "Courier New"`;
      ctx.fillStyle = isTop ? '#4a6a52' : '#1a3a24';
      ctx.fillText('/', cx - slope, y);
      ctx.fillText('\\', cx + slope - 7, y);
      // sparse interior shading
      if (r > 0 && r % 2 === 0) {
        ctx.fillStyle = '#0e2418';
        let fx = cx - slope + 8;
        while (fx < cx + slope - 10) {
          ctx.fillText('.', fx, y);
          fx += 10;
        }
      }
    }
  });
}

function drawClouds() {
  if (!clouds.length) return;
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(150,168,200,0.55)';
  clouds.forEach(cl => {
    ctx.font = `${cl.sz}px "Courier New"`;
    const lh = cl.sz - 1;
    cl.shape.forEach((line, i) => {
      ctx.fillText(line, cl.x, cl.y + i*lh);
    });
  });
}

function drawTrees() {
  if (!trees.length) return;
  ctx.textAlign = 'left';
  trees.forEach(t => {
    ctx.font = `${t.sz}px "Courier New"`;
    ctx.fillStyle = t.c;
    const lh = t.sz - 1;
    const bottomY = GY - 2;
    for (let i=0; i<t.shape.length; i++) {
      const y = bottomY - (t.shape.length - 1 - i) * lh;
      ctx.fillText(t.shape[i], t.x, y);
    }
  });
}

// ── Ground ────────────────────────────────────────────────────────────
function drawGround() {
  // Solid ground band so buildings/monster don't look like they're floating
  ctx.fillStyle = P.ground;
  ctx.fillRect(0, GY, W, PNL_Y - GY);

  // Strong horizon ridge — 2 px line at the top edge of the ground
  ctx.fillStyle = '#3a7a3a';
  ctx.fillRect(0, GY, W, 2);

  // Ground texture row, slightly brighter than before
  ctx.font = '11px "Courier New"';
  const TEX = ['▓','▒','░','▒'];
  for (let x=0; x<W; x+=12) {
    ctx.fillStyle = P.gndtex;
    ctx.fillText(TEX[Math.floor(x/12)%4], x, GY+12);
  }
}

// ── Buildings ────────────────────────────────────────────────────────
function drawBuildings() {
  buildings.forEach((b, bi) => {
    if (b.collapsed) return;

    const sx  = b.shakeX * Math.sin(Date.now()/38);
    const isTgt = bi === player.tgt;
    const act = isTgt ? firstCell(b) : null;

    // Top row's fallY (used to keep the cap/label glued to the falling stack)
    const topRow = b.cells[b.floors-1];
    const topFallY = (topRow && topRow[0]) ? (topRow[0].fallY || 0) : 0;
    const topY = GY - b.floors*CH - topFallY;

    // Building base
    ctx.fillStyle = '#0a140a';
    ctx.fillRect(b.x+sx, topY, b.width, 4);

    // Cells
    const bcw = b.cellW || CW;
    for (let f=0; f<b.floors; f++) {
      for (let c=0; c<b.cols; c++) {
        drawCell(
          b.x + sx + c*bcw,
          GY - (f+1)*CH,
          b.cells[f][c],
          isTgt && act && act.f===f && act.c===c,
          bcw
        );
      }
    }

    // ASCII roof decoration (random per building)
    const cxLabel = b.x + sx + b.width/2;
    if (b.roof && b.roof.length) {
      const rfLH = 9;
      ctx.font      = '10px "Courier New"';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#3a8a3a';
      for (let i=0; i<b.roof.length; i++) {
        const y = topY - 4 - (b.roof.length - 1 - i) * rfLH;
        ctx.fillText(b.roof[i], cxLabel, y);
      }
    }
    ctx.textAlign = 'left';
  });
}

function drawCell(x, y, cell, isActive, cellW) {
  cellW = cellW || CW;
  // Apply falling offset (cell mid-air after a floor collapse below it)
  if (cell.fallY && cell.fallY > 0) y -= cell.fallY;

  // Dying animation
  if (cell.destroyed) {
    if (cell.dieAnim > 0) {
      cell.dieAnim--;
      ctx.globalAlpha = cell.dieAnim/20;
      ctx.font = '13px "Courier New"';
      ctx.fillStyle   = '#ff7700';
      ctx.textAlign   = 'center';
      ctx.fillText('░▒▓', x+cellW/2, y+CH/2+4);
      ctx.globalAlpha = 1;
      ctx.textAlign   = 'left';
    }
    return;
  }

  if (cell.hitAnim > 0) cell.hitAnim--;

  // Determine color theme
  let bg, bd, kt;
  if (cell.hi) {
    bg=P.find_bg;  bd=P.find_bd;  kt=P.find_k;
  } else if (isActive) {
    bg=P.act_bg;   bd=P.act_bd;   kt=P.act_k;
  } else if (cell.hitAnim > 0) {
    bg=P.hit_bg;   bd=P.hit_bd;   kt='#ff6666';
  } else {
    bg = P.fill_w;
    bd = P.bdr_w;
    kt = P.katakana;
  }

  // Background
  ctx.fillStyle = bg;
  ctx.fillRect(x, y, cellW, CH);

  // Outer border (the wall)
  ctx.strokeStyle = bd;
  ctx.lineWidth   = (isActive || cell.hi) ? 1.5 : 1;
  ctx.strokeRect(x+0.5, y+0.5, cellW-1, CH-1);

  // Inner frame — a smaller box that wraps the character, so each cell
  // reads as a window pane in a building wall.
  const inset = 6;
  ctx.strokeStyle = isActive ? '#7a7a1a' : cell.hi ? '#7a4a10' : '#1c4a1c';
  ctx.lineWidth   = 1;
  ctx.strokeRect(x+inset+0.5, y+inset+0.5, cellW-inset*2-1, CH-inset*2-1);

  // Glyph — shrink the font for long word cells so it stays inside the frame
  const charLen = (cell.char || '').length;
  const fontPx  = charLen > 4 ? 16 : charLen > 2 ? 18 : 20;
  ctx.font      = `bold ${fontPx}px "Courier New"`;
  ctx.fillStyle = kt;
  ctx.textAlign = 'center';
  if (isActive || cell.hi) { ctx.shadowBlur=9; ctx.shadowColor=kt; }
  ctx.fillText(cell.char, x+cellW/2, y+CH/2+6);
  ctx.shadowBlur = 0;

  // Romaji hint (small, bottom of cell) — only revealed on the active target
  // once the 1-second delay elapses. Other cells stay blank so the player
  // can't peek ahead at upcoming characters.
  if (isActive) {
    ctx.font = '9px "Courier New"';
    if (hintRevealed()) {
      ctx.fillStyle = '#d8e8d8';
      ctx.fillText(cell.romaji, x+cellW/2, y+CH-4);
    } else {
      ctx.fillStyle = '#4a6a4a';
      ctx.fillText('???', x+cellW/2, y+CH-4);
    }
  }

  // Blinking ▼ cursor above active target
  if (isActive && (frame%24)<12) {
    ctx.fillStyle = '#ffff00';
    ctx.font      = '9px "Courier New"';
    ctx.fillText('▼', x+cellW/2, y-1);
  }

  ctx.textAlign = 'left';
}

// ── Particles ─────────────────────────────────────────────────────────
function drawParticles() {
  ctx.font = '11px "Courier New"';
  particles.forEach(p => {
    ctx.globalAlpha = p.life/p.maxLife;
    ctx.fillStyle   = p.col;
    ctx.fillText(p.ch, p.x, p.y);
  });
  ctx.globalAlpha = 1;
}

// ── Laser beams (find-mode burst) ─────────────────────────────────────
// Beam grows from kaomoji to target until `hitAt`, then the trailing end
// retracts toward the target as it fades. A bright ✦ pops at the impact site.
function drawLasers() {
  lasers.forEach(L => {
    const headT = Math.min(1, L.life / L.hitAt);
    const tailT = L.hit ? Math.min(1, (L.life - L.hitAt) / (L.maxLife - L.hitAt)) : 0;
    const dx = L.x2 - L.x1, dy = L.y2 - L.y1;
    const sx = L.x1 + dx * tailT;
    const sy = L.y1 + dy * tailT;
    const ex = L.x1 + dx * headT;
    const ey = L.y1 + dy * headT;
    const fade = 1 - tailT;

    // Outer glow
    ctx.globalAlpha = fade * 0.55;
    ctx.strokeStyle = P.find_fl;
    ctx.lineWidth   = 7;
    ctx.lineCap     = 'round';
    ctx.shadowBlur  = 20; ctx.shadowColor = P.find_fl;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();

    // Inner hot core
    ctx.globalAlpha = fade;
    ctx.strokeStyle = '#ffffd0';
    ctx.lineWidth   = 2;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();

    ctx.shadowBlur = 0;
    ctx.lineCap    = 'butt';

    // Impact flash
    if (L.hit) {
      const k = (L.life - L.hitAt) / Math.max(1, L.maxLife - L.hitAt);
      const fa = Math.max(0, 1 - k);
      ctx.globalAlpha = fa;
      ctx.fillStyle   = '#ffffaa';
      ctx.font        = `bold ${16 + k*14}px "Courier New"`;
      ctx.textAlign   = 'center';
      ctx.shadowBlur  = 18; ctx.shadowColor = P.find_fl;
      ctx.fillText('✦', L.x2, L.y2 + 5);
      ctx.shadowBlur  = 0;
      ctx.textAlign   = 'left';
    }
    ctx.globalAlpha = 1;
  });
}

// ── Floating score text ───────────────────────────────────────────────
function drawFloats() {
  ctx.textAlign = 'center';
  floats.forEach(ft => {
    ctx.globalAlpha = Math.min(1, ft.life/ft.maxLife * 2);
    ctx.font        = `bold ${ft.sz}px "Courier New"`;
    ctx.fillStyle   = ft.col;
    ctx.shadowBlur  = 6; ctx.shadowColor = ft.col;
    ctx.fillText(ft.txt, ft.x, ft.y);
    ctx.shadowBlur  = 0;
  });
  ctx.globalAlpha = 1;
  ctx.textAlign   = 'left';
}

// ── Player (Kaomoji Monster) ──────────────────────────────────────────
function drawPlayer() {
  if (introActive) return;  // kaomoji enters after the crowd has fled
  const px = player.x;
  const t  = Date.now();
  const moving   = Math.abs(player.vx) > 0.25;
  const punching = player.punch > 0;

  // Destroy-punch lunge — sine curve, 0 → peak → 0 over PUNCH_DUR frames
  let lungeX = 0, lungeT = 0;
  if (punching) {
    lungeT = Math.sin(((PUNCH_DUR - player.punch) / PUNCH_DUR) * Math.PI);
    lungeX = lungeT * 16 * player.punchDir;
  }
  const drawX = px + lungeX;

  ctx.textAlign  = 'center';
  ctx.shadowBlur = 13; ctx.shadowColor = P.pglow;
  ctx.fillStyle  = P.player;

  // Tiny vertical bob while walking — sells the gait (paused during a punch)
  const bob = (moving && !punching) ? Math.abs(Math.sin(t/90)) * 1.5 : 0;

  ctx.font = 'bold 18px "Courier New"';
  ctx.fillText(player.head, drawX, GY-36 - bob);
  ctx.fillText(player.body, drawX, GY-15 - bob);

  ctx.shadowBlur = 0;

  // Legs — animated set cycles via wFrame while moving; stands still otherwise
  ctx.font      = 'bold 14px "Courier New"';
  ctx.fillStyle = P.player;
  const legStr  = (moving && !punching) ? player.legs.walk[player.wFrame] : player.legs.stand;
  ctx.fillText(legStr, drawX, GY+2);

  // Punch fist + BAM! — extends out from the kaomoji toward the smashed cell
  if (punching) {
    const fistDist = 22 + lungeT * 28;
    const fistX    = drawX + fistDist * player.punchDir;
    const fistY    = GY - 22;

    ctx.font       = 'bold 18px "Courier New"';
    ctx.fillStyle  = '#ffee44';
    ctx.shadowBlur = 14; ctx.shadowColor = '#ff7700';
    ctx.textAlign  = 'center';
    ctx.fillText(player.punchDir > 0 ? '══►' : '◄══', fistX, fistY);

    if (lungeT > 0.55) {
      ctx.font      = 'bold 14px "Courier New"';
      ctx.fillStyle = '#ffff88';
      ctx.fillText('BAM!', drawX + 48 * player.punchDir, GY - 54);
    }
    ctx.shadowBlur = 0;
  }

  // Combo aura (combo ≥ 5)
  if (combo >= 5) {
    const pulse = 0.5 + 0.5*Math.sin(t/120);
    ctx.globalAlpha = pulse * 0.85;
    ctx.font        = `${11+pulse*5}px "Courier New"`;
    ctx.fillStyle   = '#ff7700';
    ctx.fillText('!!! !!!', drawX, GY-52);
    ctx.globalAlpha = 1;
  }

  ctx.textAlign = 'left';
}

// ── Input Panel (bottom bar) ──────────────────────────────────────────
function drawInputPanel() {
  const PY = PNL_Y;
  const PH = H - PY;

  ctx.fillStyle = P.panel_bg;
  ctx.fillRect(0, PY, W, PH);

  // Top border
  ctx.strokeStyle = P.panel_bd;
  ctx.lineWidth   = 1;
  ctx.beginPath(); ctx.moveTo(0,PY); ctx.lineTo(W,PY); ctx.stroke();

  const act = activeTarget();
  const LP  = 270;  // left panel width

  // Divider
  ctx.strokeStyle = P.panel_bd;
  ctx.beginPath(); ctx.moveTo(LP, PY+10); ctx.lineTo(LP, H-10); ctx.stroke();

  // ─ Left: target katakana ─
  ctx.textAlign  = 'center';
  ctx.font       = 'bold 10px "Courier New"';
  ctx.fillStyle  = '#9adb9a';
  ctx.fillText('TARGET', LP/2, PY+15);

  if (act) {
    // Shrink the big target glyph if it's a multi-character word
    const tgtLen = (act.cell.char || '').length;
    const tgtFont = tgtLen > 4 ? 24 : tgtLen > 2 ? 32 : 44;
    ctx.font      = `bold ${tgtFont}px "Courier New"`;
    ctx.shadowBlur = 16; ctx.shadowColor = '#ffff44';
    ctx.fillStyle  = '#ffff55';
    ctx.fillText(act.cell.char, LP/2, PY+62);
    ctx.shadowBlur = 0;

    ctx.font      = '12px "Courier New"';
    const _miss = missRevealActive();
    const _rev  = hintRevealed() || _miss;
    ctx.fillStyle  = _miss ? '#ff6677' : (_rev ? '#b8e0b8' : '#4a6a4a');
    ctx.fillText(_rev ? act.cell.romaji : '???', LP/2, PY+80);
  } else {
    ctx.font      = '11px "Courier New"';
    ctx.fillStyle  = P.hud_dim;
    ctx.fillText('— MOVE TO —', LP/2, PY+44);
    ctx.fillText('A BUILDING', LP/2, PY+60);
  }

  // ─ Right: romaji letter boxes ─
  if (act) {
    const rom  = act.cell.romaji;
    const typed = inputBuf;
    const BW=40, BH=42, BSP=8;
    const totalW = rom.length*(BW+BSP)-BSP;
    const RPx    = LP;
    const RPw    = W - LP;
    const bx0    = RPx + (RPw - totalW)/2;
    const by0    = PY + 12;

    const miss   = missRevealActive();
    const reveal = hintRevealed() || miss;
    for (let i=0; i<rom.length; i++) {
      const bx   = bx0 + i*(BW+BSP);
      const done = i < typed.length;
      const curr = i === typed.length;
      const showLetter = done || reveal;

      // Pulse box red while the miss reveal is on, otherwise normal styling.
      ctx.fillStyle   = miss && !done ? '#2a0a0a'
                        : done ? '#0a280a' : curr ? '#191900' : '#0a160a';
      ctx.fillRect(bx, by0, BW, BH);
      ctx.strokeStyle = miss && !done ? '#ff5566'
                        : done ? '#2eff5a' : curr ? '#ffff00' : '#5fa05f';
      ctx.lineWidth   = (done||curr||miss) ? 1.5 : 1;
      ctx.strokeRect(bx+0.5, by0+0.5, BW-1, BH-1);

      if (curr && !miss) { ctx.shadowBlur=9; ctx.shadowColor='#ffff00'; }
      if (miss && !done) { ctx.shadowBlur=10; ctx.shadowColor='#ff5566'; }
      ctx.font      = `bold ${done?20:curr?18:15}px "Courier New"`;
      const litCol  = miss && !done ? '#ff8899'
                       : done ? '#2eff5a'
                       : (showLetter ? (curr ? '#ffff66' : '#9adb9a') : '#3a5a3a');
      ctx.fillStyle = litCol;
      ctx.fillText(showLetter ? rom[i].toUpperCase() : '?', bx+BW/2, by0+BH/2+7);
      ctx.shadowBlur = 0;
    }

    drawFindButton(act);
  } else {
    drawFindButton(null);
  }

  ctx.textAlign = 'left';
}

// Clickable Find button (Cmd+F / Ctrl+F / tap)
function drawFindButton(act) {
  const { x, y, w, h } = FIND_BTN;
  let bg, bd, fg, label;

  if (findMode.on) {
    bg = '#2a1a00'; bd = P.find_fl; fg = P.find_fl;
    label = `◆ FIND ACTIVE: ${findMode.char} (${KR[findMode.char]}) ×${findMode.count} — type to detonate ◆`;
  } else if (findLockedOnNewChar()) {
    bg = '#1a0a0a'; bd = '#7a3a3a'; fg = '#ff8899';
    label = `[${FIND_KEY_LABEL}]  locked — learn the new char (${act.cell.char}) first`;
  } else if (findMode.cooldown > 0) {
    bg = '#0a0f0a'; bd = '#3a5a3a'; fg = '#7a9a7a';
    label = `[${FIND_KEY_LABEL}]  cooldown: ${Math.ceil(findMode.cooldown/60)}s`;
  } else if (act) {
    // Count current-char instances for the live hint
    let cnt = 0;
    buildings.forEach(b => { if (!b.collapsed) b.cells.forEach(row => row.forEach(c => {
      if (!c.destroyed && c.char === act.cell.char) cnt++;
    })); });
    const ready = cnt >= 2;
    bg = ready ? '#0a1a0a' : '#0a0f0a';
    bd = ready ? '#2eff5a' : '#3a5a3a';
    fg = ready ? '#9adb9a' : '#6a8a6a';
    label = ready
      ? `[${FIND_KEY_LABEL}]  detonate every ${act.cell.char} (${act.cell.romaji})  ×${cnt}`
      : `[${FIND_KEY_LABEL}]  no duplicate of current char on screen`;
  } else {
    bg = '#0a0f0a'; bd = '#3a5a3a'; fg = '#6a8a6a';
    label = `[${FIND_KEY_LABEL}]  find duplicates of current target`;
  }

  ctx.fillStyle = bg;
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = bd;
  ctx.lineWidth   = findMode.on ? 1.5 : 1;
  ctx.strokeRect(x+0.5, y+0.5, w-1, h-1);

  if (findMode.on) { ctx.shadowBlur = 5; ctx.shadowColor = P.find_fl; }
  ctx.font      = 'bold 11px "Courier New"';
  ctx.fillStyle = fg;
  ctx.textAlign = 'center';
  ctx.fillText(label, x + w/2, y + h/2 + 4);
  ctx.shadowBlur = 0;
}

// ── HUD ───────────────────────────────────────────────────────────────
function drawHUD() {
  ctx.fillStyle   = 'rgba(0,5,0,0.82)';
  ctx.fillRect(0, 0, W, HUD_H);
  ctx.strokeStyle = '#0d2a0d';
  ctx.lineWidth   = 1;
  ctx.strokeRect(0, 0, W, HUD_H);

  ctx.font = 'bold 13px "Courier New"';

  // Score (left)
  ctx.fillStyle = P.hud;
  ctx.textAlign = 'left';
  ctx.fillText(`スコア  ${score}`, 12, 23);

  // Level (kana modes only — sits just right of score)
  if (isProgressionMode(gameMode)) {
    ctx.fillStyle = '#ffdd44';
    ctx.fillText(`LV ${currentLevel}`, 132, 23);
  }

  // HP hearts (kana modes) — between level and combo
  if (isProgressionMode(gameMode)) {
    const hpX0 = 198;
    ctx.font = 'bold 16px "Courier New"';
    for (let i = 0; i < player.maxHp; i++) {
      const alive = i < player.hp;
      ctx.fillStyle = alive
        ? (player.hurtFlash > 0 && i === player.hp ? '#ffaaaa' : '#ff5566')
        : '#3a1a1a';
      ctx.fillText('♥', hpX0 + i * 18, 24);
    }
    ctx.font = 'bold 13px "Courier New"';
  }

  // Combo (center)
  if (combo > 0) {
    const cc = combo>=10 ? P.combo_hi : P.combo_lo;
    ctx.textAlign  = 'center';
    ctx.fillStyle  = cc;
    if (combo>=5) { ctx.shadowBlur=8; ctx.shadowColor=cc; }
    ctx.fillText(`COMBO  ×${combo}`, W/2, 23);
    ctx.shadowBlur = 0;
  }

  // Misses (right) — shifted left to leave room for the [?] help button
  ctx.textAlign = 'right';
  ctx.fillStyle = combo===0 && totalMisses>0 ? '#ff8888' : '#9adb9a';
  ctx.fillText(`misses: ${totalMisses}`, W-44, 23);

  ctx.textAlign = 'left';
  if (player.hurtFlash > 0) player.hurtFlash--;
  drawHelpButton();
}

// ── Intro overlay — tiny crowd scattering across the playing scene ──
function drawIntroOverlay() {
  const t = Date.now();
  const elapsed = t - introStart;

  // Tiny screaming/running people — clustered, single 8 px glyph each,
  // baseline on the ground line so they're standing on the dirt.
  ctx.textAlign  = 'center';
  ctx.font       = 'bold 8px "Courier New"';
  ctx.fillStyle  = '#e8e8e8';
  INTRO_PEOPLE.forEach(p => {
    const runT = Math.max(0, elapsed - INTRO_STAND - p.delay);
    const x = p.x0 + p.speed * runT * 0.001;
    if (x > W + 10) return;  // already gone

    const running = runT > 0;
    const bob     = running ? Math.sin(t/55 + p.bobPh) * 1.0 : Math.sin(t/170 + p.bobPh) * 0.3;
    const legSwap = running && (Math.floor((t + p.legPh*100)/110) % 2 === 1);

    ctx.fillText(running ? (legSwap ? '\\' : '/') : 'i', x, GY + bob);
  });

  // Speech bubble — fades in during stand, fades out when they run
  const bubbleAlpha = elapsed < INTRO_STAND
    ? Math.min(1, elapsed / 250)
    : Math.max(0, 1 - (elapsed - INTRO_STAND) / 700);
  if (bubbleAlpha > 0.01) {
    drawIntroBubble(W/2, GY - 26, bubbleAlpha);
  }

  // Skip hint (flashing)
  if ((Math.floor(t/500) % 2) === 0) {
    ctx.font      = '11px "Courier New"';
    ctx.fillStyle = '#7ac27a';
    ctx.textAlign = 'center';
    ctx.fillText('[ press any key to skip ]', W/2, H - 30);
  }
  ctx.textAlign = 'left';
}

// ╔═══════════════════════════════════════════════════════════════════╗
// ║  TRACE MODE  (EXPERIMENTAL — encapsulated, safe to remove)        ║
// ╠═══════════════════════════════════════════════════════════════════╣
// ║  Duolingo-style stroke tracing mini-game. Step 1 = guided tracks. ║
// ║                                                                   ║
// ║  TO REMOVE THIS FEATURE ENTIRELY:                                 ║
// ║    1. Delete this whole TraceMode block.                          ║
// ║    2. Remove the four call sites flagged with "// TraceMode:":    ║
// ║         - render() integration                                    ║
// ║         - handleKey() T-key trigger + ESC + input gate            ║
// ║         - pointerdown/move/up handlers                            ║
// ║         - menu hint line                                          ║
// ║  No other game code reads or writes TraceMode state.              ║
// ╚═══════════════════════════════════════════════════════════════════╝
const TraceMode = (() => {
  // Hand-defined stroke paths in 0–1 normalized coords. Each char's value
  // is an array of strokes; each stroke is an array of [x, y] waypoints.
  // Starts small — add more once the interaction feels right.
  const STROKES = {
    '一': [
      [[0.10, 0.50], [0.50, 0.50], [0.90, 0.50]],
    ],
    '二': [
      [[0.15, 0.32], [0.85, 0.32]],
      [[0.10, 0.70], [0.90, 0.70]],
    ],
    '三': [
      [[0.18, 0.22], [0.82, 0.22]],
      [[0.26, 0.50], [0.74, 0.50]],
      [[0.10, 0.78], [0.90, 0.78]],
    ],
    'い': [
      [[0.30, 0.22], [0.27, 0.45], [0.32, 0.65], [0.48, 0.78], [0.58, 0.72]],
      [[0.72, 0.30], [0.73, 0.55], [0.70, 0.66]],
    ],
    'こ': [
      [[0.22, 0.32], [0.55, 0.32], [0.72, 0.34]],
      [[0.15, 0.68], [0.45, 0.76], [0.80, 0.72]],
    ],
  };

  const TOL_PX = 32;   // pixel distance for a waypoint to count as "covered"
  const PASS   = 0.7;  // fraction of waypoints needed to clear a stroke

  let active = false;
  let glyph  = '';
  let strokes = [];
  let strokeIdx = 0;
  let drawn = [];      // current in-progress user points
  let isDrawing = false;
  let box = { x: 0, y: 0, size: 400 };
  let flashUntil = 0;  // brief success-flash timestamp
  let startTime = 0;   // for the recall-before-reveal delay on the romaji label

  // Pull romaji from existing mode maps so the label always matches the
  // rest of the game (no duplicated truth).
  function romajiFor(ch) {
    return (typeof KJR !== 'undefined' && KJR[ch])
        || (typeof HR  !== 'undefined' && HR[ch])
        || (typeof DR  !== 'undefined' && DR[ch])
        || (typeof KR  !== 'undefined' && KR[ch])
        || (typeof DKR !== 'undefined' && DKR[ch])
        || '';
  }
  function labelRevealed() { return Date.now() - startTime >= HINT_DELAY_MS; }

  function availableChars() { return Object.keys(STROKES); }
  function isActive()       { return active; }

  function start(char) {
    if (!STROKES[char]) return false;
    active = true;
    glyph = char;
    strokes = STROKES[char];
    strokeIdx = 0;
    drawn = [];
    isDrawing = false;
    flashUntil = 0;
    startTime = Date.now();
    return true;
  }

  function exit() {
    active = false;
    isDrawing = false;
    drawn = [];
  }

  function layout() {
    const size = Math.min(W, H) * 0.62;
    box = { x: (W - size) / 2, y: (H - size) / 2 - 14, size };
  }

  function npx(p) {
    return { x: box.x + p[0] * box.size, y: box.y + p[1] * box.size };
  }

  function pointer(type, x, y) {
    if (!active) return;
    if (type === 'down') {
      isDrawing = true;
      drawn = [{ x, y }];
    } else if (type === 'move') {
      if (!isDrawing) return;
      const last = drawn[drawn.length - 1];
      if (!last || Math.hypot(x - last.x, y - last.y) > 3) drawn.push({ x, y });
    } else if (type === 'up') {
      if (!isDrawing) return;
      isDrawing = false;
      scoreStroke();
    }
  }

  function scoreStroke() {
    if (strokeIdx >= strokes.length) return;
    const target = strokes[strokeIdx].map(npx);
    let covered = 0;
    for (const p of target) {
      let best = Infinity;
      for (const d of drawn) {
        const dist = Math.hypot(d.x - p.x, d.y - p.y);
        if (dist < best) best = dist;
      }
      if (best < TOL_PX) covered++;
    }
    const score = covered / target.length;
    if (score >= PASS) {
      strokeIdx++;
      drawn = [];
      flashUntil = Date.now() + 320;
      if (strokeIdx >= strokes.length) {
        // All strokes cleared — celebrate briefly then exit
        setTimeout(() => exit(), 900);
      }
    } else {
      drawn = [];  // missed; let them try again
    }
  }

  function render() {
    if (!active) return;
    layout();
    const t = Date.now();

    // Dim full-screen backdrop
    ctx.fillStyle = 'rgba(0, 8, 4, 0.92)';
    ctx.fillRect(0, 0, W, H);

    // Box outline
    ctx.strokeStyle = '#1c4a1c';
    ctx.lineWidth   = 1;
    ctx.strokeRect(box.x + 0.5, box.y + 0.5, box.size - 1, box.size - 1);

    // Faded full glyph as visual anchor
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.font         = `bold ${Math.floor(box.size * 0.78)}px "Courier New"`;
    ctx.fillStyle    = 'rgba(46, 255, 90, 0.07)';
    ctx.fillText(glyph, box.x + box.size/2, box.y + box.size/2);
    ctx.textBaseline = 'alphabetic';

    // Title
    ctx.font      = 'bold 22px "Courier New"';
    ctx.fillStyle = '#2eff5a';
    ctx.shadowBlur = 10; ctx.shadowColor = '#2eff5a';
    ctx.fillText(`TRACE   ${glyph}`, W/2, box.y - 54);
    ctx.shadowBlur = 0;

    // Romaji name — hidden for ~1s so the player can recall it first
    const rom = romajiFor(glyph);
    const reveal = labelRevealed();
    ctx.font       = 'bold 15px "Courier New"';
    ctx.fillStyle  = reveal ? '#ffe080' : '#5a6a3a';
    ctx.fillText(reveal && rom ? rom : '???', W/2, box.y - 32);

    ctx.font      = '12px "Courier New"';
    ctx.fillStyle = '#9adb9a';
    ctx.fillText(`stroke ${Math.min(strokeIdx + 1, strokes.length)} / ${strokes.length}`, W/2, box.y - 12);

    // Already-completed strokes — solid green ink
    ctx.lineCap   = 'round';
    ctx.lineJoin  = 'round';
    ctx.strokeStyle = '#2eff5a';
    ctx.lineWidth = 6;
    for (let i = 0; i < strokeIdx; i++) {
      const s = strokes[i];
      ctx.beginPath();
      s.forEach((p, j) => {
        const pp = npx(p);
        if (j === 0) ctx.moveTo(pp.x, pp.y); else ctx.lineTo(pp.x, pp.y);
      });
      ctx.stroke();
    }

    // Current stroke as a pulsing track
    if (strokeIdx < strokes.length) {
      const s = strokes[strokeIdx];
      const pulse = 0.5 + 0.5 * Math.sin(t / 220);
      ctx.strokeStyle = `rgba(255, 224, 64, ${0.30 + pulse * 0.35})`;
      ctx.lineWidth   = 24;
      ctx.beginPath();
      s.forEach((p, j) => {
        const pp = npx(p);
        if (j === 0) ctx.moveTo(pp.x, pp.y); else ctx.lineTo(pp.x, pp.y);
      });
      ctx.stroke();

      // Start dot + end arrow so the order is obvious
      const sp = npx(s[0]);
      ctx.fillStyle = '#ffe040';
      ctx.beginPath(); ctx.arc(sp.x, sp.y, 9, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1a1a1a';
      ctx.font      = 'bold 12px "Courier New"';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('1', sp.x, sp.y + 1);
      ctx.textBaseline = 'alphabetic';

      const ep = npx(s[s.length - 1]);
      ctx.fillStyle = '#ff8a30';
      ctx.beginPath(); ctx.arc(ep.x, ep.y, 7, 0, Math.PI*2); ctx.fill();
    }

    // User's live drag
    if (drawn.length > 1) {
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth   = 4;
      ctx.beginPath();
      drawn.forEach((p, i) => {
        if (i === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
      });
      ctx.stroke();
    }

    // Success flash
    if (t < flashUntil) {
      const k = (flashUntil - t) / 320;
      ctx.fillStyle = `rgba(46, 255, 90, ${k * 0.25})`;
      ctx.fillRect(box.x, box.y, box.size, box.size);
    }

    // Footer hint
    ctx.font      = '11px "Courier New"';
    ctx.fillStyle = '#7ac27a';
    ctx.textAlign = 'center';
    ctx.fillText('[ trace the yellow path — ESC to exit ]', W/2, H - 18);
    ctx.textAlign = 'left';
  }

  return { start, exit, isActive, pointer, render, availableChars };
})();

// ═══════════════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════════════
function loop() {
  update();
  updateAmbient();
  render();
  updateFindBtn();
  requestAnimationFrame(loop);
}

// ── Event Listeners ───────────────────────────────────────────────────
const ki = document.getElementById('ki');
const findBtn = document.getElementById('findbtn');
if (IS_MOBILE) {
  findBtn.hidden = false;
  // pointerdown (not click) so we don't dismiss the keyboard before activating
  findBtn.addEventListener('pointerdown', ev => {
    if (findBtn.disabled) return;
    ev.preventDefault();
    audio();
    if (gState === 'playing') activateFind();
    focusMobileInput();
  });
}
function updateFindBtn() {
  if (!IS_MOBILE) return;
  findBtn.classList.toggle('active', findMode.on);
  findBtn.disabled = findMode.cooldown > 0 || gState !== 'playing' || showHelp || findLockedOnNewChar();
  if (findMode.on)               findBtn.textContent = `◆ ${findMode.char} ×${findMode.count}`;
  else if (findMode.cooldown>0)  findBtn.textContent = `FIND ${Math.ceil(findMode.cooldown/60)}s`;
  else                           findBtn.textContent = '[ FIND ]';
}
let lastBackspaceAt = 0;
function deleteOneFromBuf() {
  // Deduplicate Backspace fired from both keydown and beforeinput on mobile
  const now = Date.now();
  if (now - lastBackspaceAt < 80) return;
  lastBackspaceAt = now;
  inputBuf = inputBuf.slice(0, -1);
}

window.addEventListener('keydown', e => {
  // On mobile the hidden input may be focused; letter input is delivered via
  // the input element's 'input' event. Skip the duplicate path here, but still
  // allow modifier shortcuts (find/mute), Enter, Backspace, etc. through.
  if (e.target === ki &&
      e.key.length === 1 && /[a-z]/i.test(e.key) &&
      !e.ctrlKey && !e.metaKey && !e.altKey) {
    return;
  }
  keys[e.key] = true;
  handleKey(e);
});
window.addEventListener('keyup', e => {
  keys[e.key] = false;
});

// Hidden input — translates the mobile/IME keyboard into typeChar calls
ki.addEventListener('input', () => {
  const v = ki.value;
  ki.value = '';
  if (!v) return;
  for (const ch of v.toLowerCase()) {
    if (/[a-z]/.test(ch)) typeChar(ch);
  }
});
ki.addEventListener('beforeinput', e => {
  if (e.inputType === 'deleteContentBackward') {
    deleteOneFromBuf();
    e.preventDefault();
  }
});

// Patch handleKey's Backspace path through dedupe (overrides inline slice above
// only when the hidden input is involved — desktop path still works unchanged).
const _origHandleKey = handleKey;
handleKey = function(e) {
  if (e.key === 'Backspace' && e.target === ki) { deleteOneFromBuf(); return; }
  return _origHandleKey(e);
};

// Canvas pointer (click/tap) — Find button + start/retry + focus mobile keyboard
function canvasPointerXY(ev) {
  const rect = c.getBoundingClientRect();
  return {
    x: (ev.clientX - rect.left) * (W / rect.width),
    y: (ev.clientY - rect.top)  * (H / rect.height),
  };
}
function focusMobileInput() {
  if (!IS_MOBILE) return;
  // iOS/Android require the focus() to be inside the user-gesture callstack
  try { ki.focus({ preventScroll: true }); } catch { ki.focus(); }
}
c.addEventListener('pointerdown', ev => {
  ev.preventDefault();
  const { x, y } = canvasPointerXY(ev);
  audio();  // wake AudioContext from gesture
  maybeStartIntroSong();

  // TraceMode: hand pointer events to the tracing overlay first
  if (TraceMode.isActive()) { TraceMode.pointer('down', x, y); return; }

  // Help button (top-right) — works in any state
  const hb = HELP_BTN;
  if (x >= hb.x && x <= hb.x+hb.w && y >= hb.y && y <= hb.y+hb.h) {
    showHelp = !showHelp;
    if (!showHelp) activeStartTime = Date.now();
    return;
  }
  // If the help overlay is open, any tap elsewhere closes it
  if (showHelp) {
    showHelp = false;
    activeStartTime = Date.now();
    return;
  }

  // Any tap skips the level-start intro
  if (introActive) { introActive = false; return; }

  if (gState === 'menu') {
    gState = 'select';
    return;
  }
  if (gState === 'select') {
    for (const card of SELECT_CARDS) {
      if (x >= card.x && x <= card.x+card.w && y >= card.y && y <= card.y+card.h) {
        startGame(card.key);
        focusMobileInput();
        return;
      }
    }
    return;
  }
  if (gState === 'gameover') {
    gState = 'select';
    return;
  }
  if (gState === 'playing') {
    const b = FIND_BTN;
    if (x >= b.x && x <= b.x+b.w && y >= b.y && y <= b.y+b.h) {
      activateFind();
    } else {
      // Tapping the playfield re-opens the keyboard if it dismissed
      focusMobileInput();
    }
  }
});

// TraceMode: pointer move/up only do work when the overlay is active
c.addEventListener('pointermove', ev => {
  if (!TraceMode.isActive()) return;
  ev.preventDefault();
  const { x, y } = canvasPointerXY(ev);
  TraceMode.pointer('move', x, y);
});
c.addEventListener('pointerup', ev => {
  if (!TraceMode.isActive()) return;
  ev.preventDefault();
  const { x, y } = canvasPointerXY(ev);
  TraceMode.pointer('up', x, y);
});

// ── Boot ──────────────────────────────────────────────────────────────
// Pre-fill ambient scenery so the menu/gameover screens have mountains+clouds.
mountains = makeMountainRidge();
clouds    = makeClouds();
// Seed a few vehicles already on-screen so the title isn't empty
for (let i = 0; i < 2; i++) {
  spawnVehicle();
  const v = vehicles[vehicles.length - 1];
  v.x = Math.random() * (W - v.width);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
