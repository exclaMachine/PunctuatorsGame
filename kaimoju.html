/* Hidden text input — invoked on mobile taps so the OS keyboard opens.
   font-size 16px prevents iOS Safari from auto-zooming on focus. */
#ki {
  position: fixed;
  bottom: 0; left: 0;
  width: 1px; height: 1px;

  padding: 0;

let actx = null;
function audio() {
  if (!actx) {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (AC) actx = new AC();
  }
  if (actx && actx.state === 'suspended') actx.resume();
  return actx;
}
function tone(freq, dur, type='square', vol=0.12, slideTo=null) {
  if (muted) return;
  const ac = audio(); if (!ac) return;
  const t0 = ac.currentTime;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t0);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(1,slideTo), t0+dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0+0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  o.connect(g).connect(ac.destination);
  o.start(t0); o.stop(t0+dur+0.02);
}
function noise(dur, vol=0.18, filterFreq=1200, filterQ=1) {
  if (muted) return;
  const ac = audio(); if (!ac) return;
  const t0 = ac.currentTime;
  const len = Math.floor(ac.sampleRate*dur);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i=0; i<len; i++) data[i] = (Math.random()*2-1) * (1 - i/len);
  const src = ac.createBufferSource(); src.buffer = buf;
  const f = ac.createBiquadFilter();
  f.type = 'lowpass'; f.frequency.value = filterFreq; f.Q.value = filterQ;
  const g = ac.createGain();
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
  src.connect(f).connect(g).connect(ac.destination);
  src.start(t0); src.stop(t0+dur+0.02);
}

// ── Drifting clouds & ground trees (regenerated per game) ───────────

  const n = 3 + Math.floor(Math.random()*3);  // 3–5 clouds
  return Array.from({length: n}, () => ({
    x: Math.random()*W,
    y: 30 + Math.random()*110,
    vx: 0.05 + Math.random()*0.18,
    shape: pick(CLOUD_SHAPES),
    sz: 11 + Math.floor(Math.random()*3),
  }));
}

function makeTrees() {
  const out = [];
  if (buildings.length === 0) return out;
  const pool = (BIOMES[currentBiome] || BIOMES.forest).trees;
  const cols = (BIOMES[currentBiome] || BIOMES.forest).treeCol;
  // Spans of open ground between buildings (and on the ends)
  const spans = [];
  spans.push([5, buildings[0].x - 4]);
  for (let i=0; i<buildings.length-1; i++) {
    const a = buildings[i].x + buildings[i].width + 4;
    const b = buildings[i+1].x - 4;
    if (b - a > 28) spans.push([a, b]);
  }
  const last = buildings[buildings.length-1];
  spans.push([last.x + last.width + 4, W - 4]);

  spans.forEach(([a, b]) => {
    if (b - a < 38) return;
    const slot = 56;
    const maxN = Math.max(1, Math.floor((b - a) / slot));
    const n = 1 + Math.floor(Math.random() * maxN);
    let cursor = a + 2;
    for (let i=0; i<n; i++) {
      if (cursor >= b - 30) break;
      const shape = pick(pool);
      const tw = (shape[0]||'').length * 7;       // approx pixel width
      const room = Math.max(2, b - cursor - tw - 2);
      const tx = cursor + Math.random() * Math.min(room, slot*0.6);
      out.push({
        x: tx,
        shape,
        c: pick(cols),
        sz: 11 + Math.floor(Math.random()*3),
      });
      cursor = tx + tw + 6;
    }
  });
  return out;
}

  const baseGap = 14;
  const margin  = 20;
  const totalBW = cfgs.reduce((s, cf) => s + cf.cols*CW, 0);
  const slots   = cfgs.length + 1;  // before-first + between + after-last
  const slack   = Math.max(0, W - totalBW - (slots-1)*baseGap - margin*2);
  // Random partition of slack across slots
  const cuts = Array.from({length: slots-1}, () => Math.random()).sort();
  const gaps = [];
  let prev = 0;
  for (const c of cuts) { gaps.push((c - prev) * slack); prev = c; }
  gaps.push((1 - prev) * slack);

  const charMap  = MODES[gameMode].chars;
  const charKeys = Object.keys(charMap);

  let bx = margin + gaps[0];
  return cfgs.map((cfg, i) => {
    const cells = Array.from({length:cfg.floors}, () =>
      Array.from({length:cfg.cols}, () => {
        const k = pick(charKeys);
        return {
          char: k, romaji: charMap[k],
          destroyed: false, hi: false,
          hitAnim: 0, dieAnim: 0
        };
      })
    );
    const bld = {
      x:bx, width:cfg.cols*CW,
      cols:cfg.cols, floors:cfg.floors,
      cells,
      collapsed:false, shakeX:0,
      roof: pick(ROOFS),
    };
    bx += bld.width + baseGap + (gaps[i+1] || 0);
    return bld;
  });
}

// First alive cell: bottom floor → top, left col → right
function firstCell(b) {
  for (let f=0; f<b.floors; f++)
    for (let c=0; c<b.cols; c++)
      if (!b.cells[f][c].destroyed) return {f, c, cell:b.cells[f][c]};
  return null;
}

function activeTarget() {
  if (player.tgt<0 || player.tgt>=buildings.length) return null;
  const b = buildings[player.tgt];
  if (!b || b.collapsed) return null;
  return firstCell(b);
}

function nearestBuilding() {
  let best=-1, bestD=1e9;
  buildings.forEach((b,i) => {
    if (b.collapsed) return;
    const d = Math.abs(player.x - (b.x + b.width/2));
    if (d<bestD) { bestD=d; best=i; }
  });
  return best;
}

// ═══════════════════════════════════════════════════════════════════
//  INPUT HANDLING
// ═══════════════════════════════════════════════════════════════════
function handleKey(e) {
  const findMod = IS_MAC ? e.metaKey : e.ctrlKey;

  // Prevent browser shortcuts we're using
  if (findMod && e.key.toLowerCase()==='f') { e.preventDefault(); }
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) {
    e.preventDefault();
  }

  // Mute toggle works in any state (Ctrl+M — plain M is a romaji input letter)
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase()==='m') {
    e.preventDefault();
    muted = !muted;
    if (!muted) { audio(); tone(660, 0.08, 'triangle', 0.10); }
    return;
  }

  // Help toggle (works in any state; '?' is shift+/ on US keyboards)
  if (e.key === '?') {
    e.preventDefault();
    showHelp = !showHelp;
    if (!showHelp) activeStartTime = Date.now();
    return;
  }
  if (e.key === 'Escape') {
    if (showHelp) { showHelp = false; activeStartTime = Date.now(); e.preventDefault(); return; }
    if (gState === 'select') { gState = 'menu'; e.preventDefault(); return; }
    return;
  }
  // Swallow all other input while the help overlay is open
  if (showHelp) return;

  if (gState==='menu') {
    if (e.key==='Enter') { gState='select'; }
    return;
  }
  if (gState==='select') {
    const idx = parseInt(e.key, 10);
    if (idx >= 1 && idx <= MODE_KEYS.length) { startGame(MODE_KEYS[idx-1]); return; }
    if (e.key==='Enter') { startGame(MODE_KEYS[0]); return; }
    return;
  }
  if (gState==='gameover') {
    if (e.key==='Enter')           { gState='select'; return; }
    if (e.key.toLowerCase()==='r') { startGame(gameMode); return; }
    return;
  }

  // Playing
  if (findMod && e.key.toLowerCase()==='f') { activateFind(); return; }
  if (e.key==='Backspace') { inputBuf = inputBuf.slice(0,-1); return; }

  // Letter input (a-z only, no ctrl/meta/alt combos)
  if (e.key.length===1 && /[a-zA-Z]/.test(e.key) && !e.ctrlKey && !e.metaKey && !e.altKey) {
    typeChar(e.key.toLowerCase());
  }
}

function typeChar(ch) {
  const act = activeTarget();
  if (!act) return;

  const rom = act.cell.romaji;
  const nb  = inputBuf + ch;

  if (nb === rom) {
    // ✓ Exact match → destroy
    inputBuf = '';
    doHit(player.tgt, act.f, act.c);
  } else if (rom.startsWith(nb)) {
    // Valid prefix → keep buffering
    inputBuf = nb;
    sndType();
  } else {
    // Wrong — check if typed char alone starts the target
    inputBuf = rom.startsWith(ch) ? ch : '';
    doMiss();
  }
}

// ═══════════════════════════════════════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════════════════════════════════════
function doMiss() {
  combo = 0;
  totalMisses++;
  flash.alpha = 0.32;
  flash.col = P.hit_bd;
  const b = buildings[player.tgt];
  if (b) b.shakeX = 5;
  sndMiss();
}

function doHit(bIdx, f, c) {
  const b    = buildings[bIdx];
  const cell = b.cells[f][c];

  cell.hitAnim = 10;
  cell.destroyed = true;
  cell.dieAnim   = 20;
  totalHits++;

  // Kaomoji destroy-punch toward the cell it just smashed
  const cx = b.x + c*CW + CW/2;
  const cy = GY - (f+1)*CH + CH/2;
  player.punch    = PUNCH_DUR;
  player.punchDir = cx >= player.x ? 1 : -1;
  player.facing   = player.punchDir;

  spawnParticles(cx, cy);
  sndHit();

  // Find mode: if this char matches, burst ALL highlighted instances
  if (findMode.on && cell.char === findMode.char) {
    doFindBurst(bIdx);
  }

  // Scoring
  const mult = Math.max(1, Math.floor(combo/3) + 1);
  const pts  = 10 * mult;
  score += pts;
  combo++;
  if (combo > maxCombo) maxCombo = combo;
  addFloat('+' + pts, cx, cy);
  if (combo > 0 && combo % 5 === 0) sndCombo(combo);

  collapseDestroyedFloors(b);
  checkCollapsed(bIdx);
}

function doFindBurst(triggerBIdx) {
  // Collect targets (don't destroy yet — lasers handle the kill on impact)
  const targets = [];
  buildings.forEach((b, bi) => {
    if (b.collapsed) return;
    b.cells.forEach((row, f) => {
      row.forEach((cell, c) => {
        if (!cell.destroyed && cell.hi && cell.char === findMode.char) {
          targets.push({ bIdx: bi, f, c });
        }
      });
    });
  });

  const n = targets.length;
  if (n > 0) {
    // Spawn a laser per target from the kaomoji's "eyes"
    const px = player.x;
    const py = GY - 30;
    const beams = targets.map(t => {
      const b = buildings[t.bIdx];
      const tx = b.x + t.c*CW + CW/2;
      const ty = GY - (t.f+1)*CH + CH/2;
      const dist = Math.hypot(tx - px, ty - py);
      const hitAt = 4 + Math.min(14, Math.floor(dist/40)); // farther = longer flight
      return {
        x1: px, y1: py, x2: tx, y2: ty,
        bIdx: t.bIdx, f: t.f, c: t.c,
        life: 0, hitAt, maxLife: hitAt + 10,
        hit: false, isLast: false,
      };
    });
    // Flag the laser that will impact last so it triggers the floor collapse
    let latest = beams[0];
    beams.forEach(L => { if (L.hitAt > latest.hitAt) latest = L; });
    latest.isLast = true;
    beams.forEach(L => lasers.push(L));

    const bonus = n * 30 * Math.max(1, combo);
    score += bonus;
    combo += n;
    flash.alpha = 0.4; flash.col = P.find_fl;
    addFloat(`FIND ×${n}!  +${bonus}`, W/2, 200, P.find_fl, 22);
    sndFindBurst(n);
  }

  findMode.on = false; findMode.char = null; findMode.count = 0;
  findMode.cooldown = FIND_COOLDOWN_FRAMES;
  clearHighlights();
}

// Step active laser beams: tick life, destroy target cell on impact frame,
// drop expired lasers, and once the last laser lands, collapse all the floors
// whose cells just died.
function updateLasers() {
  if (!lasers.length) return;
  let lastHitThisTick = false;
  for (let i = lasers.length - 1; i >= 0; i--) {
    const L = lasers[i];
    L.life++;
    if (!L.hit && L.life >= L.hitAt) {
      L.hit = true;
      const b = buildings[L.bIdx];
      const cell = b && !b.collapsed && b.cells[L.f] ? b.cells[L.f][L.c] : null;
      if (cell && !cell.destroyed) {
        cell.destroyed = true;
        cell.dieAnim   = 20;
        spawnParticles(L.x2, L.y2);
        totalHits++;
        checkCollapsed(L.bIdx);
      }
      if (L.isLast) lastHitThisTick = true;
    }
    if (L.life >= L.maxLife) lasers.splice(i, 1);
  }
  if (lastHitThisTick) {
    buildings.forEach(b => { if (!b.collapsed) collapseDestroyedFloors(b); });
  }
}

// Splice out any fully-destroyed floors; floors above fall down with gravity.
// Iterates bottom→top, so a stack of dead floors collapses in one pass.
function collapseDestroyedFloors(b) {
  let collapsed = 0;
  for (let f = 0; f < b.cells.length; ) {
    if (b.cells[f].length > 0 && b.cells[f].every(c => c.destroyed)) {
      b.cells.splice(f, 1);
      b.floors--;
      // Cells now at index f and above must fall through CH pixels
      for (let ff = f; ff < b.cells.length; ff++) {
        b.cells[ff].forEach(cell => {
          if (!cell.destroyed) {
            cell.fallY  = (cell.fallY  || 0) + CH;
            cell.fallVy = cell.fallVy || 0;
          }
        });
      }
      collapsed++;
      // Don't increment f — re-check this index for stacked collapses
    } else {
      f++;
    }
  }
  if (collapsed > 0) {
    b.shakeX = Math.max(b.shakeX, 6);
    flash.alpha = Math.max(flash.alpha, 0.15);
    addFloat(collapsed > 1 ? `FLOOR x${collapsed}!` : 'FLOOR!',
             b.x + b.width/2, GY - b.floors*CH - 14, '#ff9933', 14);
    sndFloorCollapse();
  }
}

function checkCollapsed(bIdx) {
  const b = buildings[bIdx];
  if (b.cells.every(row => row.every(cell => cell.destroyed))) {
    b.collapsed = true;
    score += 200;
    addFloat('BUILDING DESTROYED! +200', b.x + b.width/2, GY - b.floors*CH/2, '#ff7700', 16);
    sndCollapse();
    player.tgt = nearestBuilding();
    if (buildings.every(b => b.collapsed)) {
      setTimeout(() => endGame(true), 1400);
    }
  }
}

// ── Find Mode (Cmd/Ctrl+F or tap the button) ────────────────────────
// Highlights every alive instance of the character the player is CURRENTLY targeting.
// Typing that romaji once detonates them all.
function activateFind() {
  if (findMode.on || findMode.cooldown > 0) return;

  const act = activeTarget();
  if (!act) return;
  const target = act.cell.char;

  // Count all alive instances of the current target char
  let count = 0;
  buildings.forEach(b => {
    if (b.collapsed) return;
    b.cells.forEach(row => row.forEach(cell => {
      if (!cell.destroyed && cell.char === target) count++;
    }));
  });

  if (count < 2) return;  // current cell is the only one — pointless

  findMode.on = true; findMode.char = target; findMode.count = count;

  buildings.forEach(b => b.cells.forEach(row => row.forEach(cell => {
    cell.hi = (!cell.destroyed && cell.char === target);
  })));

  flash.alpha = 0.22; flash.col = P.find_fl;
  addFloat(`◆ FIND: ${target} (${KR[target]})  ×${count} ◆`, W/2, 160, P.find_fl, 17);
  sndFindOn();
}

function clearHighlights() {
  buildings.forEach(b => b.cells.forEach(row => row.forEach(cell => cell.hi = false)));
}

// ── End Game ──────────────────────────────────────────────────────────
function endGame(win=false) {
  if (gState === 'gameover') return;
  hiScore = Math.max(hiScore, score);
  gState = 'gameover';
  sndGameOver(win);
}

// ═══════════════════════════════════════════════════════════════════
//  PARTICLES & FLOATING TEXT
// ═══════════════════════════════════════════════════════════════════
function spawnParticles(x, y) {
  const col = '#44ff66';
  for (let i=0; i<12; i++) {
    const a = Math.PI*2*(i/12) + rnd(-0.3,0.3);
    const spd = rnd(1.5,4.5);
    particles.push({
      x, y,
      vx: Math.cos(a)*spd, vy: Math.sin(a)*spd - 1.8,
      life: rnd(22,50), maxLife:50,
      ch: pick(PCHARS), col
    });
  }
}

function addFloat(txt, x, y, col=P.score_fl, sz=15) {
  floats.push({ txt, x, y, vy:-1.5, life:75, maxLife:75, col, sz });
}

// ═══════════════════════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════════════════════
function update() {
  if (gState !== 'playing') return;
  if (showHelp) return;  // freeze gameplay while the help overlay is open
  frame++;

  // Flash decay
  if (flash.alpha > 0) flash.alpha = Math.max(0, flash.alpha - 0.022);

  // Find mode cooldown
  if (findMode.cooldown > 0) findMode.cooldown--;
  if (!findMode.on) clearHighlights();

  // Auto-target nearest alive building
  player.tgt = nearestBuilding();

  // Auto-walk to a spot just LEFT of the active cell (so the kaomoji doesn't
  // block the letter it's about to smash). Updates to the next cell after a destroy.
  const tgtB = (player.tgt>=0 && player.tgt<buildings.length) ? buildings[player.tgt] : null;
  const act  = tgtB ? firstCell(tgtB) : null;

  // Reset hint timer whenever the active target cell changes
  if (act) {
    const key = `${player.tgt}:${act.f}:${act.c}`;
    if (key !== activeKey) { activeKey = key; activeStartTime = Date.now(); }
  } else {
    activeKey = '';
  }
  let standX = null;
  if (tgtB && !tgtB.collapsed) {
    if (act) standX = tgtB.x + act.c*CW - 40;     // 40px left of cell's left edge
    else     standX = tgtB.x + tgtB.width/2;       // fallback
  }
  if (standX !== null) {
    const dx   = standX - player.x;
    const dist = Math.abs(dx);
    if (dist > 3) player.vx = Math.sign(dx) * Math.min(2.8, dist*0.18);
    else          player.vx *= 0.5;
  } else {
    player.vx *= 0.72;
  }

  // Freeze movement during the destroy-punch so the lunge reads cleanly
  if (player.punch > 0) { player.vx = 0; player.punch--; }

  player.x = Math.max(20, Math.min(W-20, player.x + player.vx));
  if (player.vx >  0.25) player.facing =  1;
  if (player.vx < -0.25) player.facing = -1;
  // When settled, face the cell we're attacking (always to the right of player)
  if (act && Math.abs(player.vx) < 0.25) {
    const cellCenterX = tgtB.x + act.c*CW + CW/2;
    player.facing = cellCenterX >= player.x ? 1 : -1;
  }

  // Walk animation
  player.wTimer++;
  if (player.wTimer > 7) { player.wFrame = (player.wFrame+1)%4; player.wTimer=0; }

  // Building shake decay
  buildings.forEach(b => { if (b.shakeX>0) b.shakeX = Math.max(0, b.shakeX-0.38); });

  // Falling cells (gravity for collapsed floors)
  buildings.forEach(b => {
    b.cells.forEach(row => row.forEach(cell => {
      if (cell.fallY && cell.fallY > 0) {
        cell.fallVy = (cell.fallVy || 0) + 1.6;   // gravity
        cell.fallY -= cell.fallVy;
        if (cell.fallY <= 0) {
          cell.fallY = 0;
          cell.fallVy = 0;
        }
      }
    }));
  });

  // Particles
  particles = particles.filter(p => {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.14; p.life--;
    return p.life > 0;
  });

  // Laser beams (find-mode burst)
  updateLasers();

  // Float texts
  floats = floats.filter(ft => { ft.y+=ft.vy; ft.life--; return ft.life>0; });
}

// Cloud drift runs every frame (menu, gameover, playing) so the sky always moves.
function updateAmbient() {
  clouds.forEach(cl => {
    cl.x += cl.vx;
    const cw = ((cl.shape[0] || '').length) * (cl.sz * 0.6);
    if (cl.x > W + 20) cl.x = -cw - 30 - Math.random()*60;
  });
}

// ═══════════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════════
function render() {
  ctx.clearRect(0,0,W,H);

  if (gState==='menu')     { renderMenu();     if (showHelp) drawHelpOverlay(); return; }
  if (gState==='select')   { renderSelect();   if (showHelp) drawHelpOverlay(); return; }
  if (gState==='gameover') { renderGameOver(); if (showHelp) drawHelpOverlay(); return; }

  drawBG();
  drawBuildings();
  drawGround();
  drawTrees();
  drawParticles();
  drawLasers();
  drawFloats();
  drawPlayer();
  drawInputPanel();
  drawHUD();

  // Screen flash overlay
  if (flash.alpha > 0) {
    ctx.globalAlpha = flash.alpha;
    ctx.fillStyle   = flash.col;
    ctx.fillRect(0,0,W,H);
    ctx.globalAlpha = 1;
  }

  drawScanlines();
  if (showHelp) drawHelpOverlay();
}

// ── Background (ASCII stars, mountains, drifting clouds) ────────────
function drawBG() {
  const g = ctx.createLinearGradient(0,0,0,GY);
  g.addColorStop(0, P.sky0);
  g.addColorStop(1, P.sky1);
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,GY);

  drawStars();
  drawMountains();
  drawClouds();
}

function drawStars() {
  const t = Date.now()/1000;
  ctx.textAlign = 'left';
  STARS.forEach(s => {
    const a = 0.35 + 0.4*Math.sin(t*0.9 + s.tw);
    ctx.globalAlpha = Math.max(0.1, a);
    ctx.font = `${s.sz}px "Courier New"`;
    ctx.fillStyle = '#a8b8e8';
    ctx.fillText(s.ch, s.x, s.y);
  });
  ctx.globalAlpha = 1;
}

function drawMountains() {
  if (!mountains.length) return;
  ctx.textAlign = 'left';
  const lh = 10;
  mountains.forEach(p => {
    const rows = Math.max(2, Math.floor(p.h / lh));
    const halfW = p.w / 2;
    const cx = p.x + halfW;
    for (let r=0; r<rows; r++) {
      const y = GY - 2 - r*lh;
      const slope = (rows - r) * (halfW / rows);
      const isTop = r >= rows - 2;
      ctx.font = `${lh+1}px "Courier New"`;
      ctx.fillStyle = isTop ? '#4a6a52' : '#1a3a24';
      ctx.fillText('/', cx - slope, y);
      ctx.fillText('\\', cx + slope - 7, y);
      // sparse interior shading
      if (r > 0 && r % 2 === 0) {
        ctx.fillStyle = '#0e2418';
        let fx = cx - slope + 8;
        while (fx < cx + slope - 10) {
          ctx.fillText('.', fx, y);
          fx += 10;
        }
      }
    }
  });
}

function drawClouds() {
  if (!clouds.length) return;
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(150,168,200,0.55)';
  clouds.forEach(cl => {
    ctx.font = `${cl.sz}px "Courier New"`;
    const lh = cl.sz - 1;
    cl.shape.forEach((line, i) => {
      ctx.fillText(line, cl.x, cl.y + i*lh);
    });
  });
}

function drawTrees() {
  if (!trees.length) return;
  ctx.textAlign = 'left';
  trees.forEach(t => {
    ctx.font = `${t.sz}px "Courier New"`;
    ctx.fillStyle = t.c;
    const lh = t.sz - 1;
    const bottomY = GY - 2;
    for (let i=0; i<t.shape.length; i++) {
      const y = bottomY - (t.shape.length - 1 - i) * lh;
      ctx.fillText(t.shape[i], t.x, y);
    }
  });
}

// ── Ground ────────────────────────────────────────────────────────────
function drawGround() {
  ctx.fillStyle = P.ground;
  ctx.fillRect(0, GY, W, PNL_Y - GY);

  ctx.font = '11px "Courier New"';
  const TEX = ['▓','▒','░','▒'];
  for (let x=0; x<W; x+=12) {
    ctx.fillStyle = P.gndtex;
    ctx.fillText(TEX[Math.floor(x/12)%4], x, GY+12);
  }
}

// ── Buildings ────────────────────────────────────────────────────────
function drawBuildings() {
  buildings.forEach((b, bi) => {
    if (b.collapsed) return;

    const sx  = b.shakeX * Math.sin(Date.now()/38);
    const isTgt = bi === player.tgt;
    const act = isTgt ? firstCell(b) : null;

    // Top row's fallY (used to keep the cap/label glued to the falling stack)
    const topRow = b.cells[b.floors-1];
    const topFallY = (topRow && topRow[0]) ? (topRow[0].fallY || 0) : 0;
    const topY = GY - b.floors*CH - topFallY;

    // Building base
    ctx.fillStyle = '#0a140a';
    ctx.fillRect(b.x+sx, topY, b.width, 4);

    // Cells
    for (let f=0; f<b.floors; f++) {
      for (let c=0; c<b.cols; c++) {
        drawCell(
          b.x + sx + c*CW,
          GY - (f+1)*CH,
          b.cells[f][c],
          isTgt && act && act.f===f && act.c===c
        );
      }
    }

    // ASCII roof decoration (random per building)
    const cxLabel = b.x + sx + b.width/2;
    if (b.roof && b.roof.length) {
      const rfLH = 9;
      ctx.font      = '10px "Courier New"';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#3a8a3a';
      for (let i=0; i<b.roof.length; i++) {
        const y = topY - 4 - (b.roof.length - 1 - i) * rfLH;
        ctx.fillText(b.roof[i], cxLabel, y);
      }
    }
    ctx.textAlign = 'left';
  });
}

function drawCell(x, y, cell, isActive) {
  // Apply falling offset (cell mid-air after a floor collapse below it)
  if (cell.fallY && cell.fallY > 0) y -= cell.fallY;

  // Dying animation
  if (cell.destroyed) {
    if (cell.dieAnim > 0) {
      cell.dieAnim--;
      ctx.globalAlpha = cell.dieAnim/20;
      ctx.font = '13px "Courier New"';
      ctx.fillStyle   = '#ff7700';
      ctx.textAlign   = 'center';
      ctx.fillText('░▒▓', x+CW/2, y+CH/2+4);
      ctx.globalAlpha = 1;
      ctx.textAlign   = 'left';
    }
    return;
  }

  if (cell.hitAnim > 0) cell.hitAnim--;

  // Determine color theme
  let bg, bd, kt;
  if (cell.hi) {
    bg=P.find_bg;  bd=P.find_bd;  kt=P.find_k;
  } else if (isActive) {
    bg=P.act_bg;   bd=P.act_bd;   kt=P.act_k;
  } else if (cell.hitAnim > 0) {
    bg=P.hit_bg;   bd=P.hit_bd;   kt='#ff6666';
  } else {
    bg = P.fill_w;
    bd = P.bdr_w;
    kt = P.katakana;
  }

  // Background
  ctx.fillStyle = bg;
  ctx.fillRect(x, y, CW, CH);

  // Border
  ctx.strokeStyle = bd;
  ctx.lineWidth   = (isActive || cell.hi) ? 1.5 : 1;
  ctx.strokeRect(x+0.5, y+0.5, CW-1, CH-1);

  // Katakana character
  ctx.font      = 'bold 20px "Courier New"';
  ctx.fillStyle = kt;
  ctx.textAlign = 'center';
  if (isActive || cell.hi) { ctx.shadowBlur=9; ctx.shadowColor=kt; }
  ctx.fillText(cell.char, x+CW/2, y+CH/2+6);
  ctx.shadowBlur = 0;

  // Romaji hint (small, bottom of cell) — hidden for ~1s on the active target
  ctx.font      = '9px "Courier New"';
  if (isActive && !hintRevealed()) {
    ctx.fillStyle = '#4a6a4a';
    ctx.fillText('???', x+CW/2, y+CH-4);
  } else {
    ctx.fillStyle = isActive ? '#d8e8d8' : cell.hi ? '#ffcc66' : P.romaji;
    ctx.fillText(cell.romaji, x+CW/2, y+CH-4);
  }

  // Blinking ▼ cursor above active target
  if (isActive && (frame%24)<12) {
    ctx.fillStyle = '#ffff00';
    ctx.font      = '9px "Courier New"';
    ctx.fillText('▼', x+CW/2, y-1);
  }

  ctx.textAlign = 'left';
}

// ── Particles ─────────────────────────────────────────────────────────
function drawParticles() {
  ctx.font = '11px "Courier New"';
  particles.forEach(p => {
    ctx.globalAlpha = p.life/p.maxLife;
    ctx.fillStyle   = p.col;
    ctx.fillText(p.ch, p.x, p.y);
  });
  ctx.globalAlpha = 1;
}

// ── Laser beams (find-mode burst) ─────────────────────────────────────
// Beam grows from kaomoji to target until `hitAt`, then the trailing end
// retracts toward the target as it fades. A bright ✦ pops at the impact site.
function drawLasers() {
  lasers.forEach(L => {
    const headT = Math.min(1, L.life / L.hitAt);
    const tailT = L.hit ? Math.min(1, (L.life - L.hitAt) / (L.maxLife - L.hitAt)) : 0;
    const dx = L.x2 - L.x1, dy = L.y2 - L.y1;
    const sx = L.x1 + dx * tailT;
    const sy = L.y1 + dy * tailT;
    const ex = L.x1 + dx * headT;
    const ey = L.y1 + dy * headT;
    const fade = 1 - tailT;

    // Outer glow
    ctx.globalAlpha = fade * 0.55;
    ctx.strokeStyle = P.find_fl;
    ctx.lineWidth   = 7;
    ctx.lineCap     = 'round';
    ctx.shadowBlur  = 20; ctx.shadowColor = P.find_fl;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();

    // Inner hot core
    ctx.globalAlpha = fade;
    ctx.strokeStyle = '#ffffd0';
    ctx.lineWidth   = 2;
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();

    ctx.shadowBlur = 0;
    ctx.lineCap    = 'butt';

    // Impact flash
    if (L.hit) {
      const k = (L.life - L.hitAt) / Math.max(1, L.maxLife - L.hitAt);
      const fa = Math.max(0, 1 - k);
      ctx.globalAlpha = fa;
      ctx.fillStyle   = '#ffffaa';
      ctx.font        = `bold ${16 + k*14}px "Courier New"`;
      ctx.textAlign   = 'center';
      ctx.shadowBlur  = 18; ctx.shadowColor = P.find_fl;
      ctx.fillText('✦', L.x2, L.y2 + 5);
      ctx.shadowBlur  = 0;
      ctx.textAlign   = 'left';
    }
    ctx.globalAlpha = 1;
  });
}

// ── Floating score text ───────────────────────────────────────────────
function drawFloats() {
  ctx.textAlign = 'center';
  floats.forEach(ft => {
    ctx.globalAlpha = Math.min(1, ft.life/ft.maxLife * 2);
    ctx.font        = `bold ${ft.sz}px "Courier New"`;
    ctx.fillStyle   = ft.col;
    ctx.shadowBlur  = 6; ctx.shadowColor = ft.col;
    ctx.fillText(ft.txt, ft.x, ft.y);
    ctx.shadowBlur  = 0;
  });
  ctx.globalAlpha = 1;
  ctx.textAlign   = 'left';
}

// ── Player (Kaomoji Monster) ──────────────────────────────────────────
function drawPlayer() {
  const px = player.x;
  const t  = Date.now();
  const moving   = Math.abs(player.vx) > 0.25;
  const punching = player.punch > 0;

  // Destroy-punch lunge — sine curve, 0 → peak → 0 over PUNCH_DUR frames
  let lungeX = 0, lungeT = 0;
  if (punching) {
    lungeT = Math.sin(((PUNCH_DUR - player.punch) / PUNCH_DUR) * Math.PI);
    lungeX = lungeT * 16 * player.punchDir;
  }
  const drawX = px + lungeX;

  ctx.textAlign  = 'center';
  ctx.shadowBlur = 13; ctx.shadowColor = P.pglow;
  ctx.fillStyle  = P.player;

  // Tiny vertical bob while walking — sells the gait (paused during a punch)
  const bob = (moving && !punching) ? Math.abs(Math.sin(t/90)) * 1.5 : 0;

  ctx.font = 'bold 18px "Courier New"';
  ctx.fillText(player.head, drawX, GY-36 - bob);
  ctx.fillText(player.body, drawX, GY-15 - bob);

  ctx.shadowBlur = 0;

  // Legs — animated set cycles via wFrame while moving; stands still otherwise
  ctx.font      = 'bold 14px "Courier New"';
  ctx.fillStyle = P.player;
  const legStr  = (moving && !punching) ? player.legs.walk[player.wFrame] : player.legs.stand;
  ctx.fillText(legStr, drawX, GY+2);

  // Punch fist + BAM! — extends out from the kaomoji toward the smashed cell
  if (punching) {
    const fistDist = 22 + lungeT * 28;
    const fistX    = drawX + fistDist * player.punchDir;
    const fistY    = GY - 22;

    ctx.font       = 'bold 18px "Courier New"';
    ctx.fillStyle  = '#ffee44';
    ctx.shadowBlur = 14; ctx.shadowColor = '#ff7700';
    ctx.textAlign  = 'center';
    ctx.fillText(player.punchDir > 0 ? '══►' : '◄══', fistX, fistY);

    if (lungeT > 0.55) {
      ctx.font      = 'bold 14px "Courier New"';
      ctx.fillStyle = '#ffff88';
      ctx.fillText('BAM!', drawX + 48 * player.punchDir, GY - 54);
    }
    ctx.shadowBlur = 0;
  }

  // Combo aura (combo ≥ 5)
  if (combo >= 5) {
    const pulse = 0.5 + 0.5*Math.sin(t/120);
    ctx.globalAlpha = pulse * 0.85;
    ctx.font        = `${11+pulse*5}px "Courier New"`;
    ctx.fillStyle   = '#ff7700';
    ctx.fillText('!!! !!!', drawX, GY-52);
    ctx.globalAlpha = 1;
  }

  ctx.textAlign = 'left';
}

// ── Input Panel (bottom bar) ──────────────────────────────────────────
function drawInputPanel() {
  const PY = PNL_Y;
  const PH = H - PY;

  ctx.fillStyle = P.panel_bg;
  ctx.fillRect(0, PY, W, PH);

  // Top border
  ctx.strokeStyle = P.panel_bd;
  ctx.lineWidth   = 1;
  ctx.beginPath(); ctx.moveTo(0,PY); ctx.lineTo(W,PY); ctx.stroke();

  const act = activeTarget();
  const LP  = 270;  // left panel width

  // Divider
  ctx.strokeStyle = P.panel_bd;
  ctx.beginPath(); ctx.moveTo(LP, PY+10); ctx.lineTo(LP, H-10); ctx.stroke();

  // ─ Left: target katakana ─
  ctx.textAlign  = 'center';
  ctx.font       = 'bold 10px "Courier New"';
  ctx.fillStyle  = '#9adb9a';
  ctx.fillText('TARGET', LP/2, PY+15);

  if (act) {
    ctx.font      = 'bold 44px "Courier New"';
    ctx.shadowBlur = 16; ctx.shadowColor = '#ffff44';
    ctx.fillStyle  = '#ffff55';
    ctx.fillText(act.cell.char, LP/2, PY+62);
    ctx.shadowBlur = 0;

    ctx.font      = '12px "Courier New"';
    const _rev = hintRevealed();
    ctx.fillStyle  = _rev ? '#b8e0b8' : '#4a6a4a';
    ctx.fillText(_rev ? act.cell.romaji : '???', LP/2, PY+80);
  } else {
    ctx.font      = '11px "Courier New"';
    ctx.fillStyle  = P.hud_dim;
    ctx.fillText('— MOVE TO —', LP/2, PY+44);
    ctx.fillText('A BUILDING', LP/2, PY+60);
  }

  // ─ Right: romaji letter boxes ─
  if (act) {
    const rom  = act.cell.romaji;
    const typed = inputBuf;
    const BW=40, BH=42, BSP=8;
    const totalW = rom.length*(BW+BSP)-BSP;
    const RPx    = LP;
    const RPw    = W - LP;
    const bx0    = RPx + (RPw - totalW)/2;
    const by0    = PY + 12;

    const reveal = hintRevealed();
    for (let i=0; i<rom.length; i++) {
      const bx   = bx0 + i*(BW+BSP);
      const done = i < typed.length;
      const curr = i === typed.length;
      const showLetter = done || reveal;

      ctx.fillStyle   = done ? '#0a280a' : curr ? '#191900' : '#0a160a';
      ctx.fillRect(bx, by0, BW, BH);
      ctx.strokeStyle = done ? '#2eff5a' : curr ? '#ffff00' : '#5fa05f';
      ctx.lineWidth   = (done||curr) ? 1.5 : 1;
      ctx.strokeRect(bx+0.5, by0+0.5, BW-1, BH-1);

      if (curr) { ctx.shadowBlur=9; ctx.shadowColor='#ffff00'; }
      ctx.font      = `bold ${done?20:curr?18:15}px "Courier New"`;
      ctx.fillStyle  = done ? '#2eff5a' : (showLetter ? (curr ? '#ffff66' : '#9adb9a') : '#3a5a3a');
      ctx.fillText(showLetter ? rom[i].toUpperCase() : '?', bx+BW/2, by0+BH/2+7);
      ctx.shadowBlur = 0;
    }

    drawFindButton(act);
  } else {
    drawFindButton(null);
  }

  ctx.textAlign = 'left';
}

// Clickable Find button (Cmd+F / Ctrl+F / tap)
function drawFindButton(act) {
  const { x, y, w, h } = FIND_BTN;
  let bg, bd, fg, label;

  if (findMode.on) {
    bg = '#2a1a00'; bd = P.find_fl; fg = P.find_fl;
    label = `◆ FIND ACTIVE: ${findMode.char} (${KR[findMode.char]}) ×${findMode.count} — type to detonate ◆`;
  } else if (findMode.cooldown > 0) {
    bg = '#0a0f0a'; bd = '#3a5a3a'; fg = '#7a9a7a';
    label = `[${FIND_KEY_LABEL}]  cooldown: ${Math.ceil(findMode.cooldown/60)}s`;
  } else if (act) {
    // Count current-char instances for the live hint
    let cnt = 0;
    buildings.forEach(b => { if (!b.collapsed) b.cells.forEach(row => row.forEach(c => {
      if (!c.destroyed && c.char === act.cell.char) cnt++;
    })); });
    const ready = cnt >= 2;
    bg = ready ? '#0a1a0a' : '#0a0f0a';
    bd = ready ? '#2eff5a' : '#3a5a3a';
    fg = ready ? '#9adb9a' : '#6a8a6a';
    label = ready
      ? `[${FIND_KEY_LABEL}]  detonate every ${act.cell.char} (${act.cell.romaji})  ×${cnt}`
      : `[${FIND_KEY_LABEL}]  no duplicate of current char on screen`;
  } else {
    bg = '#0a0f0a'; bd = '#3a5a3a'; fg = '#6a8a6a';
    label = `[${FIND_KEY_LABEL}]  find duplicates of current target`;
  }

  ctx.fillStyle = bg;
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = bd;
  ctx.lineWidth   = findMode.on ? 1.5 : 1;
  ctx.strokeRect(x+0.5, y+0.5, w-1, h-1);

  if (findMode.on) { ctx.shadowBlur = 5; ctx.shadowColor = P.find_fl; }
  ctx.font      = 'bold 11px "Courier New"';
  ctx.fillStyle = fg;
  ctx.textAlign = 'center';
  ctx.fillText(label, x + w/2, y + h/2 + 4);
  ctx.shadowBlur = 0;
}

// ── HUD ───────────────────────────────────────────────────────────────
function drawHUD() {
  ctx.fillStyle   = 'rgba(0,5,0,0.82)';

  ctx.strokeRect(0, 0, W, HUD_H);

  // Score (left)
  ctx.fillStyle = P.hud;
  ctx.textAlign = 'left';
  ctx.fillText(`スコア  ${score}`, 12, 23);

  // Combo (center)
  if (combo > 0) {
    const cc = combo>=10 ? P.combo_hi : P.combo_lo;
    ctx.textAlign  = 'center';
    ctx.fillStyle  = cc;
    if (combo>=5) { ctx.shadowBlur=8; ctx.shadowColor=cc; }
    ctx.fillText(`COMBO  ×${combo}`, W/2, 23);
    ctx.shadowBlur = 0;

  // Misses (right) — shifted left to leave room for the [?] help button
  ctx.textAlign = 'right';
  ctx.fillStyle = combo===0 && totalMisses>0 ? '#ff8888' : '#9adb9a';
  ctx.fillText(`misses: ${totalMisses}`, W-44, 23);

  ctx.textAlign = 'left';
  drawHelpButton();
}

  const acc = (totalHits+totalMisses>0)
    ? Math.round(totalHits/(totalHits+totalMisses)*100) : 0;

  const stats = [
    ['SCORE',       `${score}`],
    ['HIGH SCORE',  `${hiScore}`],
    ['MAX COMBO',   `×${maxCombo}`],
    ['BLOCKS HIT',  `${totalHits}`],
    ['MISSES',      `${totalMisses}`],

  stats.forEach(([label, val], i) => {

    ctx.fillStyle  = '#9adb9a';
    ctx.textAlign  = 'right';
    ctx.fillText(label, W/2-24, sy);
    ctx.font      = 'bold 16px "Courier New"';
    ctx.fillStyle  = '#2eff5a';
    ctx.textAlign  = 'left';
    ctx.fillText(val, W/2+24, sy);
  });

  if ((Math.floor(Date.now()/500)%2)===0) {
    ctx.font      = 'bold 15px "Courier New"';
    ctx.fillStyle  = '#2eff5a';
    ctx.textAlign  = 'center';
    ctx.shadowBlur = 6; ctx.shadowColor = '#2eff5a';
    ctx.fillText('[ R: retry  ·  ENTER: change difficulty ]', W/2, 445);
    ctx.shadowBlur = 0;
  }

  drawHelpButton();
  drawScanlines();
  ctx.textAlign = 'left';
}

// ═══════════════════════════════════════════════════════════════════
//  GAME LOOP
// ═══════════════════════════════════════════════════════════════════
function loop() {
  update();
  updateAmbient();
  render();
  updateFindBtn();
  requestAnimationFrame(loop);
}

// ── Event Listeners ───────────────────────────────────────────────────
const ki = document.getElementById('ki');
const findBtn = document.getElementById('findbtn');
if (IS_MOBILE) {
  findBtn.hidden = false;
  // pointerdown (not click) so we don't dismiss the keyboard before activating
  findBtn.addEventListener('pointerdown', ev => {
    if (findBtn.disabled) return;
    ev.preventDefault();
    audio();
    if (gState === 'playing') activateFind();
    focusMobileInput();
  });
}
function updateFindBtn() {
  if (!IS_MOBILE) return;
  findBtn.classList.toggle('active', findMode.on);
  findBtn.disabled = findMode.cooldown > 0 || gState !== 'playing' || showHelp;
  if (findMode.on)               findBtn.textContent = `◆ ${findMode.char} ×${findMode.count}`;
  else if (findMode.cooldown>0)  findBtn.textContent = `FIND ${Math.ceil(findMode.cooldown/60)}s`;
  else                           findBtn.textContent = '[ FIND ]';
}
let lastBackspaceAt = 0;
function deleteOneFromBuf() {
  // Deduplicate Backspace fired from both keydown and beforeinput on mobile
  const now = Date.now();
  if (now - lastBackspaceAt < 80) return;
  lastBackspaceAt = now;
  inputBuf = inputBuf.slice(0, -1);
}

window.addEventListener('keydown', e => {
  // On mobile the hidden input may be focused; letter input is delivered via
  // the input element's 'input' event. Skip the duplicate path here, but still
  // allow modifier shortcuts (find/mute), Enter, Backspace, etc. through.
  if (e.target === ki &&
      e.key.length === 1 && /[a-z]/i.test(e.key) &&
      !e.ctrlKey && !e.metaKey && !e.altKey) {
    return;
  }
  keys[e.key] = true;
  handleKey(e);
});
window.addEventListener('keyup', e => {
  keys[e.key] = false;
});

// Hidden input — translates the mobile/IME keyboard into typeChar calls
ki.addEventListener('input', () => {
  const v = ki.value;
  ki.value = '';
  if (!v) return;
  for (const ch of v.toLowerCase()) {
    if (/[a-z]/.test(ch)) typeChar(ch);
  }
});
ki.addEventListener('beforeinput', e => {
  if (e.inputType === 'deleteContentBackward') {
    deleteOneFromBuf();
    e.preventDefault();
  }
});

// Patch handleKey's Backspace path through dedupe (overrides inline slice above
// only when the hidden input is involved — desktop path still works unchanged).
const _origHandleKey = handleKey;
handleKey = function(e) {
  if (e.key === 'Backspace' && e.target === ki) { deleteOneFromBuf(); return; }
  return _origHandleKey(e);
};

// Canvas pointer (click/tap) — Find button + start/retry + focus mobile keyboard
function canvasPointerXY(ev) {
  const rect = c.getBoundingClientRect();
  return {
    x: (ev.clientX - rect.left) * (W / rect.width),
    y: (ev.clientY - rect.top)  * (H / rect.height),
  };
}
function focusMobileInput() {
  if (!IS_MOBILE) return;
  // iOS/Android require the focus() to be inside the user-gesture callstack
  try { ki.focus({ preventScroll: true }); } catch { ki.focus(); }
}
c.addEventListener('pointerdown', ev => {
  ev.preventDefault();
  const { x, y } = canvasPointerXY(ev);
  audio();  // wake AudioContext from gesture

  // Help button (top-right) — works in any state
  const hb = HELP_BTN;
  if (x >= hb.x && x <= hb.x+hb.w && y >= hb.y && y <= hb.y+hb.h) {
    showHelp = !showHelp;
    if (!showHelp) activeStartTime = Date.now();
    return;
  }
  // If the help overlay is open, any tap elsewhere closes it
  if (showHelp) {
    showHelp = false;
    activeStartTime = Date.now();
    return;
  }

  if (gState === 'menu') {
    gState = 'select';
    return;
  }
  if (gState === 'select') {
    for (const card of SELECT_CARDS) {
      if (x >= card.x && x <= card.x+card.w && y >= card.y && y <= card.y+card.h) {
        startGame(card.key);
        focusMobileInput();
        return;
      }
    }
    return;
  }
  if (gState === 'gameover') {
    gState = 'select';
    return;
  }
  if (gState === 'playing') {
    const b = FIND_BTN;
    if (x >= b.x && x <= b.x+b.w && y >= b.y && y <= b.y+b.h) {
      activateFind();
    } else {
      // Tapping the playfield re-opens the keyboard if it dismissed
      focusMobileInput();
    }
  }
});

// ── Boot ──────────────────────────────────────────────────────────────
// Pre-fill ambient scenery so the menu/gameover screens have mountains+clouds.
mountains = makeMountainRidge();
clouds    = makeClouds();
requestAnimationFrame(loop);
</script>
</body>
</html>
